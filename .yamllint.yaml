---
extends: default

rules:
  line-length:
    max: 200
    level: warning
  truthy:
    allowed-values: ["true", "false", "yes", "no", "on", "off"]
    check-keys: false
  comments:
    min-spaces-from-content: 1
  indentation:
    spaces: 2
    indent-sequences: whatever
    check-multi-line-strings: false
  document-start: disable
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
