name: Home Assistant Config Check

# Run on every push and on every pull-request targeting any branch.
on:
#  pull_request:
  workflow_dispatch:

# Permissions needed:
#   contents: read        — check out the repo
#   pull-requests: write  — post a comment with error details on PRs
permissions:
  contents: read
  pull-requests: write

jobs:
  check_config:
    name: Validate HA Configuration
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repository ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Read the required HA version from the repo's own .HA_VERSION ──
      #    Fails fast with a clear message if the file is missing or empty.
      - name: Read HA version
        id: ha_version
        run: |
          if [ ! -f .HA_VERSION ]; then
            echo "ERROR: .HA_VERSION file not found in repository root" >&2
            exit 1
          fi
          version=$(cat .HA_VERSION)
          if [ -z "$version" ]; then
            echo "ERROR: .HA_VERSION file is empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Using Home Assistant version: $version"

      # ── 3. Create dirs/files that HA expects but are git-ignored ─────────
      #    • themes/      — referenced by configuration.yaml via
      #                     !include_dir_merge_named themes
      #    • secrets.yaml — HA always looks for this file at startup; an
      #                     empty file is sufficient when no !secret is used
      - name: Create required runtime directories and files
        run: |
          mkdir -p themes
          touch secrets.yaml

      # ── 4. Pull the exact HA release that matches the installed version ──
      - name: Pull Home Assistant Docker image
        run: |
          docker pull ghcr.io/home-assistant/home-assistant:${{ steps.ha_version.outputs.version }}

      # ── 5. Run the built-in check_config script ───────────────────────────
      #    Capture output so we can post it in a PR comment on failure.
      #    continue-on-error lets us reach the comment step; we re-fail below.
      - name: Run Home Assistant config check
        id: config_check
        continue-on-error: true
        run: |
          output=$(docker run --rm \
            --entrypoint python3 \
            -v "${{ github.workspace }}:/config" \
            ghcr.io/home-assistant/home-assistant:${{ steps.ha_version.outputs.version }} \
            -m homeassistant --script check_config -c /config 2>&1)
          exit_code=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$output"     >> "$GITHUB_OUTPUT"
          echo "EOF"         >> "$GITHUB_OUTPUT"
          echo "$output"
          exit $exit_code

      # ── 6. Post a PR comment with the error output when the check fails ───
      #    Only runs on pull requests so push builds stay comment-free.
      - name: Comment on PR with config errors
        if: steps.config_check.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.config_check.outputs.output }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ❌ Home Assistant config check failed',
                '',
                'The config validation found errors. Please fix them before merging.',
                '',
                '```',
                output,
                '```',
              ].join('\n'),
            });

      # ── 7. Fail the job if the config check did not pass ──────────────────
      #    Needed because step 5 used continue-on-error.
      - name: Fail if config check failed
        if: steps.config_check.outcome == 'failure'
        run: exit 1
