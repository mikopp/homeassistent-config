name: Home Assistant advanced Configuration Check
on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ha-ci:
    name: HA Config Check · Template Validation · Automation Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repository ─────────────────────────────────────────
      - name: Check out configuration from GitHub
        uses: actions/checkout@v6

      # ── 2. Python tooling ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install pyyaml requests pytest-github-actions-annotate-failures
          pip install git+https://github.com/HeadlessTarry/HomeAssistant-Test-Harness.git

      # ── 3. Pull the HA image (cached by version) ─────────────────────────────
      #    Used by the config-check step. The test harness manages its own
      #    container independently.
      - name: Cache Home Assistant Docker image
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: /tmp/ha-docker-cache.tar.gz
          key: ha-docker-${{ hashFiles('.HA_VERSION') }}

      - name: Load cached Docker image
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/ha-docker-cache.tar.gz

      - name: Pull Home Assistant Docker image
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/home-assistant/home-assistant:$(cat .HA_VERSION)
          docker save ghcr.io/home-assistant/home-assistant:$(cat .HA_VERSION) \
            | gzip > /tmp/ha-docker-cache.tar.gz

      # ── 4. Prepare config dir ────────────────────────────────────────────────
      - name: Prepare HA config dir
        run: |
          mkdir -p themes
          if [ ! -f secrets.yaml ] && [ -f fakesecrets.yaml ]; then
            cp fakesecrets.yaml secrets.yaml
          fi
          # Inject location into the homeassistant: block so the sun integration
          # uses Linz, Austria coordinates. Done here (not committed) so the repo
          # stays clean. Applies to both check_config and the harness HA instance.
          sed -i '/^homeassistant:/a\  latitude: 48.3069\n  longitude: 14.2858\n  elevation: 266' configuration.yaml

      # ── 5. Install custom component dependencies ─────────────────────────────
      #    Downloads components listed in tests/custom_components.yaml into
      #    custom_components/ so both check_config and the harness HA instance
      #    can load them.
      #    Also writes ha_yaml_config snippets to packages/ha_ci_fixtures.yaml
      #    so built-in integrations (workday, schedule helpers) are available.
      - name: Install custom component dependencies
        run: |
          mkdir -p custom_components
          python3 - <<'EOF'
          import subprocess, sys, tempfile, shutil, os
          import urllib.request
          try:
              import yaml
          except ImportError:
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "pyyaml"])
              import yaml

          with open("tests/custom_components.yaml") as f:
              data = yaml.safe_load(f)

          deps = data.get("dependencies", [])
          for dep in deps:
              repo = dep["repository"]
              domain = dep["domain"]
              name = dep.get("name", domain)
              owner_repo = repo.rstrip("/").removeprefix("https://github.com/")
              url = f"https://github.com/{owner_repo}/archive/refs/heads/main.tar.gz"
              print(f"Installing {name} ({domain}) from {repo}")
              with tempfile.TemporaryDirectory() as tmp:
                  archive = os.path.join(tmp, "component.tar.gz")
                  urllib.request.urlretrieve(url, archive)
                  subprocess.check_call(
                      ["tar", "-xz", "-C", tmp, "--strip-components=1", "-f", archive]
                  )
                  src = os.path.join(tmp, "custom_components", domain)
                  dst = os.path.join("custom_components", domain)
                  if os.path.exists(dst):
                      shutil.rmtree(dst)
                  shutil.copytree(src, dst)
                  print(f"  → installed to custom_components/{domain}/")

          print("Installed custom components:", os.listdir("custom_components"))

          ha_yaml_configs = data.get("ha_yaml_config", [])
          if ha_yaml_configs:
              os.makedirs("packages", exist_ok=True)
              fixture_path = "packages/ha_ci_fixtures.yaml"
              with open(fixture_path, "w") as fout:
                  fout.write("# Auto-generated by CI from tests/custom_components.yaml ha_yaml_config.\n")
                  fout.write("# Do not edit — regenerated on every CI run.\n\n")
                  for cfg in ha_yaml_configs:
                      fout.write(f"# {cfg.get('name', '')}\n")
                      fout.write(cfg["yaml"].rstrip() + "\n\n")
              print(f"Written HA YAML config fixtures ({len(ha_yaml_configs)} entries) to {fixture_path}")
          EOF

      # ── 6. Config check (one-shot, no server) ────────────────────────────────
      - name: Run Home Assistant config check
        run: |
          output=$(docker run --rm \
            -v "${{ github.workspace }}:/config" \
            ghcr.io/home-assistant/home-assistant:$(cat .HA_VERSION) \
            python -m homeassistant --config /config --script check_config 2>&1)
          echo "$output"
          if echo "$output" | grep -qiE "invalid slug|Setup of package.*failed|ERROR"; then
            echo "::error::check_config reported errors — see output above"
            exit 1
          fi

      # ── 7. Extract Jinja2 templates ──────────────────────────────────────────
      #    Produces /tmp/templates.json with state_templates and runtime_templates
      #    lists consumed by tests/test_templates.py. Does not require HA running.
      - name: Extract Jinja2 templates
        run: |
          python3 .github/scripts/extract_templates.py . > /tmp/templates.json
          python3 -c "
          import json
          d = json.load(open('/tmp/templates.json'))
          print(f\"Found {len(d['state_templates'])} state template(s) and {len(d['runtime_templates'])} runtime template(s).\")
          "

      # ── 8. Run pytest — templates + automation tests ─────────────────────────
      #    The ha_integration_test_harness plugin starts a session-scoped HA
      #    container (via Docker Compose), runs all tests, and stops the container
      #    automatically. Template validation and automation tests share the same
      #    live HA instance for efficiency.
      - name: Run pytest (template validation + automation scenarios)
        id: run_tests
        continue-on-error: true
        env:
          HOME_ASSISTANT_CONFIG_ROOT: ${{ github.workspace }}
          TEMPLATES_JSON: /tmp/templates.json
        run: |
          pytest tests/ -v 2>&1 | tee /tmp/pytest_output.txt
          exit_code=${PIPESTATUS[0]}
          echo "output<<EOF"       >> "$GITHUB_OUTPUT"
          cat /tmp/pytest_output.txt >> "$GITHUB_OUTPUT"
          echo "EOF"               >> "$GITHUB_OUTPUT"
          exit $exit_code

      # ── 9. Post a PR comment on failure ─────────────────────────────────────
      - name: Comment on PR with failures
        if: steps.run_tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ❌ Home Assistant CI failed',
                '',
                '### ❌ Template validation + automation scenario tests',
                '```',
                `${{ steps.run_tests.outputs.output }}`,
                '```',
              ].join('\n'),
            });

      # ── 10. Re-fail the job after the comment step ───────────────────────────
      - name: Fail if any check failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
