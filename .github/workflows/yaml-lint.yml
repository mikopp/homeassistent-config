---
name: YAML Lint

on:
  push:
  workflow_dispatch:

jobs:
  check-yaml-style:
    name: Check YAML style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check for style issues
        run: |
          python .github/scripts/fix_yaml_style.py .
          if ! git diff --quiet; then
            echo "::error::YAML style issues found. Run \
              'python .github/scripts/fix_yaml_style.py .' locally and commit \
              the result."
            git --no-pager diff
            exit 1
          fi
          echo "All YAML files are already clean."

  lint-yaml:
    name: Lint all YAML files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yaml
          file_or_dir: .
          strict: false

  lint-resolved:
    name: Lint resolved HA config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: pip install pyyaml yamllint

      - name: Resolve and lint configuration.yaml
        run: |
          python .github/scripts/resolve_ha_yaml.py configuration.yaml . \
            > /tmp/resolved_configuration.yaml
          yamllint -c .yamllint.yaml /tmp/resolved_configuration.yaml

      - name: Resolve and lint dashboard files
        run: |
          for f in dashboards/*.yaml; do
            echo "Resolving $f ..."
            python .github/scripts/resolve_ha_yaml.py "$f" . \
              > "/tmp/resolved_$(basename "$f")"
            yamllint -c .yamllint.yaml "/tmp/resolved_$(basename "$f")"
          done
