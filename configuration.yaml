# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Feature packages — each feature lives in its own file under packages/
homeassistant:
  packages: !include_dir_named packages

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

lovelace:
  mode: storage # Keeps your main dashboard editable in the UI
  dashboards:
    pergola-management: # The URL will be /pergola-management
      mode: yaml
      title: Pergola Control
      icon: mdi:sun-angle
      filename: dashboards/Pergola-management.yaml
      show_in_sidebar: true

rest_command:
  update_loxone:
    url: "http://homeassist:home@192.168.1.92/jdev/sps/io/{{ parameter }}"
    method: GET
  send_to_loxone:
    # Replace with your Miniserver IP, Username, and Password
    url: "http://homeassist:home@192.168.1.92/jdev/sps/io/{{ input_name }}/{{ value }}"
    method: GET
