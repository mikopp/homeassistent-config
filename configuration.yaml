
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

rest_command:
  update_loxone:
    url: "http://homeassist:home@192.168.1.92/jdev/sps/io/{{ parameter }}"
    method: GET
  send_to_loxone:
    # Replace with your Miniserver IP, Username, and Password
    url: "http://homeassist:home@192.168.1.92/jdev/sps/io/{{ input_name }}/{{ value }}"
    method: GET