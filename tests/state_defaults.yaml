# Applied to a running HA instance via seed_state.py before any test runs.
# Keep this file in sync with every external entity referenced in templates/automations.
#
# inputs:   applied via input_*.set_value / turn_on / turn_off / select_option
# states:   applied via POST /api/states/{entity_id}

# ── Input helpers — applied via service calls ─────────────────────────────────────────
inputs:
  # Master switch
  input_boolean.pergola_automatic_enabled: "on"
  # Heating season flag
  input_boolean.pergola_heating: "off"
  # Cooling formula selector (on = safe-zone max-open)
  input_boolean.pergola_cooling_optimized: "on"

  # State machine
  input_select.pergola_automation_state: "sun_automatik_cooling"

  # PV / sun detection
  input_number.pergola_pv_conversion_factor: 3.2
  input_number.pergola_shading_sensitivity: 0.9
  input_number.pergola_min_sun_elevation: 10

  # Cover movement deadband
  input_number.pergola_deadband_angle: 5

  # Rain recovery step counter (0 = idle)
  input_number.pergola_rain_recovery_step: 0

  # Pergola: last commanded slat angle — written by script.pergola_set_slat_angle only
  # when automatic gate passes. Start at 0 so tests can assert the script ran/was blocked.
  input_number.pergola_last_set_slat_angle: 0

  # Airflow cooling helpers
  input_boolean.airflow_cooling_automatic_enabled: "off"
  input_number.airflow_cooling_target_temperature: 21.5
  input_number.airflow_min_dew_diff: 2.0
  input_number.airflow_min_temp_diff: 1.5

  # Hardware geometry
  input_number.pergola_max_tilt_angle: 122

  # Location / orientation
  input_number.pergola_wall_azimuth: 204

  # Slat geometry
  input_number.pergola_slat_width: 22
  input_number.pergola_slat_pivot_spacing: 20
  input_number.pergola_slat_thickness: 3


# ── Stubbed entity states — applied via POST /api/states/{entity_id} ─────────────────
# Stand-ins for integrations not present in CI (MQTT, Somfy, weather station).
states:
  # Sun position — midday, sun clearly in the pergola window
  sun.sun:
    state: "above_horizon"
    attributes:
      elevation: 45
      azimuth: 180

  # Pergola effective sun angle — derived from sun.sun (elevation=45, azimuth=180,
  # wall_azimuth=204). Seeded explicitly so the template chain that feeds
  # sensor.pergola_slat_angle's availability check is pre-satisfied; otherwise HA's
  # async template evaluation may not have propagated before expectations are checked.
  # Value: atan(tan(45°) / |sin(180°−204°)|) ≈ 67.9° (sun east of wall).
  sensor.pergola_effective_sun_angle:
    state: "67.9"
    attributes:
      unit_of_measurement: "°"

  # Victron solar charger (MQTT — broker unreachable in CI)
  sensor.solar_yield_watts:
    state: "1500"
    attributes:
      unit_of_measurement: "W"
      device_class: "power"

  # Weather station sensors (UDP integration — not available in CI)
  sensor.wheatherstation_outdoor_temperature:
    state: "18.5"
    attributes:
      unit_of_measurement: "°C"
      device_class: "temperature"

  sensor.wheatherstation_solar_radiation:
    state: "650"
    attributes:
      unit_of_measurement: "W/m²"

  sensor.wheatherstation_uv_index:
    state: "5"

  sensor.wheatherstation_hourly_rain:
    state: "0"
    attributes:
      unit_of_measurement: "mm"

  sensor.wheatherstation_rain_rate:
    state: "0"
    attributes:
      unit_of_measurement: "mm/h"

  # Pergola sun-shining binary sensor — seeded "on" so evaluate_state (Rule 6) never
  # triggers not_enough_sun transitions during tests, keeping all sun-tracking scenarios
  # in their intended sun_automatik_* state. The sensor has delay_on/delay_off in
  # production that prevents it reaching "on" within a CI test run.
  binary_sensor.pergola_sun_shining:
    state: "on"

  # Somfy cover priority-lock sensors (UI integration — not available in CI)
  sensor.dach_links_priority_lock_originator:
    state: "none"

  sensor.dach_rechts_priority_lock_originator:
    state: "none"

  sensor.dach_links_priority_lock_timer:
    state: "0"

  sensor.dach_rechts_priority_lock_timer:
    state: "0"

  # ComfoConnect temperature profile select (not available in CI)
  select.comfoconnect_pro_temperature_profile:
    state: "comfort"

  # ComfoConnect sensors used as fallback in airflow template sensors (not available in CI)
  sensor.comfoconnect_pro_extract_air_temperature:
    state: "21.0"
    attributes:
      unit_of_measurement: "°C"
      device_class: "temperature"

  sensor.comfoconnect_pro_extract_air_humidity:
    state: "55"
    attributes:
      unit_of_measurement: "%"
      device_class: "humidity"

  sensor.comfoconnect_pro_outdoor_air_temperature:
    state: "16.0"
    attributes:
      unit_of_measurement: "°C"
      device_class: "temperature"

  sensor.comfoconnect_pro_outdoor_air_dewpoint:
    state: "8.5"
    attributes:
      unit_of_measurement: "°C"
      device_class: "temperature"

  # Airflow filter sensors — platform:filter does not compute in CI, seed directly
  sensor.airflow_outdoor_temp_5min:
    state: "16.0"
    attributes:
      unit_of_measurement: "°C"
      device_class: "temperature"

  sensor.airflow_outdoor_dew_5min:
    state: "8.5"
    attributes:
      unit_of_measurement: "°C"
      device_class: "temperature"

  sensor.airflow_min_indoor_dew_5min:
    state: "12.0"
    attributes:
      unit_of_measurement: "°C"
      device_class: "temperature"

  sensor.airflow_avg_indoor_temp_5min:
    state: "22.0"
    attributes:
      unit_of_measurement: "°C"
      device_class: "temperature"

  sensor.airflow_avg_indoor_humidity_5min:
    state: "55.0"
    attributes:
      unit_of_measurement: "%"
      device_class: "humidity"

  # Weather station 48h mean (not available in CI)
  sensor.wheatherstation_outdoor_temperature_48h_mean:
    state: "14.0"
    attributes:
      unit_of_measurement: "°C"
      device_class: "temperature"

  # Heating/cooling indicator (template sensor from another package)
  sensor.heating_cooling_indicator:
    state: "neutral"

  # Somfy covers (UI integration — not available in CI)
  cover.dach_links:
    state: "open"
    attributes:
      current_tilt_position: 50

  cover.dach_rechts:
    state: "open"
    attributes:
      current_tilt_position: 50
