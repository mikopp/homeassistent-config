# Automation test scenarios for run_automations.py.
# Each scenario is a named overlay applied on top of tests/state_defaults.yaml.
# The runner re-seeds baseline state before each scenario, then applies the overlay,
# triggers every discovered automation, asserts no trace errors, and checks expect.states.
#
# Authoring rule: add a scenario whenever a new choose: branch or guard is introduced.
#
# expect.states: entity_id → expected state string after all automations in the scenario
#   have been triggered. Runner fetches GET /api/states/{entity_id} and compares .state.
# expect.wait_s: seconds to sleep before asserting expectations (default 0). Use when
#   an automation calls a script via script.turn_on (async) and the state change
#   happens inside the script, not the automation itself.
#
# Key observables used below:
#   sensor.pergola_effective_slat_angle — mirrors input_number.pergola_last_set_slat_angle,
#     which script.pergola_set_slat_angle writes ONLY when pergola_automatic_enabled=on AND
#     the applicable deadband guard passes. Seeded to 0 so any write is detectable.
#   sensor.pergola_slat_angle — template sensor: formula result for current automation state
#     and sun position. Updates reactively; proves the correct formula branch was taken.
#   sensor.pergola_rain_recovery_step — template: returns step when state=rain_stopped, else 0.

scenarios:

  # ── Baseline: heating off, cooling optimized on, auto enabled, sunny midday ──────────
  - name: baseline_cooling_optimized
    overrides: {}
    expect:
      states:
        # Deadband check passes (|target_tilt(16) - current(50)| = 34 >= DB(4)).
        # Script runs, writes the optimised cooling formula result to last_set_slat_angle.
        # A_eff≈67.9°, flip guard fails (moe=134.8 > mt−DB=117) → slat = mow−5 = 13.0°
        sensor.pergola_effective_slat_angle: "13.0"

  # ── Cooling un-optimized (perfect-perpendicular formula) ─────────────────────────────
  - name: cooling_unoptimized
    overrides:
      inputs:
        input_boolean.pergola_cooling_optimized: "off"
    expect:
      states:
        # Standard formula: A_eff=67.9°, moe=134.8 > mt−5=117 → afternoon branch.
        # slat = max(A_eff − 90, LB) = max(−22.1, 15.0) = LB = 15.0°
        sensor.pergola_effective_slat_angle: "15.0"

  # ── Heating mode — slat uses pergola_min_heating_slat_angle as floor ─────────────────
  - name: heating_mode
    overrides:
      inputs:
        input_boolean.pergola_heating: "on"
        input_boolean.pergola_cooling_optimized: "off"
        input_select.pergola_automation_state: "sun_automatik_heating"
    expect:
      states:
        # Heating formula: slat = max(A_eff, min_heat) = max(67.9°, 33.5°) = 67.9°
        # Deadband passes (|target_tilt(61) − current(50)| = 11 >= DB(4)) → script runs.
        sensor.pergola_effective_slat_angle: "67.9"

  # ── Master switch off — state machine still runs; covers suppressed inside script ──────
  - name: automation_disabled
    overrides:
      inputs:
        input_boolean.pergola_automatic_enabled: "off"
    expect:
      states:
        # Cover response fires and deadband passes, but script.pergola_set_slat_angle
        # exits at the pergola_automatic_enabled gate before writing last_set_slat_angle.
        # Effective slat stays at the seeded baseline of 0.
        sensor.pergola_effective_slat_angle: "0.0"

  # ── State: not_enough_sun (low elevation + low PV + low radiation) ───────────────────
  - name: not_enough_sun
    overrides:
      inputs:
        input_select.pergola_automation_state: "not_enough_sun"
      states:
        sun.sun:
          state: "above_horizon"
          attributes:
            elevation: 6
            azimuth: 180
        sensor.solar_yield_watts:
          state: "30"
        sensor.wheatherstation_solar_radiation:
          state: "40"
        sensor.wheatherstation_uv_index:
          state: "0.5"
    expect:
      states:
        # not_enough_sun branch has a 30° deadband. Target tilt for 90° = 74.
        # |current(50) − target(74)| = 24, DB = round(30/122×100, 0) = 25.
        # 24 > 25 is FALSE → deadband blocks the script → last_set_slat_angle unchanged.
        sensor.pergola_effective_slat_angle: "0.0"

  # ── State: no_sun_behind_house (sun azimuth past the wall's azimuth window) ─────────
  - name: no_sun_behind_house
    overrides:
      inputs:
        input_select.pergola_automation_state: "no_sun_behind_house"
      states:
        sun.sun:
          state: "above_horizon"
          attributes:
            elevation: 25
            azimuth: 350
    expect:
      states:
        # no_sun_behind_house branch calls script unconditionally (no deadband).
        # Hardcoded slat_angle: 90 → script writes 90.0 to last_set_slat_angle.
        sensor.pergola_effective_slat_angle: "90.0"

  # ── Frost entry — temperature below 2.5°C, state transitions to frost ────────────────
  - name: frost
    overrides:
      states:
        sensor.wheatherstation_outdoor_temperature:
          state: "-1.5"
    expect:
      states:
        # RULE 1 ENTRY: temp < 2.5 and state != frost → automation writes frost.
        input_select.pergola_automation_state: "frost"
        # Cover response runs after state transition; frost → empty sequence (no move).
        # Template sensor reflects the else-branch 90° neutral value for frost state.
        sensor.pergola_slat_angle: "90"

  # ── Frost recovery — temperature back above 3.0°C, state was frost ───────────────────
  - name: frost_recovery
    overrides:
      inputs:
        input_select.pergola_automation_state: "frost"
      states:
        sensor.wheatherstation_outdoor_temperature:
          state: "5.0"
    expect:
      # script.pergola_exit_to_normal runs async — allow it to settle before asserting
      wait_s: 2.0
      states:
        # RULE 1 EXIT → pergola_exit_to_normal → evaluate_state: sun active, heating off.
        input_select.pergola_automation_state: "sun_automatik_cooling"
        # Template sensor reflects cooling formula result once state has settled.
        # A_eff≈67.9°, optimised=on, flip guard fails → slat = 13.0°
        sensor.pergola_slat_angle: "13.0"

  # ── Rain starts — rain_rate > 0 should transition to rain ────────────────────────────
  - name: rain_starts
    overrides:
      states:
        sensor.wheatherstation_rain_rate:
          state: "2.5"
    expect:
      states:
        # RULE 2 ENTRY: rain_rate > 0, no user lock, state not in [frost, rain] → rain.
        input_select.pergola_automation_state: "rain"
        # Cover response runs after state transitions to rain → empty sequence (no move).
        # Template sensor falls through to else-branch → 90° neutral value.
        sensor.pergola_slat_angle: "90"

  # ── Post-rain recovery — rain stopped, drain sequence is running (step=1) ─────────────
  - name: post_rain_recovery
    overrides:
      inputs:
        input_select.pergola_automation_state: "rain_stopped"
        input_number.pergola_rain_recovery_step: 1
      states:
        sensor.wheatherstation_rain_rate:
          state: "0"
    expect:
      states:
        # Template returns step counter when state=rain_stopped, else 0.
        # Proves both: protected-state guard kept state in rain_stopped AND
        # the step counter correctly reflects the active drain phase.
        sensor.pergola_rain_recovery_step: "1"

  # ── User override — cover was manually operated (lock originator = user) ─────────────
  - name: user_override_left
    overrides:
      states:
        sensor.dach_links_priority_lock_originator:
          state: "user"
        sensor.dach_links_priority_lock_timer:
          state: "300"
    expect:
      states:
        # RULE 4 ENTRY: dach_links originator=user, state not in protected → user_override.
        input_select.pergola_automation_state: "user_override"
        # Cover response runs after state transition; user_override → empty sequence.
        # Template sensor falls through to else-branch → 90°.
        sensor.pergola_slat_angle: "90"

  # ── Rain-originated cover lock (lock originator = rain on both covers) ───────────────
  - name: rain_lock_from_cover
    overrides:
      states:
        sensor.dach_links_priority_lock_originator:
          state: "rain"
        sensor.dach_rechts_priority_lock_originator:
          state: "rain"
    expect:
      states:
        # RULE 2 ENTRY: dach_links originator=rain (not user), state not in [frost, rain].
        input_select.pergola_automation_state: "rain"
        # Template sensor: rain state → else-branch → 90°.
        sensor.pergola_slat_angle: "90"

  # ── User operates cover while state machine is in rain ───────────────────────────────
  # Exercises the new RULE 2 → USER OVERRIDE branch and the updated RAIN ENTRY guard.
  - name: rain_with_user_originator
    overrides:
      inputs:
        input_select.pergola_automation_state: "rain"
      states:
        sensor.wheatherstation_rain_rate:
          state: "2.5"
        sensor.dach_links_priority_lock_originator:
          state: "user"
        sensor.dach_rechts_priority_lock_originator:
          state: "rain"
        sensor.dach_links_priority_lock_timer:
          state: "300"
    expect:
      states:
        # RULE 2 → USER OVERRIDE: state=rain and dach_links originator=user → user_override.
        input_select.pergola_automation_state: "user_override"
        # Template sensor: user_override → else-branch → 90°.
        sensor.pergola_slat_angle: "90"

  # ── Airflow: auto enabled, free cooling active (active_cooling + dew/temp conditions met) ──
  - name: airflow_free_cooling_active
    overrides:
      inputs:
        input_boolean.airflow_cooling_automatic_enabled: "on"
      states:
        sensor.heating_cooling_indicator:
          state: "active_cooling"
        sensor.airflow_free_cooling_available:
          state: "on"
        select.comfoconnect_pro_temperature_profile:
          state: "comfort"
    expect:
      states:
        # Cooling branch + free_cooling=on + profile!=cool → automation sets cool.
        select.comfoconnect_pro_temperature_profile: "cool"

  # ── Airflow: auto enabled, free cooling inactive (active_cooling but dew/temp conditions not met) ──
  - name: airflow_free_cooling_inactive
    overrides:
      inputs:
        input_boolean.airflow_cooling_automatic_enabled: "on"
      states:
        sensor.heating_cooling_indicator:
          state: "active_cooling"
        sensor.airflow_free_cooling_available:
          state: "off"
        select.comfoconnect_pro_temperature_profile:
          state: "cool"
    expect:
      states:
        # Cooling branch + free_cooling=off + profile!=comfort → automation sets comfort.
        select.comfoconnect_pro_temperature_profile: "comfort"

  # ── Airflow: auto enabled, active heating ────────────────────────────────────────────
  - name: airflow_active_heating
    overrides:
      inputs:
        input_boolean.airflow_cooling_automatic_enabled: "on"
      states:
        sensor.heating_cooling_indicator:
          state: "active_heating"
        select.comfoconnect_pro_temperature_profile:
          state: "comfort"
    expect:
      states:
        # active_heating branch → automation sets warm.
        select.comfoconnect_pro_temperature_profile: "warm"

  # ── Airflow: auto enabled, neutral ───────────────────────────────────────────────────
  - name: airflow_neutral
    overrides:
      inputs:
        input_boolean.airflow_cooling_automatic_enabled: "on"
      states:
        sensor.heating_cooling_indicator:
          state: "neutral"
        select.comfoconnect_pro_temperature_profile:
          state: "cool"
    expect:
      states:
        # neutral branch → automation sets comfort.
        select.comfoconnect_pro_temperature_profile: "comfort"

  # ── Airflow: auto disabled — automation must skip profile changes ─────────────────────
  - name: airflow_auto_disabled
    overrides:
      inputs:
        input_boolean.airflow_cooling_automatic_enabled: "off"
      states:
        sensor.heating_cooling_indicator:
          state: "active_cooling"
    expect:
      states:
        # Automation condition: airflow_cooling_automatic_enabled=on → not met, skipped.
        # Profile unchanged from default seed — proves the condition gate works.
        select.comfoconnect_pro_temperature_profile: "comfort"
