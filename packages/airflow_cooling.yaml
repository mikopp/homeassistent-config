# --- FILTER SENSORS ---
# 5-minute time-weighted moving average + throttle per source.
# Template sensors (airflow_min_indoor_dew, airflow_avg_indoor_temp) are NOT excluded
# from recorder because the filter sensors below seed their moving average from history.
sensor:
  # Smooth avg indoor humidity — source is template sensor aggregating all indoor humidity sensors
  - platform: filter
    unique_id: airflow_avg_indoor_humidity_5min
    name: "Airflow Avg Indoor Humidity 5min"
    entity_id: sensor.airflow_avg_indoor_humidity
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 1
      - filter: time_throttle
        window_size: "00:05"

  # Smooth avg indoor dew point — source is template sensor aggregating all indoor dew sensors
  - platform: filter
    unique_id: airflow_min_indoor_dew_5min
    name: "Airflow Avg Indoor Dew 5min"
    entity_id: sensor.airflow_min_indoor_dew
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 2
      - filter: time_throttle
        window_size: "00:05"

  # Smooth avg indoor temperature — source is template sensor aggregating all indoor temp sensors
  - platform: filter
    unique_id: airflow_avg_indoor_temp_5min
    name: "Airflow Avg Indoor Temp 5min"
    entity_id: sensor.airflow_avg_indoor_temp
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 2
      - filter: time_throttle
        window_size: "00:05"

  # Smooth outdoor dew point from ComfoConnect
  - platform: filter
    unique_id: airflow_outdoor_dew_5min
    name: "Airflow Outdoor Dew 5min"
    entity_id: sensor.comfoconnect_pro_outdoor_air_dew_point
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 2
      - filter: time_throttle
        window_size: "00:05"

  # Smooth outdoor temperature from ComfoConnect
  - platform: filter
    unique_id: airflow_outdoor_temp_5min
    name: "Airflow Outdoor Temp 5min"
    entity_id: sensor.comfoconnect_pro_outdoor_air_temperature
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 2
      - filter: time_throttle
        window_size: "00:05"

  # Smooth outdoor humidity from ComfoConnect
  - platform: filter
    unique_id: airflow_outdoor_air_humidity_5min
    name: "Airflow Outdoor Air Humidity 5min"
    entity_id: sensor.comfoconnect_pro_outdoor_air_humidity
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 1
      - filter: time_throttle
        window_size: "00:05"

  # Smooth supply air temperature from ComfoConnect
  - platform: filter
    unique_id: airflow_supply_air_temp_5min
    name: "Airflow Supply Air Temp 5min"
    entity_id: sensor.comfoconnect_pro_supply_air_temperature
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 2
      - filter: time_throttle
        window_size: "00:05"

  # Smooth supply air humidity from ComfoConnect
  - platform: filter
    unique_id: airflow_supply_air_humidity_5min
    name: "Airflow Supply Air Humidity 5min"
    entity_id: sensor.comfoconnect_pro_supply_air_humidity
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 1
      - filter: time_throttle
        window_size: "00:05"

  # Smooth extract air temperature from ComfoConnect
  - platform: filter
    unique_id: airflow_extract_air_temp_5min
    name: "Airflow Extract Air Temp 5min"
    entity_id: sensor.comfoconnect_pro_extract_air_temperature
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 2
      - filter: time_throttle
        window_size: "00:05"

  # Smooth extract air humidity from ComfoConnect
  - platform: filter
    unique_id: airflow_extract_air_humidity_5min
    name: "Airflow Extract Air Humidity 5min"
    entity_id: sensor.comfoconnect_pro_extract_air_humidity
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 1
      - filter: time_throttle
        window_size: "00:05"

# --- TEMPLATE SENSORS & BINARY SENSOR ---
template:
  - sensor:
      # Average humidity across all monitored indoor areas; falls back to ComfoConnect extract air when no labeled entities exist
      - unique_id: airflow_avg_indoor_humidity
        name: "Airflow Avg Indoor Humidity"
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        state: >
          {% set indoor_hums = label_entities('Indoor.Humidity')
            | map('states') | map('float', none) | reject('none') | list %}
          {% if indoor_hums | count > 0 %}
            {{ (indoor_hums | sum / indoor_hums | count) | round(1) }}
          {% else %}
            {{ states('sensor.comfoconnect_pro_extract_air_humidity') | float(0) | round(1) }}
          {% endif %}
        availability: >
          {% set label_count = label_entities('Indoor.Humidity')
             | map('states') | map('float', none) | reject('none') | list | count %}
          {{ label_count > 0 or states('sensor.comfoconnect_pro_extract_air_humidity') not in ['unavailable', 'unknown'] }}

      # Average dewpoint across all monitored indoor areas; falls back to ComfoConnect extract air dew point when no labeled entities exist
      - unique_id: airflow_min_indoor_dew
        name: "Airflow Avg Indoor Dew"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set indoor_dews = label_entities('Indoor.Dewpoint')
            | map('states') | map('float', none) | reject('none') | list %}
          {% if indoor_dews | count > 0 %}
            {{ (indoor_dews | sum / indoor_dews | count) | round(2) }}
          {% else %}
            {{ states('sensor.comfoconnect_pro_extract_air_dew_point') | float(0) | round(2) }}
          {% endif %}
        availability: >
          {% set label_count = label_entities('Indoor.Dewpoint')
             | map('states') | map('float', none) | reject('none') | list | count %}
          {{ label_count > 0 or states('sensor.comfoconnect_pro_extract_air_dew_point') not in ['unavailable', 'unknown'] }}

      # Average temperature across all monitored indoor areas; falls back to ComfoConnect extract air temperature when no labeled entities exist
      - unique_id: airflow_avg_indoor_temp
        name: "Airflow Avg Indoor Temp"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set indoor_temps = label_entities('Indoor.Temperature')
            | map('states') | map('float', none) | reject('none') | list %}
          {% if indoor_temps | count > 0 %}
            {{ (indoor_temps | sum / indoor_temps | count) | round(2) }}
          {% else %}
            {{ states('sensor.comfoconnect_pro_extract_air_temperature') | float(0) | round(2) }}
          {% endif %}
        availability: >
          {% set label_count = label_entities('Indoor.Temperature')
             | map('states') | map('float', none) | reject('none') | list | count %}
          {{ label_count > 0 or states('sensor.comfoconnect_pro_extract_air_temperature') not in ['unavailable', 'unknown'] }}

      # Bypass percentage estimated from enthalpy efficiency, expressed in 15% steps.
      # Returns unavailable when the indoor/outdoor enthalpy delta is too small to be meaningful.
      - unique_id: airflow_bypass_estimation
        name: "Airflow Bypass Estimation"
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:valve
        availability: >
          {{ states('sensor.airflow_outdoor_temp_5min') not in ['unavailable', 'unknown'] and
             states('sensor.airflow_outdoor_air_humidity_5min') not in ['unavailable', 'unknown'] and
             states('sensor.airflow_supply_air_temp_5min') not in ['unavailable', 'unknown'] and
             states('sensor.airflow_supply_air_humidity_5min') not in ['unavailable', 'unknown'] and
             states('sensor.airflow_extract_air_temp_5min') not in ['unavailable', 'unknown'] and
             states('sensor.airflow_extract_air_humidity_5min') not in ['unavailable', 'unknown'] }}
        state: >
          {% set T_oa  = states('sensor.airflow_outdoor_temp_5min') | float %}
          {% set RH_oa = states('sensor.airflow_outdoor_air_humidity_5min') | float %}
          {% set T_sa  = states('sensor.airflow_supply_air_temp_5min') | float %}
          {% set RH_sa = states('sensor.airflow_supply_air_humidity_5min') | float %}
          {% set T_ra  = states('sensor.airflow_extract_air_temp_5min') | float %}
          {% set RH_ra = states('sensor.airflow_extract_air_humidity_5min') | float %}
          {% set eta_max = states('input_number.airflow_bypass_efficiency_max') | float(0.85) %}
          {% set eta_min = states('input_number.airflow_bypass_efficiency_min') | float(0.05) %}
          {# Actual station pressure in kPa; Ecowitt reports hPa so divide by 10. Falls back to standard atmosphere. #}
          {% set P_kpa  = states('sensor.wheatherstation_absolute_pressure') | float(1013.25) / 10 %}
          {# OA enthalpy #}
          {% set ps_oa = 0.61078 * e ** (17.27 * T_oa / (T_oa + 237.3)) %}
          {% set pv_oa = ps_oa * RH_oa / 100 %}
          {% set w_oa  = 0.622 * pv_oa / (P_kpa - pv_oa) %}
          {% set h_oa  = 1.006 * T_oa + w_oa * (2501 + 1.86 * T_oa) %}
          {# SA enthalpy — identical structure #}
          {% set ps_sa = 0.61078 * e ** (17.27 * T_sa / (T_sa + 237.3)) %}
          {% set pv_sa = ps_sa * RH_sa / 100 %}
          {% set w_sa  = 0.622 * pv_sa / (P_kpa - pv_sa) %}
          {% set h_sa  = 1.006 * T_sa + w_sa * (2501 + 1.86 * T_sa) %}
          {# RA enthalpy — identical structure #}
          {% set ps_ra = 0.61078 * e ** (17.27 * T_ra / (T_ra + 237.3)) %}
          {% set pv_ra = ps_ra * RH_ra / 100 %}
          {% set w_ra  = 0.622 * pv_ra / (P_kpa - pv_ra) %}
          {% set h_ra  = 1.006 * T_ra + w_ra * (2501 + 1.86 * T_ra) %}
          {% if (h_ra - h_oa) | abs < 0.5 %}
            {{ none }}
          {% else %}
            {% set eta   = (h_sa - h_oa) / (h_ra - h_oa) %}
            {% set b_raw = (eta_max - eta) / (eta_max - eta_min) %}
            {% set b_15  = ((b_raw * 100 / 15) | round(0, 'floor') | int) * 15 %}
            {{ [0, [100, b_15] | min] | max }}
          {% endif %}

    binary_sensor:
      # True when outdoor air is suitable for free cooling; debounced 10min each way to prevent flip-flop.
      # min_dew_diff and min_temp_diff are user-settable via input_number helpers.
      # Indoor temperature uses a 0.5°C hysteresis band (Schmitt trigger): turns ON at target_temp,
      # stays ON until indoor temp drops 0.5°C below target. This prevents the feedback loop where
      # the cool profile itself cools the room just enough to disable free cooling and vice versa.
      - unique_id: airflow_free_cooling_available
        name: "Airflow Free Cooling Available"
        device_class: running
        state: >
          {% set outdoor_dew = states('sensor.airflow_outdoor_dew_5min') | float(100) %}
          {% set outdoor_temp = states('sensor.airflow_outdoor_temp_5min') | float(0) %}
          {% set min_indoor_dew = states('sensor.airflow_min_indoor_dew_5min') | float(100) %}
          {% set avg_indoor_temp = states('sensor.airflow_avg_indoor_temp_5min') | float(0) %}
          {% set target_temp = states('input_number.airflow_cooling_target_temperature') | float(21.5) %}
          {% set min_dew_diff = states('input_number.airflow_min_dew_diff') | float(2.0) %}
          {% set min_temp_diff = states('input_number.airflow_min_temp_diff') | float(1.5) %}
          {% set temp_threshold = (target_temp - 0.5) if this.state == 'on' else target_temp %}
          {{
            (outdoor_dew + min_dew_diff) < min_indoor_dew and
            outdoor_temp < (target_temp - min_temp_diff) and
            avg_indoor_temp >= temp_threshold
          }}
        delay_on:
          minutes: 10
        delay_off:
          minutes: 10

      # True when ventilation must be reduced to avoid importing humid outdoor air.
      # Turns ON at (target + hyst), stays ON until hum < target. Mutually exclusive with
      # airflow_free_cooling_available (opposite dew conditions when min_dew_diff > 0).
      - unique_id: airflow_moisture_ventilation_low_needed
        name: "Airflow Moisture Ventilation Low Needed"
        device_class: moisture
        state: >
          {% set indoor_hum  = states('sensor.airflow_avg_indoor_humidity_5min') | float(0) %}
          {% set outdoor_dew = states('sensor.airflow_outdoor_dew_5min') | float(100) %}
          {% set indoor_dew  = states('sensor.airflow_min_indoor_dew_5min') | float(0) %}
          {% set target      = states('input_number.airflow_target_humidity') | float(55) %}
          {% set hysteresis  = states('input_number.airflow_humidity_hysteresis') | float(2) %}
          {% set threshold   = target if this.state == 'on' else (target + hysteresis) %}
          {{ indoor_hum >= threshold and outdoor_dew >= indoor_dew }}
        delay_on:
          minutes: 10
        delay_off:
          minutes: 10

# binary_sensor.airflow_free_cooling_available excluded — intermediate computed state, not worth archiving
recorder:
  exclude:
    entities:
      - binary_sensor.airflow_free_cooling_available
      - binary_sensor.airflow_moisture_ventilation_low_needed

# --- HELPERS ---
# Enable/disable automatic ventilation profile switching from the UI or other automations
input_boolean:
  airflow_cooling_automatic_enabled:
    name: "Airflow Cooling: Automatic Enabled"
    icon: mdi:fan-auto

# Target temperature is a standard climate property backed by this helper so it persists across restarts
input_number:
  airflow_cooling_target_temperature:
    name: "Airflow Cooling Target Temperature"
    min: 18
    max: 26
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-auto
#    initial: 21.5

  # Minimum dew point margin: outdoor dew must be this many °C below indoor dew for free cooling to activate
  airflow_min_dew_diff:
    name: "Airflow Min Dew Diff"
    min: 0
    max: 5
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:water-thermometer

  # Minimum temperature margin: outdoor temp must be this many °C below target for free cooling to activate
  airflow_min_temp_diff:
    name: "Airflow Min Temp Diff"
    min: 0
    max: 5
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-up

  # Target indoor humidity. Dead band [target−hyst, target+hyst] → no moisture action.
  airflow_target_humidity:
    name: "Airflow Target Humidity"
    min: 30
    max: 80
    step: 1
    unit_of_measurement: "%"
    icon: mdi:water-percent

  # Hysteresis half-band for all moisture triggers.
  airflow_humidity_hysteresis:
    name: "Airflow Humidity Hysteresis"
    min: 0.5
    max: 5
    step: 0.5
    unit_of_measurement: "%"
    icon: mdi:water-sync

  # Calibration: expected enthalpy efficiency when bypass is fully closed (maximum heat recovery)
  airflow_bypass_efficiency_max:
    name: "Airflow Bypass Efficiency Max"
    min: 0.50
    max: 1.00
    step: 0.01
    icon: mdi:valve-closed

  # Calibration: residual enthalpy efficiency when bypass is fully open (leakage only)
  airflow_bypass_efficiency_min:
    name: "Airflow Bypass Efficiency Min"
    min: 0.00
    max: 0.30
    step: 0.01
    icon: mdi:valve-open

# --- CLIMATE ENTITY ---
# Requires HACS custom component: jcwillox/hass-template-climate
# https://github.com/jcwillox/hass-template-climate
climate:
  - platform: climate_template
    name: "Airflow Climate"
    unique_id: airflow_climate

    # Standard climate property: current observed temperature (read-only)
    current_temperature_template: >
      {{ states('sensor.airflow_avg_indoor_temp_5min') | float(20) }}

    # Standard climate property: current observed humidity (read-only)
    current_humidity_template: >
      {{ states('sensor.airflow_avg_indoor_humidity_5min') | float(50) }}

    # Standard climate property: user-set target humidity, backed by input_number for persistence
    target_humidity_template: >
      {{ states('input_number.airflow_target_humidity') | float(55) }}
    min_humidity: 30
    max_humidity: 80

    set_humidity:
      - action: input_number.set_value
        target:
          entity_id: input_number.airflow_target_humidity
        data:
          value: "{{ humidity }}"

    # Standard climate property: user-set target temperature, backed by input_number for persistence
    target_temperature_template: >
      {{ states('input_number.airflow_cooling_target_temperature') | float(21.5) }}
    min_temp: 18
    max_temp: 26
    temp_step: 0.5

    # Modes:
    #   off       — stop automation, reset profile to comfort (default)
    #   heat      — manual warm profile
    #   heat_cool — manual comfort profile - will in the future also be used for spring times to heat with sun, but don't let it heat up as much as in winter.
    #   cool      — manual cool profile
    #   auto      — automation enabled (profile auto-selected) - uses heating-cooling indicator
    modes:
      - "off"
      - "heat"
      - "heat_cool"
      - "cool"
      - "auto"
    hvac_mode_template: >
      {% if is_state('input_boolean.airflow_cooling_automatic_enabled', 'on') %}
        auto
      {% elif is_state('select.comfoconnect_pro_temperature_profile', 'warm') %}
        heat
      {% elif is_state('select.comfoconnect_pro_temperature_profile', 'comfort') %}
        heat_cool
      {% elif is_state('select.comfoconnect_pro_temperature_profile', 'cool') %}
        cool
      {% else %}
        off
      {% endif %}
    set_hvac_mode:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'auto' }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.airflow_cooling_automatic_enabled
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'off' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.airflow_cooling_automatic_enabled
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: comfort
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'heat' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.airflow_cooling_automatic_enabled
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: warm
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'heat_cool' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.airflow_cooling_automatic_enabled
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: comfort
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'cool' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.airflow_cooling_automatic_enabled
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: cool

    # Standard climate property: reflects actual ComfoConnect profile state (read-only)
    hvac_action_template: >
      {% set profile = states('select.comfoconnect_pro_temperature_profile') %}
      {% if profile == 'warm' %}
        heating
      {% elif profile == 'cool' %}
        cooling
      {% elif profile == 'comfort' %}
        fan
      {% else %}
        idle
      {% endif %}

    # Standard climate setter: persists new target temperature to input_number
    set_temperature:
      - action: input_number.set_value
        target:
          entity_id: input_number.airflow_cooling_target_temperature
        data:
          value: "{{ temperature }}"

    # Extra attributes: expose related sensors/inputs not covered by standard climate properties
    # needs https://github.com/jcwillox/hass-template-climate/pull/134/changes
    # TODO: we will fork and fix it.
 #   attributes:
 #     outdoor_dew: "{{ states('sensor.airflow_outdoor_dew_5min') | float(none) }}"
 #     outdoor_temp: "{{ states('sensor.airflow_outdoor_temp_5min') | float(none) }}"
 #     indoor_dew: "{{ states('sensor.airflow_min_indoor_dew_5min') | float(none) }}"
 #     free_cooling_available: "{{ is_state('binary_sensor.airflow_free_cooling_available', 'on') }}"
 #     min_dew_diff: "{{ states('input_number.airflow_min_dew_diff') | float(none) }}"
 #     min_temp_diff: "{{ states('input_number.airflow_min_temp_diff') | float(none) }}"
 #     heating_cooling_indicator: "{{ states('sensor.heating_cooling_indicator') }}"
 #     outdoor_temp_48h_mean: "{{ states('sensor.wheatherstation_outdoor_temperature_48h_mean') | float(none) }}"

# --- AUTOMATION ---
automation:
  # Sets ComfoConnect temperature profile based on heating/cooling indicator and free cooling state
  - id: airflow_cooling_set_temperature_profile
    alias: "Airflow: Set Temperature Profile"
    description: "Profile warm/comfort/cool driven by heating-cooling indicator, free cooling state, and indoor humidity"
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.heating_cooling_indicator
        id: heating_cooling_changed
      - platform: state
        entity_id: binary_sensor.airflow_free_cooling_available
        id: free_cooling_changed
      - platform: state
        entity_id: sensor.airflow_avg_indoor_humidity_5min
        id: humidity_changed
    # Guard: skip all profile changes when automatic control is disabled
    condition:
      - condition: state
        entity_id: input_boolean.airflow_cooling_automatic_enabled
        state: "on"
    action:
      - choose:
          # Block 1: Low moisture — warm profile to retain humidity (any season)
          - conditions:
              - condition: template
                value_template: >
                  {% set hum  = states('sensor.airflow_avg_indoor_humidity_5min') | float(50) %}
                  {% set tgt  = states('input_number.airflow_target_humidity') | float(55) %}
                  {% set hyst = states('input_number.airflow_humidity_hysteresis') | float(2) %}
                  {{ hum < (tgt - hyst) }}
              - condition: not
                conditions:
                  - condition: state
                    entity_id: select.comfoconnect_pro_temperature_profile
                    state: "warm"
            sequence:
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: "warm"
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Warm Profile"
                  message: >
                    Indoor humidity {{ states('sensor.airflow_avg_indoor_humidity_5min') }}%
                    below target {{ states('input_number.airflow_target_humidity') }}%
                    — profile set to Warm to retain moisture.

          # Block 2: Free cooling available + (high moisture OR cooling season) — cool profile.
          # Merges original cooling-season branch with new moisture-driven branch.
          - conditions:
              - condition: state
                entity_id: binary_sensor.airflow_free_cooling_available
                state: "on"
              - condition: or
                conditions:
                  - condition: template
                    value_template: >
                      {% set hum  = states('sensor.airflow_avg_indoor_humidity_5min') | float(50) %}
                      {% set tgt  = states('input_number.airflow_target_humidity') | float(55) %}
                      {% set hyst = states('input_number.airflow_humidity_hysteresis') | float(2) %}
                      {{ hum > (tgt + hyst) }}
                  - condition: state
                    entity_id: sensor.heating_cooling_indicator
                    state: "passive_cooling"
                  - condition: state
                    entity_id: sensor.heating_cooling_indicator
                    state: "active_cooling"
              - condition: not
                conditions:
                  - condition: state
                    entity_id: select.comfoconnect_pro_temperature_profile
                    state: "cool"
            sequence:
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: "cool"
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Cool Profile"
                  message: >
                    {% set hum  = states('sensor.airflow_avg_indoor_humidity_5min') | float(50) %}
                    {% set tgt  = states('input_number.airflow_target_humidity') | float(55) %}
                    {% set hyst = states('input_number.airflow_humidity_hysteresis') | float(2) %}
                    {% if hum > (tgt + hyst) %}
                      High indoor humidity {{ hum }}% + free cooling active — profile set to Cool to flush humid air.
                    {% else %}
                      Free cooling active — profile set to Cool.
                    {% endif %}

          # Block 3: Active heating — warm profile
          - conditions:
              - condition: state
                entity_id: sensor.heating_cooling_indicator
                state: "active_heating"
              - condition: not
                conditions:
                  - condition: state
                    entity_id: select.comfoconnect_pro_temperature_profile
                    state: "warm"
            sequence:
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: "warm"
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Warm Profile"
                  message: "Outdoor ≤5°C — profile set to Warm."

          # Block 4: Neutral season or cooling season without free cooling — comfort profile.
          # Merges original neutral and cooling+no-free-cooling branches.
          - conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity_id: sensor.heating_cooling_indicator
                    state: "neutral"
                  - condition: and
                    conditions:
                      - condition: or
                        conditions:
                          - condition: state
                            entity_id: sensor.heating_cooling_indicator
                            state: "passive_cooling"
                          - condition: state
                            entity_id: sensor.heating_cooling_indicator
                            state: "active_cooling"
                      - condition: state
                        entity_id: binary_sensor.airflow_free_cooling_available
                        state: "off"
              - condition: not
                conditions:
                  - condition: state
                    entity_id: select.comfoconnect_pro_temperature_profile
                    state: "comfort"
            sequence:
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: "comfort"
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Comfort Profile"
                  message: >
                    {% if is_state('sensor.heating_cooling_indicator', 'neutral') %}
                      Outdoor 5–10°C — profile set to Comfort.
                    {% else %}
                      Cooling season, free cooling inactive — profile set to Comfort.
                    {% endif %}

        # Fallback: indicator unavailable and no humidity override — skip profile change
        default:
          - action: system_log.write
            data:
              message: "Airflow: heating_cooling_indicator unavailable — skipping profile change"
              level: warning

  # Reduces ventilation to low when humidity is high AND outdoor air is too humid to help.
  # Restores auto mode when resolved. Auto mode is disabled first to prevent ComfoConnect
  # from overriding the manual level.
  - id: airflow_moisture_ventilation_preset
    alias: "Airflow: Moisture Ventilation Preset"
    description: >
      Reduces ventilation to low when humidity exceeds (target + hysteresis) AND outdoor air
      is too humid to help. Restores auto mode when resolved.
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.airflow_moisture_ventilation_low_needed
    condition:
      - condition: state
        entity_id: input_boolean.airflow_cooling_automatic_enabled
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.airflow_moisture_ventilation_low_needed
                state: "on"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.comfoconnect_pro_auto_mode
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_ventilation_level
                data:
                  option: "low"
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Low Level"
                  message: >
                    Indoor humidity {{ states('sensor.airflow_avg_indoor_humidity_5min') }}%
                    above target and outdoor air too humid — ventilation set to Low.
          - conditions:
              - condition: state
                entity_id: binary_sensor.airflow_moisture_ventilation_low_needed
                state: "off"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.comfoconnect_pro_auto_mode
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Auto Mode Restored"
                  message: >
                    Indoor humidity normalized or outdoor air now drier
                    — ComfoConnect auto mode restored.
        default:
          - action: system_log.write
            data:
              message: "Airflow moisture preset: unexpected binary sensor state — no action"
              level: warning

# --- GROUP ---
# All entities belonging to the airflow feature
group:
  airflow_cooling:
    name: "Airflow Cooling"
    entities:
      # Filter sensors (smoothed inputs)
      - sensor.airflow_min_indoor_dew_5min
      - sensor.airflow_avg_indoor_temp_5min
      - sensor.airflow_outdoor_dew_5min
      - sensor.airflow_outdoor_temp_5min
      - sensor.airflow_outdoor_air_humidity_5min
      - sensor.airflow_supply_air_temp_5min
      - sensor.airflow_supply_air_humidity_5min
      - sensor.airflow_extract_air_temp_5min
      - sensor.airflow_extract_air_humidity_5min
      # Template sensors (raw aggregates + bypass)
      - sensor.airflow_min_indoor_dew
      - sensor.airflow_avg_indoor_temp
      - sensor.airflow_bypass_estimation
      # Binary sensor (free cooling decision)
      - binary_sensor.airflow_free_cooling_available
      # Helpers
      - input_boolean.airflow_cooling_automatic_enabled
      - input_number.airflow_cooling_target_temperature
      - input_number.airflow_min_dew_diff
      - input_number.airflow_min_temp_diff
      - input_number.airflow_bypass_efficiency_max
      - input_number.airflow_bypass_efficiency_min
      # Climate entity + humidity sensors
      - climate.airflow_climate
      - sensor.airflow_avg_indoor_humidity
      - sensor.airflow_avg_indoor_humidity_5min
      # Humidity helpers + binary sensor
      - input_number.airflow_target_humidity
      - input_number.airflow_humidity_hysteresis
      - binary_sensor.airflow_moisture_ventilation_low_needed
      # Automations
      - automation.airflow_cooling_set_temperature_profile
      - automation.airflow_moisture_ventilation_preset
