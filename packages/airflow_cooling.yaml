# --- CLIMATE ENTITY ---
# Requires HACS custom component: mikopp/hass-template-climate
# https://github.com/mikopp/hass-template-climate
climate:
  - platform: climate_template
    name: "Airflow Climate"
    unique_id: airflow_climate

    # Standard climate property: current observed temperature (read-only)
    current_temperature_template: >
      {{ states('sensor.airflow_avg_indoor_temp_5min') | float(20) }}

    # Standard climate property: current observed humidity (read-only)
    current_humidity_template: >
      {{ states('sensor.airflow_avg_indoor_humidity_5min') | float(50) }}

    # Standard climate property: user-set target humidity, backed by input_number for persistence.
    # Slider bounds track the min/max humidity helpers so target can't be set outside the band.
    # input_numbers are never unavailable — no float/int defaults needed here.
    target_humidity_template: >
      {{ states('input_number.airflow_target_humidity') | float }}
    min_humidity: 30
    max_humidity: 70

    set_humidity:
      - action: input_number.set_value
        target:
          entity_id: input_number.airflow_target_humidity
        data:
          value: "{{ humidity }}"

    # Standard climate property: user-set target temperature, backed by input_number for persistence
    # input_number: never unavailable — no default needed.
    target_temperature_template: >
      {{ states('input_number.airflow_cooling_target_temperature') | float }}
    min_temp: 18
    max_temp: 26
    temp_step: 0.5

    # Modes:
    #   off       — stop automation, reset profile to comfort (default)
    #   heat      — manual warm profile
    #   heat_cool — manual comfort profile - will in the future also be used for spring times to heat with sun, but don't let it heat up as much as in winter.
    #   cool      — manual cool profile
    #   auto      — automation enabled (profile auto-selected) - uses heating-cooling indicator
    hvac_modes:
      - "off"
      - "heat"
      - "heat_cool"
      - "cool"
      - "auto"
    hvac_mode_template: >
      {% if is_state('input_boolean.airflow_cooling_automatic_enabled', 'on') %}
        auto
      {% elif is_state('select.comfoconnect_pro_temperature_profile', 'warm') %}
        heat
      {% elif is_state('select.comfoconnect_pro_temperature_profile', 'comfort') %}
        heat_cool
      {% elif is_state('select.comfoconnect_pro_temperature_profile', 'cool') %}
        cool
      {% else %}
        off
      {% endif %}
    set_hvac_mode:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'auto' }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.airflow_cooling_automatic_enabled
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'off' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.airflow_cooling_automatic_enabled
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: comfort
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'heat' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.airflow_cooling_automatic_enabled
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: warm
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'heat_cool' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.airflow_cooling_automatic_enabled
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: comfort
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'cool' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.airflow_cooling_automatic_enabled
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: cool

    # Standard climate property: reflects actual ComfoConnect profile state (read-only).
    # 'drying' reflects moisture flushing — either a boost is running while free cooling is
    # active, or the cool profile is flushing humid air (binary_sensor.airflow_humidity_flush_needed).
    hvac_action_template: >
      {% set profile   = states('select.comfoconnect_pro_temperature_profile') %}
      {% set free_cool = is_state('binary_sensor.airflow_free_cooling_available', 'on') %}
      {% set boost_on  = is_state('switch.comfoconnect_pro_boost', 'on') %}
      {# Flush state comes from the dedicated sensor (mirrors Block 2's flush trigger): it
         already encodes the two dew branches, the ComfoConnect temp gate and season guard. #}
      {% set flush_needed = is_state('binary_sensor.airflow_humidity_flush_needed', 'on') %}
      {% if free_cool and boost_on %}
        drying
      {% elif profile == 'cool' and flush_needed %}
        drying
      {% elif profile == 'cool' %}
        cooling
      {% elif profile == 'warm' %}
        heating
      {% elif profile == 'comfort' %}
        fan
      {% else %}
        idle
      {% endif %}

    # Standard climate setter: persists new target temperature to input_number
    set_temperature:
      - action: input_number.set_value
        target:
          entity_id: input_number.airflow_cooling_target_temperature
        data:
          value: "{{ temperature }}"

    # Extra attributes: expose related sensors/inputs not covered by standard climate properties
    # requires mikopp/hass-template-climate (fork of jcwillox with attributes support added)
 #   attributes:
 #     outdoor_dew: "{{ states('sensor.airflow_outdoor_dew_5min') | float(none) }}"
 #     outdoor_temp: "{{ states('sensor.airflow_outdoor_temp_5min') | float(none) }}"
 #     indoor_dew: "{{ states('sensor.airflow_min_indoor_dew_5min') | float(none) }}"
 #     free_cooling_available: "{{ is_state('binary_sensor.airflow_free_cooling_available', 'on') }}"
 #     min_dew_diff: "{{ states('input_number.airflow_min_dew_diff') | float(none) }}"
 #     min_temp_diff: "{{ states('input_number.airflow_min_temp_diff') | float(none) }}"
 #     heating_cooling_indicator: "{{ states('sensor.heating_cooling_indicator') }}"
 #     outdoor_temp_48h_mean: "{{ states('sensor.wheatherstation_outdoor_temperature_48h_mean') | float(none) }}"

# --- AUTOMATION ---
automation:
  # UNIFIED VENTILATION CONTROLLER — single source of truth for all ComfoConnect outputs that the
  # automation owns: temperature profile (warm/comfort/cool), ventilation preset (low/medium) and
  # auto_mode. On every relevant input change it recomputes the COMPLETE desired state from the
  # decision sensors and applies it idempotently, so no two automations ever fight over auto_mode or
  # the preset. The boost (binary_sensor.airflow_humidity_drying_needed → switch boost) is the only
  # output left to a separate automation; this controller never touches it.
  #   Section 1 — Temperature profile: runs whenever automatic control is on, even during Away.
  #   Section 2 — Preset / auto_mode: runs only when Away is off (Away owns ventilation level).
  - id: airflow_ventilation_controller
    alias: "Airflow: Ventilation Controller"
    description: >
      Single deterministic controller for ComfoConnect profile + ventilation preset + auto_mode.
      Profile follows heating/cooling indicator, free cooling, flush and indoor dew. Preset/auto_mode
      derive from low_needed (→ low), free/flush (→ medium), else auto restored. Idempotent: only
      writes an output when it differs from the desired state. Boost is handled separately.
    # queued (not restart): a rapid second trigger must never abort a partial apply mid-sequence
    # (auto_mode off → preset). Each run is short and idempotent, so stacked already-satisfied runs
    # are cheap no-ops.
    mode: queued
    trigger:
      - platform: state
        entity_id: sensor.heating_cooling_indicator
        id: heating_cooling_changed
      - platform: state
        entity_id: binary_sensor.airflow_free_cooling_available
        id: free_cooling_changed
      - platform: state
        entity_id: binary_sensor.airflow_humidity_flush_needed
        id: flush_changed
      - platform: state
        entity_id: sensor.airflow_avg_indoor_humidity_5min
        id: humidity_changed
      # Preset/auto_mode drivers (Section 2)
      - platform: state
        entity_id: binary_sensor.airflow_moisture_ventilation_low_needed
        id: low_changed
      # Schedule flipped auto_mode back on while an owner is active → re-assert manual preset
      - platform: state
        entity_id: switch.comfoconnect_pro_auto_mode
        to: "on"
        id: auto_mode_on
      # Schedule dropped the preset to low while an owner wants medium → re-bump
      - platform: state
        entity_id: select.comfoconnect_pro_ventilation_preset
        to: "low"
        id: preset_set_low
      # Away ended → re-evaluate preset/auto_mode now that Section 2 may act again
      - platform: state
        entity_id: switch.comfoconnect_pro_away_function
        to: "off"
        id: away_ended
      # Re-evaluate once on startup after sensors leave unavailable
      - platform: homeassistant
        event: start
        id: ha_start
    # Guard: skip everything when automatic control is disabled. Away is NOT a top-level condition —
    # the profile (Section 1) must still follow the season during Away; Section 2 guards Away itself.
    condition:
      - condition: state
        entity_id: input_boolean.airflow_cooling_automatic_enabled
        state: "on"
    action:
      # On HA startup, wait for decision sensors to be available before evaluating.
      # Real state-change triggers skip this block entirely.
      # mode: restart ensures a real trigger aborts this wait and runs immediately.
      - if:
          - condition: trigger
            id: ha_start
        then:
          - wait_template: >
              {{ has_value('sensor.heating_cooling_indicator') and
                 has_value('binary_sensor.airflow_free_cooling_available') and
                 has_value('binary_sensor.airflow_humidity_flush_needed') and
                 has_value('binary_sensor.airflow_moisture_ventilation_low_needed') }}
            timeout: "00:05:00"
            continue_on_timeout: false

      # ===== SECTION 1: TEMPERATURE PROFILE (runs even during Away) =====
      - choose:
          # Block 1: Moisture protect OR active heating without free cooling → warm profile.
          # Case A: indoor dew below the min-humidity-derived dew (at target_temp) AND not cooling
          #         season — dry air, retain moisture. A stable, temperature-independent threshold.
          #         Cooling season is exempt: indoor moisture naturally dips below min in summer.
          # Case B: active heating + free cooling unavailable AND no humidity flush pending —
          #         heating season, no free exchange. The flush guard yields to Block 2 when
          #         indoor moisture is above max (Branch 1), the higher-priority safety action;
          #         dry-air retention (Case A) is unaffected (dew_min < dew_max, so Case A and a
          #         flush can never both be true).
          - conditions:
              - condition: or
                conditions:
                  - condition: and
                    conditions:
                      - condition: template
                        value_template: >
                          {# Indoor moisture below the min-derived dew (−0.1°C anti-chatter epsilon). #}
                          {{ states('sensor.airflow_min_indoor_dew_5min') | is_number and
                             states('sensor.airflow_dew_point_min') | is_number and
                             states('sensor.airflow_min_indoor_dew_5min') | float <
                             states('sensor.airflow_dew_point_min') | float - 0.1 }}
                      - condition: not
                        conditions:
                          - condition: state
                            entity_id: sensor.heating_cooling_indicator
                            state: "passive_cooling"
                          - condition: state
                            entity_id: sensor.heating_cooling_indicator
                            state: "active_cooling"
                  - condition: and
                    conditions:
                      - condition: state
                        entity_id: sensor.heating_cooling_indicator
                        state: "active_heating"
                      - condition: state
                        entity_id: binary_sensor.airflow_free_cooling_available
                        state: "off"
                      - condition: state
                        entity_id: binary_sensor.airflow_humidity_flush_needed
                        state: "off"
              - condition: not
                conditions:
                  - condition: state
                    entity_id: select.comfoconnect_pro_temperature_profile
                    state: "warm"
            sequence:
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: "warm"
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Warm Profile"
                  message: >
                    {% set dew     = states('sensor.airflow_min_indoor_dew_5min') %}
                    {% set dew_min = states('sensor.airflow_dew_point_min') %}
                    {% set rh      = states('sensor.airflow_avg_indoor_humidity_5min') %}
                    {% if dew | is_number and dew_min | is_number and dew | float < dew_min | float %}
                      Indoor dew {{ dew | float }}°C below min-dew {{ dew_min | float }}°C
                      (≈{{ rh }}% RH, non-cooling season) — profile set to Warm to retain moisture.
                    {% else %}
                      Active heating, free cooling unavailable — profile set to Warm.
                    {% endif %}

          # Block 2: Free cooling (cooling season) OR humidity flush → cool profile.
          # Case A: free cooling available AND cooling season — always cool to maximise the
          #         free-cooling benefit. UNCHANGED behaviour.
          # Case B: binary_sensor.airflow_humidity_flush_needed is ON — flush indoor moisture
          #         toward max even when target humidity is unreachable and even when the
          #         (dew_target-gated) free-cooling sensor is OFF. The flush sensor already
          #         encodes the two dew branches, the ComfoConnect temp gate (Branch 2 only),
          #         the season guard and hysteresis, so no extra gate is needed here.
          - conditions:
              - condition: or
                conditions:
                  - condition: and
                    conditions:
                      - condition: state
                        entity_id: binary_sensor.airflow_free_cooling_available
                        state: "on"
                      - condition: or
                        conditions:
                          - condition: state
                            entity_id: sensor.heating_cooling_indicator
                            state: "passive_cooling"
                          - condition: state
                            entity_id: sensor.heating_cooling_indicator
                            state: "active_cooling"
                  - condition: state
                    entity_id: binary_sensor.airflow_humidity_flush_needed
                    state: "on"
              - condition: not
                conditions:
                  - condition: state
                    entity_id: select.comfoconnect_pro_temperature_profile
                    state: "cool"
            sequence:
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: "cool"
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: >
                    {% if is_state('binary_sensor.airflow_humidity_flush_needed', 'on') %}
                      Ventilation: Humidity flushing
                    {% else %}
                      Ventilation: Free Cooling
                    {% endif %}
                  message: >
                    {% set dew     = states('sensor.airflow_min_indoor_dew_5min') %}
                    {% set dew_max = states('sensor.airflow_dew_point_max') %}
                    {% set rh      = states('sensor.airflow_avg_indoor_humidity_5min') %}
                    {% if is_state('binary_sensor.airflow_humidity_flush_needed', 'on') %}
                      Indoor dew {{ dew }}°C vs max-dew {{ dew_max }}°C
                      (≈{{ rh }}% RH) — profile set to Cool to flush humid air.
                    {% else %}
                      Free cooling active (cooling season) — profile set to Cool.
                    {% endif %}

          # Block 3: Neutral season or cooling season without free cooling → comfort profile.
          # Dead-band guard [min, max] prevents overriding Block 1's warm profile on re-triggers.
          - conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity_id: sensor.heating_cooling_indicator
                    state: "neutral"
                  - condition: and
                    conditions:
                      - condition: or
                        conditions:
                          - condition: state
                            entity_id: sensor.heating_cooling_indicator
                            state: "passive_cooling"
                          - condition: state
                            entity_id: sensor.heating_cooling_indicator
                            state: "active_cooling"
                      - condition: state
                        entity_id: binary_sensor.airflow_free_cooling_available
                        state: "off"
              - condition: template
                value_template: >
                  {# Indoor moisture within the dead-band [dew_min, dew_max] (inclusive, no epsilon). #}
                  {% set dew    = states('sensor.airflow_min_indoor_dew_5min') %}
                  {% set dew_lo = states('sensor.airflow_dew_point_min') | float %}
                  {% set dew_hi = states('sensor.airflow_dew_point_max') | float %}
                  {{ dew | is_number and dew_lo <= dew | float <= dew_hi }}
              - condition: not
                conditions:
                  - condition: state
                    entity_id: select.comfoconnect_pro_temperature_profile
                    state: "comfort"
            sequence:
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: "comfort"
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Comfort Profile"
                  message: >
                    {% if is_state('sensor.heating_cooling_indicator', 'neutral') %}
                      Neutral season — profile set to Comfort.
                    {% else %}
                      Cooling season, free cooling inactive — profile set to Comfort.
                    {% endif %}

          # Block 4: Bypass-close recovery — profile is stuck at `cool` with no legitimate owner.
          #
          # WHY THIS BLOCK EXISTS ("stuck-cool trap"):
          #   Block 3 can only close the bypass (cool → comfort) when indoor dew is already inside
          #   the [dew_min, dew_max] dead-band. In two trap scenarios no earlier block matches:
          #     • C7 (overcool, DRY in cooling season):  1A excluded in cooling; 3 band-fails (DRY).
          #     • C8 (humid,    HUM in cooling season):  1A needs DRY; 3 band-fails (HUM).
          #     • N3 (humid,    HUM in neutral season):  1A needs DRY; 3 band-fails (HUM).
          #   All three leave the `choose:` falling through to `default: []`, freezing the profile
          #   at `cool`. The humid traps are especially harmful: an open bypass during a humid spell
          #   keeps importing humid outdoor air even while `low` preset reduces the rate — the open
          #   bypass defeats heat-recovery mode.
          #
          # FIX LOGIC:
          #   Close the bypass back to `comfort` whenever `cool` is the current profile AND there is
          #   no active owner (free cooling off, humidity flush off) AND it is not heating season.
          #   Heating season is excluded because Block 1B (active_heating → warm) takes priority and
          #   will have already set `warm`, making Block 4 inert.
          #
          # WHY THIS CANNOT OSCILLATE:
          #   Block 4 requires `profile == cool`. Any earlier block that fires first will flip the
          #   profile away from `cool`, making Block 4 inert on the very next re-trigger:
          #     • NEUT + DRY + cool → Block 1A fires first → warm → Block 4 sees profile ≠ cool.
          #     • HEAT + cool + free–/flush– → Block 1B fires first → warm → same.
          #     • In-band + cool → Block 3 fires first → comfort → Block 4 sees profile ≠ cool.
          #   The `free– AND flush–` guard suppresses Block 4 for any legitimate `cool` (Block 2
          #   holds cool while an owner is active, and Block 4 is never reached by the `choose:`).
          #   Block 4 uniquely drains the out-of-band DRY/HUM stuck-cool trap.
          - conditions:
              # Profile must already be `cool` — only the stuck trap value, never warm/comfort.
              - condition: state
                entity_id: select.comfoconnect_pro_temperature_profile
                state: "cool"
              # No active free-cooling owner — if free cooling is on, Block 2A should hold `cool`.
              - condition: state
                entity_id: binary_sensor.airflow_free_cooling_available
                state: "off"
              # No active humidity-flush owner — if flush is on, Block 2B should hold `cool`.
              - condition: state
                entity_id: binary_sensor.airflow_humidity_flush_needed
                state: "off"
              # Not heating season — Block 1B owns heating season (sets warm first); belt-and-suspenders.
              - condition: not
                conditions:
                  - condition: state
                    entity_id: sensor.heating_cooling_indicator
                    state: "active_heating"
            sequence:
              # Close the bypass by restoring the comfort profile.
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: "comfort"
              # Notify: bypass closed because cool is no longer warranted.
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Comfort Profile"
                  message: >
                    {% set dew     = states('sensor.airflow_min_indoor_dew_5min') %}
                    {% set dew_min = states('sensor.airflow_dew_point_min') %}
                    {% set dew_max = states('sensor.airflow_dew_point_max') %}
                    {% set rh      = states('sensor.airflow_avg_indoor_humidity_5min') %}
                    Bypass closed — Cool no longer warranted (free cooling and flush both cleared).
                    Indoor dew {{ dew }}°C (≈{{ rh }}% RH) outside comfort band
                    [{{ dew_min }}–{{ dew_max }}°C] — profile restored to Comfort.

          # Block 5: Warm-stuck recovery — profile is stuck at `warm` in cooling season with no owner.
          #
          # WHY THIS BLOCK EXISTS ("stuck-warm trap"):
          #   Symmetric twin of Block 4. When season transitions HEAT→COOL while profile is `warm`,
          #   and indoor dew sits outside [dew_min, dew_max], no earlier block matches:
          #     • W1 (overcool, DRY in cooling season): 1A excluded (cooling season); 3 band-fails (DRY).
          #     • W2 (humid,    HUM in cooling season): 1A needs DRY; 3 band-fails (HUM).
          #   Result: bypass stays CLOSED in summer — ERV runs full heat-recovery when it should cool.
          #   Less harmful than the cool-stuck trap (no overcool or open-bypass humidity import), but
          #   costs cooling efficiency until dew drifts into the dead-band or an owner fires.
          #
          # FIX LOGIC:
          #   Restore `comfort` when profile is `warm` AND cooling season is active AND no owner
          #   (free–, flush–). Cooling season check (passive or active) is explicit so this block
          #   is completely inert in neutral and heating seasons.
          #
          # WHY THIS CANNOT OSCILLATE:
          #   • Heating season: Block 1B fires first → re-asserts `warm`; Block 5 season-guarded off.
          #   • Neutral + DRY: Block 1A fires first (dew < dew_min, not cooling) → `warm`; Block 5
          #     inert (season ≠ cooling). Correct behaviour: dry neutral air should retain moisture.
          #   • Cooling + in-band: Block 3 fires first → `comfort`; Block 5 never reached by `choose:`.
          #   • Once Block 5 sets `comfort`, `profile != warm` makes Block 5 inert on next trigger.
          - conditions:
              # Profile must already be `warm` — only the stuck trap value in cooling season.
              - condition: state
                entity_id: select.comfoconnect_pro_temperature_profile
                state: "warm"
              # No active free-cooling owner (Block 2A would legitimately hold cool, not warm, anyway).
              - condition: state
                entity_id: binary_sensor.airflow_free_cooling_available
                state: "off"
              # No active humidity-flush owner.
              - condition: state
                entity_id: binary_sensor.airflow_humidity_flush_needed
                state: "off"
              # Cooling season only (passive or active) — neutral/heating seasons are handled by other blocks.
              - condition: or
                conditions:
                  - condition: state
                    entity_id: sensor.heating_cooling_indicator
                    state: "passive_cooling"
                  - condition: state
                    entity_id: sensor.heating_cooling_indicator
                    state: "active_cooling"
            sequence:
              # Restore comfort profile — bypass opens to normal heat-exchange mode for cooling season.
              - action: select.select_option
                target:
                  entity_id: select.comfoconnect_pro_temperature_profile
                data:
                  option: "comfort"
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Comfort Profile"
                  message: >
                    {% set dew     = states('sensor.airflow_min_indoor_dew_5min') %}
                    {% set dew_min = states('sensor.airflow_dew_point_min') %}
                    {% set dew_max = states('sensor.airflow_dew_point_max') %}
                    {% set rh      = states('sensor.airflow_avg_indoor_humidity_5min') %}
                    Cooling season — Warm profile no longer warranted (free cooling and flush both off).
                    Indoor dew {{ dew }}°C (≈{{ rh }}% RH) outside comfort band
                    [{{ dew_min }}–{{ dew_max }}°C] — profile restored to Comfort.

        # Fallback: no rule matched (recovery zone, already-correct profile, or edge case) → no-op.
        # After Blocks 4 and 5 drain the stuck-cool and stuck-warm traps, the only remaining
        # default path is an already-correct profile (idempotency guard fired above) or H6
        # (heating season + free cooling active — vanishingly rare, self-heals on next trigger).
        default: []

      # ===== SECTION 2: VENTILATION PRESET / AUTO_MODE (skipped during Away) =====
      # Away owns the ventilation level, so we only touch preset/auto_mode when Away is off.
      # Desired state is a priority function of the decision sensors:
      #   low_needed        → auto_mode OFF, preset low
      #   free OR flush     → auto_mode OFF, preset medium   (boost rides on top in hardware)
      #   otherwise         → auto_mode ON  (hand control back to the ComfoConnect schedule)
      # Each branch carries an idempotent "needs change" guard, so a notify fires only on a real
      # transition. auto_mode is turned OFF before the preset is written so the schedule can't
      # momentarily override the manual level. low and flush are already mutually exclusive in the
      # sensors; the low-before-medium ordering is belt-and-suspenders.
      - if:
          - condition: state
            entity_id: switch.comfoconnect_pro_away_function
            state: "off"
        then:
          - choose:
              # Low: reduce ventilation. Act unless we are already at (auto off, preset low).
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.airflow_moisture_ventilation_low_needed
                    state: "on"
                  - condition: template
                    value_template: >
                      {{ not (is_state('switch.comfoconnect_pro_auto_mode', 'off') and
                              is_state('select.comfoconnect_pro_ventilation_preset', 'low')) }}
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: switch.comfoconnect_pro_auto_mode
                  - action: select.select_option
                    target:
                      entity_id: select.comfoconnect_pro_ventilation_preset
                    data:
                      option: "low"
                  - action: notify.mobile_app_greywinds_iphone
                    data:
                      title: "Ventilation: Low Level"
                      message: >
                        Indoor dew {{ states('sensor.airflow_min_indoor_dew_5min') }}°C above target-dew
                        {{ states('sensor.airflow_dew_point_target') }}°C
                        (≈{{ states('sensor.airflow_avg_indoor_humidity_5min') }}% RH) and outdoor air
                        too humid — ventilation set to Low.

              # Medium: free cooling or humidity flush wants more air exchange. Act unless we are
              # already at (auto off, preset medium). A running boost overrides the level in hardware
              # anyway; medium is the correct fallback for when the boost expires while flush continues.
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.airflow_moisture_ventilation_low_needed
                    state: "off"
                  - condition: or
                    conditions:
                      - condition: state
                        entity_id: binary_sensor.airflow_free_cooling_available
                        state: "on"
                      - condition: state
                        entity_id: binary_sensor.airflow_humidity_flush_needed
                        state: "on"
                  - condition: template
                    value_template: >
                      {{ not (is_state('switch.comfoconnect_pro_auto_mode', 'off') and
                              is_state('select.comfoconnect_pro_ventilation_preset', 'medium')) }}
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: switch.comfoconnect_pro_auto_mode
                  - action: select.select_option
                    target:
                      entity_id: select.comfoconnect_pro_ventilation_preset
                    data:
                      option: "medium"
                  - action: notify.mobile_app_greywinds_iphone
                    data:
                      title: "Ventilation: Medium Preset"
                      message: >
                        {% if is_state('binary_sensor.airflow_humidity_flush_needed', 'on') %}
                          Humidity flush active, auto schedule at Low
                          — preset bumped to Medium for faster moisture exchange.
                        {% else %}
                          Free cooling available, auto schedule at Low
                          — preset bumped to Medium for faster air exchange.
                        {% endif %}

              # Restore: no owner active (low off, free off, flush off). Hand control back to the
              # ComfoConnect schedule, but only if WE had taken it (auto_mode currently off).
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.airflow_moisture_ventilation_low_needed
                    state: "off"
                  - condition: state
                    entity_id: binary_sensor.airflow_free_cooling_available
                    state: "off"
                  - condition: state
                    entity_id: binary_sensor.airflow_humidity_flush_needed
                    state: "off"
                  - condition: state
                    entity_id: switch.comfoconnect_pro_auto_mode
                    state: "off"
                sequence:
                  - action: switch.turn_on
                    target:
                      entity_id: switch.comfoconnect_pro_auto_mode
                  - action: notify.mobile_app_greywinds_iphone
                    data:
                      title: "Ventilation: Auto Mode Restored"
                      message: >
                        Indoor humidity normalized, free cooling and humidity flush no longer needed
                        — ComfoConnect auto mode restored.

            # No branch matched: desired state already satisfied → no-op (avoids log spam).
            default: []

  # Manages boost when outdoor air is dry enough to flush indoor humidity.
  # Trigger IDs separate the three entry points so boost_expired can only reach Branch 1
  # (re-enable), preventing a double disable+notify when the hardware timer fires after
  # drying_needed already went off.
  - id: airflow_humidity_drying_boost
    alias: "Airflow: Humidity Drying Boost"
    description: >
      Runs a 30-minute ventilation boost when outdoor air is dry enough to flush indoor humidity.
      Re-enables automatically if boost expires while drying is still needed.
      Stops and notifies when conditions are no longer met.
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.airflow_humidity_drying_needed
        to: "on"
        id: drying_needed_on
      - platform: state
        entity_id: binary_sensor.airflow_humidity_drying_needed
        to: "off"
        id: drying_needed_off
      - platform: state
        entity_id: switch.comfoconnect_pro_boost
        to: "off"
        id: boost_expired
      - platform: state
        entity_id: switch.comfoconnect_pro_away_function
        to: "off"
        id: away_ended
      - platform: homeassistant
        event: start
        id: ha_start
    condition:
      - condition: state
        entity_id: input_boolean.airflow_cooling_automatic_enabled
        state: "on"
      - condition: state
        entity_id: switch.comfoconnect_pro_away_function
        state: "off"
    action:
      - if:
          - condition: trigger
            id: ha_start
        then:
          - wait_template: >
              {{ has_value('binary_sensor.airflow_humidity_drying_needed') }}
            timeout: "00:05:00"
            continue_on_timeout: false
      - choose:
          # Enable boost: drying needed and boost not already running
          - conditions:
              - condition: trigger
                id:
                  - drying_needed_on
                  - boost_expired
                  - ha_start
              - condition: state
                entity_id: binary_sensor.airflow_humidity_drying_needed
                state: "on"
              - condition: not
                conditions:
                  - condition: state
                    entity_id: switch.comfoconnect_pro_boost
                    state: "on"
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.comfoconnect_pro_boost_time
                data:
                  value: 30
              - action: switch.turn_on
                target:
                  entity_id: switch.comfoconnect_pro_boost
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Humidity Drying Boost"
                  message: >
                    Indoor humidity {{ states('sensor.airflow_avg_indoor_humidity_5min') }}%
                    (dew {{ states('sensor.airflow_min_indoor_dew_5min') }}°C)
                    — boost started to flush humid air via free cooling.

          # Disable boost: drying no longer needed
          - conditions:
              - condition: trigger
                id: drying_needed_off
              - condition: state
                entity_id: binary_sensor.airflow_humidity_drying_needed
                state: "off"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.comfoconnect_pro_boost
              - action: notify.mobile_app_greywinds_iphone
                data:
                  title: "Ventilation: Drying Boost Stopped"
                  message: "Humidity drying conditions no longer met — boost stopped."

        default:
          - action: system_log.write
            data:
              message: "Airflow drying boost: unexpected trigger/state combination — no action"
              level: warning

# --- GROUP ---
# All entities belonging to the airflow feature
group:
  airflow_cooling:
    name: "Airflow Cooling"
    entities:
      # Filter sensors (smoothed inputs)
      - sensor.airflow_min_indoor_dew_5min
      - sensor.airflow_avg_indoor_temp_5min
      - sensor.airflow_outdoor_dew_5min
      - sensor.airflow_outdoor_temp_5min
      - sensor.airflow_wheatherstation_outdoor_temp_5min
      - sensor.airflow_outdoor_air_humidity_5min
      - sensor.airflow_supply_air_temp_5min
      - sensor.airflow_supply_air_humidity_5min
      - sensor.airflow_extract_air_temp_5min
      - sensor.airflow_extract_air_humidity_5min
      # Template sensors (raw aggregates + bypass)
      - sensor.airflow_min_indoor_dew
      - sensor.airflow_avg_indoor_temp
      - sensor.airflow_bypass_estimation
      # Dew-point thresholds (humidity helpers expressed as dew @ target temp)
      - sensor.airflow_dew_point_min
      - sensor.airflow_dew_point_target
      - sensor.airflow_dew_point_max
      # Read-only automation status (reason-based)
      - sensor.airflow_cooling_state
      # Binary sensor (free cooling decision)
      - binary_sensor.airflow_free_cooling_available
      # Binary sensor (humidity flush decision — drives cool profile)
      - binary_sensor.airflow_humidity_flush_needed
      # Helpers
      - input_boolean.airflow_cooling_automatic_enabled
      - input_number.airflow_cooling_target_temperature
      - input_number.airflow_min_dew_diff
      - input_number.airflow_min_temp_diff
      - input_number.airflow_bypass_efficiency_max
      - input_number.airflow_bypass_efficiency_min
      # Climate entity + humidity sensors
      - climate.airflow_climate
      - sensor.airflow_avg_indoor_humidity
      - sensor.airflow_avg_indoor_humidity_5min
      # Humidity helpers + binary sensors
      - input_number.airflow_target_humidity
      - input_number.airflow_min_humidity
      - input_number.airflow_max_humidity
      - binary_sensor.airflow_moisture_ventilation_low_needed
      # Drying boost
      - binary_sensor.airflow_humidity_drying_needed
      - schedule.airflow_boost_workday
      - schedule.airflow_boost_non_workday
      - switch.comfoconnect_pro_boost
      - number.comfoconnect_pro_boost_time
      # Automations
      - automation.airflow_ventilation_controller
      - automation.airflow_humidity_drying_boost
