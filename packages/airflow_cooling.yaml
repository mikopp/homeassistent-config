# --- FILTER SENSORS ---
# 5-minute time-weighted moving average + throttle per source.
# Template sensors (airflow_min_indoor_dew, airflow_avg_indoor_temp) are NOT excluded
# from recorder because the filter sensors below seed their moving average from history.
sensor:
  # Smooth avg indoor humidity — source is template sensor aggregating all indoor humidity sensors.
  # Defines the shared humidity filter chain (precision 1); reused by the other humidity sensors.
  - platform: filter
    unique_id: airflow_avg_indoor_humidity_5min
    name: "Airflow Avg Indoor Humidity 5min"
    entity_id: sensor.airflow_avg_indoor_humidity
    filters: &humidity_filters
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 1
      - filter: time_throttle
        window_size: "00:05"

  # Smooth avg indoor dew point — source is template sensor aggregating all indoor dew sensors.
  # Defines the shared temperature/dew filter chain (precision 2); reused by the other temp/dew sensors.
  - platform: filter
    unique_id: airflow_min_indoor_dew_5min
    name: "Airflow Avg Indoor Dew 5min"
    entity_id: sensor.airflow_min_indoor_dew
    filters: &temperature_filters
      - filter: time_simple_moving_average
        window_size: "00:05"
        precision: 2
      - filter: time_throttle
        window_size: "00:05"

  # Smooth avg indoor temperature — source is template sensor aggregating all indoor temp sensors
  - platform: filter
    unique_id: airflow_avg_indoor_temp_5min
    name: "Airflow Avg Indoor Temp 5min"
    entity_id: sensor.airflow_avg_indoor_temp
    filters: *temperature_filters

  # Smooth outdoor dew point from ComfoConnect
  - platform: filter
    unique_id: airflow_outdoor_dew_5min
    name: "Airflow Outdoor Dew 5min"
    entity_id: sensor.comfoconnect_pro_outdoor_air_dew_point
    filters: *temperature_filters

  # Smooth outdoor temperature from ComfoConnect
  - platform: filter
    unique_id: airflow_outdoor_temp_5min
    name: "Airflow Outdoor Temp 5min"
    entity_id: sensor.comfoconnect_pro_outdoor_air_temperature
    filters: *temperature_filters

  # Smooth weatherstation outdoor temperature — same filter chain as ComfoConnect outdoor temp.
  # Used by airflow_humidity_drying_needed to gate the boost; smoothed to prevent short noise
  # spikes from prematurely starting or stopping a boost run.
  - platform: filter
    unique_id: airflow_wheatherstation_outdoor_temp_5min
    name: "Airflow Weatherstation Outdoor Temp 5min"
    entity_id: sensor.wheatherstation_outdoor_temperature
    filters: *temperature_filters

  # Smooth outdoor humidity from ComfoConnect
  - platform: filter
    unique_id: airflow_outdoor_air_humidity_5min
    name: "Airflow Outdoor Air Humidity 5min"
    entity_id: sensor.comfoconnect_pro_outdoor_air_humidity
    filters: *humidity_filters

  # Smooth supply air temperature from ComfoConnect
  - platform: filter
    unique_id: airflow_supply_air_temp_5min
    name: "Airflow Supply Air Temp 5min"
    entity_id: sensor.comfoconnect_pro_supply_air_temperature
    filters: *temperature_filters

  # Smooth supply air humidity from ComfoConnect
  - platform: filter
    unique_id: airflow_supply_air_humidity_5min
    name: "Airflow Supply Air Humidity 5min"
    entity_id: sensor.comfoconnect_pro_supply_air_humidity
    filters: *humidity_filters

  # Smooth extract air temperature from ComfoConnect
  - platform: filter
    unique_id: airflow_extract_air_temp_5min
    name: "Airflow Extract Air Temp 5min"
    entity_id: sensor.comfoconnect_pro_extract_air_temperature
    filters: *temperature_filters

  # Smooth extract air humidity from ComfoConnect
  - platform: filter
    unique_id: airflow_extract_air_humidity_5min
    name: "Airflow Extract Air Humidity 5min"
    entity_id: sensor.comfoconnect_pro_extract_air_humidity
    filters: *humidity_filters

# --- TEMPLATE SENSORS & BINARY SENSOR ---
template:
  - sensor:
      # Average humidity across all monitored indoor areas; falls back to ComfoConnect extract air when no labeled entities exist
      - unique_id: airflow_avg_indoor_humidity
        name: "Airflow Avg Indoor Humidity"
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        state: >
          {% set indoor_hums = label_entities('Indoor.Humidity')
            | map('states') | map('float', none) | reject('none') | list %}
          {% if indoor_hums | count > 0 %}
            {{ (indoor_hums | sum / indoor_hums | count) | round(1) }}
          {% else %}
            {# availability guard above ensures ComfoConnect sensor is live in this fallback branch — no default needed #}
            {{ states('sensor.comfoconnect_pro_extract_air_humidity') | float | round(1) }}
          {% endif %}
        availability: >
          {% set label_count = label_entities('Indoor.Humidity')
             | map('states') | map('float', none) | reject('none') | list | count %}
          {{ label_count > 0 or has_value('sensor.comfoconnect_pro_extract_air_humidity') }}

      # Average dewpoint across all monitored indoor areas; falls back to ComfoConnect extract air dew point when no labeled entities exist
      - unique_id: airflow_min_indoor_dew
        name: "Airflow Avg Indoor Dew"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set indoor_dews = label_entities('Indoor.Dewpoint')
            | map('states') | map('float', none) | reject('none') | list %}
          {% if indoor_dews | count > 0 %}
            {{ (indoor_dews | sum / indoor_dews | count) | round(2) }}
          {% else %}
            {# availability guard above ensures ComfoConnect sensor is live in this fallback branch — no default needed #}
            {{ states('sensor.comfoconnect_pro_extract_air_dew_point') | float | round(2) }}
          {% endif %}
        availability: >
          {% set label_count = label_entities('Indoor.Dewpoint')
             | map('states') | map('float', none) | reject('none') | list | count %}
          {{ label_count > 0 or has_value('sensor.comfoconnect_pro_extract_air_dew_point') }}

      # Average temperature across all monitored indoor areas; falls back to ComfoConnect extract air temperature when no labeled entities exist
      - unique_id: airflow_avg_indoor_temp
        name: "Airflow Avg Indoor Temp"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set indoor_temps = label_entities('Indoor.Temperature')
            | map('states') | map('float', none) | reject('none') | list %}
          {% if indoor_temps | count > 0 %}
            {{ (indoor_temps | sum / indoor_temps | count) | round(2) }}
          {% else %}
            {# availability guard above ensures ComfoConnect sensor is live in this fallback branch — no default needed #}
            {{ states('sensor.comfoconnect_pro_extract_air_temperature') | float | round(2) }}
          {% endif %}
        availability: >
          {% set label_count = label_entities('Indoor.Temperature')
             | map('states') | map('float', none) | reject('none') | list | count %}
          {{ label_count > 0 or has_value('sensor.comfoconnect_pro_extract_air_temperature') }}

      # Bypass percentage estimated from enthalpy efficiency, expressed in 15% steps.
      # Returns unavailable when the indoor/outdoor enthalpy delta is too small to be meaningful.
      - unique_id: airflow_bypass_estimation
        name: "Airflow Bypass Estimation"
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:valve
        availability: >
          {{ has_value('sensor.airflow_outdoor_temp_5min') and
             has_value('sensor.airflow_outdoor_air_humidity_5min') and
             has_value('sensor.airflow_supply_air_temp_5min') and
             has_value('sensor.airflow_supply_air_humidity_5min') and
             has_value('sensor.airflow_extract_air_temp_5min') and
             has_value('sensor.airflow_extract_air_humidity_5min') }}
        state: >
          {% set T_oa  = states('sensor.airflow_outdoor_temp_5min') | float %}
          {% set RH_oa = states('sensor.airflow_outdoor_air_humidity_5min') | float %}
          {% set T_sa  = states('sensor.airflow_supply_air_temp_5min') | float %}
          {% set RH_sa = states('sensor.airflow_supply_air_humidity_5min') | float %}
          {% set T_ra  = states('sensor.airflow_extract_air_temp_5min') | float %}
          {% set RH_ra = states('sensor.airflow_extract_air_humidity_5min') | float %}
          {% set eta_max = states('input_number.airflow_bypass_efficiency_max') | float %}  {# input_number: never unavailable, no default needed #}
          {% set eta_min = states('input_number.airflow_bypass_efficiency_min') | float %}  {# input_number: never unavailable, no default needed #}
          {# Actual station pressure in kPa; Ecowitt reports hPa so divide by 10. Falls back to standard atmosphere. #}
          {% set P_kpa  = states('sensor.wheatherstation_absolute_pressure') | float(1013.25) / 10 %}
          {# Moist-air enthalpy (kJ/kg) via Magnus saturation pressure + humidity ratio. #}
          {% macro enthalpy(T, RH, P) %}
            {% set ps = 0.61078 * e ** (17.27 * T / (T + 237.3)) %}
            {% set pv = ps * RH / 100 %}
            {% set w  = 0.622 * pv / (P - pv) %}
            {{ 1.006 * T + w * (2501 + 1.86 * T) }}
          {% endmacro %}
          {% set h_oa = enthalpy(T_oa, RH_oa, P_kpa) | float %}
          {% set h_sa = enthalpy(T_sa, RH_sa, P_kpa) | float %}
          {% set h_ra = enthalpy(T_ra, RH_ra, P_kpa) | float %}
          {% if (h_ra - h_oa) | abs < 0.5 %}
            {{ none }}
          {% else %}
            {% set eta   = (h_sa - h_oa) / (h_ra - h_oa) %}
            {% set b_raw = (eta_max - eta) / (eta_max - eta_min) %}
            {% set b_15  = ((b_raw * 100 / 15) | round(0, 'floor') | int) * 15 %}
            {{ [0, [100, b_15] | min] | max }}
          {% endif %}

      # --- DEW POINT THRESHOLDS ---
      # Each humidity helper expressed as the dew point it implies AT the target
      # temperature (Magnus). Centralises the dew-point formula previously inlined
      # in free cooling / low ventilation. NOTE: HA Jinja macros cannot be shared
      # across template entities, so the Magnus block is repeated in each sensor;
      # other logic references THESE sensors instead of re-deriving the formula.
      # Reads only input_numbers (never unavailable) — no availability guard or
      # float() defaults needed, per the "helpers always available" convention.
      - unique_id: airflow_dew_point_min
        name: "Airflow Dew Point Min"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set T  = states('input_number.airflow_cooling_target_temperature') | float %}
          {% set RH = states('input_number.airflow_min_humidity') | float %}
          {% set ps = 0.61078 * e ** (17.27 * T / (T + 237.3)) %}
          {% set pv = ps * RH / 100 %}
          {{ (237.3 * (pv / 0.61078) | log / (17.27 - (pv / 0.61078) | log)) | round(2) }}

      - unique_id: airflow_dew_point_target
        name: "Airflow Dew Point Target"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set T  = states('input_number.airflow_cooling_target_temperature') | float %}
          {% set RH = states('input_number.airflow_target_humidity') | float %}
          {% set ps = 0.61078 * e ** (17.27 * T / (T + 237.3)) %}
          {% set pv = ps * RH / 100 %}
          {{ (237.3 * (pv / 0.61078) | log / (17.27 - (pv / 0.61078) | log)) | round(2) }}

      - unique_id: airflow_dew_point_max
        name: "Airflow Dew Point Max"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set T  = states('input_number.airflow_cooling_target_temperature') | float %}
          {% set RH = states('input_number.airflow_max_humidity') | float %}
          {% set ps = 0.61078 * e ** (17.27 * T / (T + 237.3)) %}
          {% set pv = ps * RH / 100 %}
          {{ (237.3 * (pv / 0.61078) | log / (17.27 - (pv / 0.61078) | log)) | round(2) }}

      # Read-only reason-based status of the cooling/ventilation automation.
      # Derived view only — the automations remain the source of truth. Recorded
      # in history (intentionally NOT in the recorder.exclude block below).
      - unique_id: airflow_cooling_state
        name: "Airflow Cooling State"
        icon: >
          {% set s = this.state %}
          {% if s == 'off' %}mdi:fan-off
          {% elif s == 'moisture_flush_boost' %}mdi:fan-plus
          {% elif s == 'moisture_protection' %}mdi:fan-minus
          {% elif s in ['free_cooling', 'moisture_flush_cooling', 'cooling'] %}mdi:snowflake
          {% elif s in ['heating', 'moisture_retention'] %}mdi:fire
          {% else %}mdi:fan{% endif %}
        availability: >
          {{ has_value('climate.airflow_climate') and
             has_value('binary_sensor.airflow_free_cooling_available') and
             has_value('binary_sensor.airflow_moisture_ventilation_low_needed') and
             has_value('switch.comfoconnect_pro_boost') and
             has_value('sensor.airflow_min_indoor_dew_5min') and
             has_value('sensor.airflow_dew_point_min') }}
        state: >
          {# action: reads hvac_action from climate.airflow_climate, where 'drying' already
             reflects moisture flushing (a boost during free cooling, or the cool profile
             flushing humid air). moisture_flush_boost = a boost while that drying is active. #}
          {# input_boolean/input_number: never unavailable — no defaults needed. #}
          {% set auto   = is_state('input_boolean.airflow_cooling_automatic_enabled', 'on') %}
          {% set free   = is_state('binary_sensor.airflow_free_cooling_available', 'on') %}
          {% set low    = is_state('binary_sensor.airflow_moisture_ventilation_low_needed', 'on') %}
          {% set boost  = is_state('switch.comfoconnect_pro_boost', 'on') %}
          {% set action = state_attr('climate.airflow_climate', 'hvac_action') %}
          {# Indoor moisture vs the min-humidity-derived dew point at target_temp (stable threshold). #}
          {% set indoor_dew = states('sensor.airflow_min_indoor_dew_5min') | float %}
          {% set dew_min    = states('sensor.airflow_dew_point_min') | float %}
          {# Flush (action == 'drying') is checked BEFORE low: when air is actively being flushed,
             that is the operative mode — never report moisture_protection. With the new mutual
             exclusivity low can't be ON during a flush anyway, but action can also be 'drying' via
             free_cool + boost (independent of flush_needed), so the ordering still matters. #}
          {% if not auto %}off
          {% elif boost and action == 'drying' %}moisture_flush_boost
          {% elif action == 'drying' %}moisture_flush_cooling
          {% elif low %}moisture_protection
          {% elif action == 'cooling' and free %}free_cooling
          {% elif action == 'cooling' %}cooling
          {% elif action == 'heating' and indoor_dew < dew_min %}moisture_retention
          {% elif action == 'heating' %}heating
          {% else %}comfort{% endif %}

    binary_sensor:
      # True when outdoor air is suitable for free cooling; debounced 10min each way to prevent flip-flop.
      # min_dew_diff and min_temp_diff are user-settable via input_number helpers.
      # Indoor temperature uses a 0.5°C hysteresis band (Schmitt trigger): turns ON at target_temp,
      # stays ON until indoor temp drops 0.5°C below target. This prevents the feedback loop where
      # the cool profile itself cools the room just enough to disable free cooling and vice versa.
      # Absolute humidity gate: outdoor dew point must not exceed dew_max — the dew point that
      # corresponds to (target_temp, target_hum). Ensures outdoor air warmed to target temperature
      # does not push indoor humidity above target, even when indoor and outdoor dew points rise together.
      - unique_id: airflow_free_cooling_available
        name: "Airflow Free Cooling Available"
        device_class: running
        # Availability guard: all four ComfoConnect filter sensors must be live.
        # Without this, bare | float in state: would silently return 0 on unavailable sensors,
        # producing false free-cooling decisions. input_numbers are always available — no guard needed for those.
        availability: >
          {{ has_value('sensor.airflow_outdoor_dew_5min') and
             has_value('sensor.airflow_outdoor_temp_5min') and
             has_value('sensor.airflow_min_indoor_dew_5min') and
             has_value('sensor.airflow_avg_indoor_temp_5min') and
             has_value('sensor.airflow_dew_point_target') }}
        state: >
          {# Sensors: availability guard above guarantees live values — no defaults needed. #}
          {# input_numbers: never unavailable — no defaults needed. #}
          {% set outdoor_dew     = states('sensor.airflow_outdoor_dew_5min') | float %}
          {% set outdoor_temp    = states('sensor.airflow_outdoor_temp_5min') | float %}
          {% set min_indoor_dew  = states('sensor.airflow_min_indoor_dew_5min') | float %}
          {% set avg_indoor_temp = states('sensor.airflow_avg_indoor_temp_5min') | float %}
          {% set target_temp     = states('input_number.airflow_cooling_target_temperature') | float %}
          {% set min_dew_diff    = states('input_number.airflow_min_dew_diff') | float %}
          {% set min_temp_diff   = states('input_number.airflow_min_temp_diff') | float %}
          {% set temp_threshold  = (target_temp - 0.5) if this.state == 'on' else target_temp %}
          {# Maximum outdoor dew: outdoor air warmed to target_temp must not exceed target_hum. #}
          {# Centralised in sensor.airflow_dew_point_target (Magnus at target_temp, target_hum). #}
          {% set dew_max = states('sensor.airflow_dew_point_target') | float %}
          {{
            (outdoor_dew + min_dew_diff) < min_indoor_dew and
            outdoor_dew <= dew_max and
            outdoor_temp < (target_temp - min_temp_diff) and
            avg_indoor_temp >= temp_threshold
          }}
        delay_on:
          minutes: 10
        delay_off:
          minutes: 10

      # True when ventilation must be reduced to avoid importing humid outdoor air.
      # An indoor-dew Schmitt trigger (turns ON when indoor dew clears the max-derived dew,
      # stays ON until it falls below the target-derived dew) gates the decision — a stable,
      # temperature-independent moisture threshold. The dew condition is the flip side of
      # airflow_free_cooling_available's
      # dew_max gate: incoming air is too humid in absolute terms when outdoor_dew clears a
      # humidity-derived dew point. Dew Schmitt: turns ON at the max-humidity-derived dew point,
      # stays ON until outdoor_dew drops below the target-humidity-derived dew point (both at
      # target_temp, via the same Magnus formula as free cooling). The legacy relative check
      # (outdoor_dew >= indoor_dew) is OR'd as a fallback — it only kicks in when neither
      # humidity-derived boundary is met. Broadly opposite to airflow_free_cooling_available,
      # though the absolute-dew path can overlap when indoor air is drier than incoming air.
      - unique_id: airflow_moisture_ventilation_low_needed
        name: "Airflow Moisture Ventilation Low Needed"
        device_class: moisture
        availability: >
          {{ has_value('sensor.airflow_outdoor_dew_5min') and
             has_value('sensor.airflow_min_indoor_dew_5min') and
             has_value('sensor.airflow_dew_point_target') and
             has_value('sensor.airflow_dew_point_max') and
             has_value('binary_sensor.airflow_humidity_flush_needed') }}
        state: >
          {% set outdoor_dew  = states('sensor.airflow_outdoor_dew_5min') | float %}
          {% set indoor_dew   = states('sensor.airflow_min_indoor_dew_5min') | float %}
          {# Humidity-derived dew points at target_temp, centralised in the dew-point sensors. #}
          {% set dew_from_tgt = states('sensor.airflow_dew_point_target') | float %}
          {% set dew_from_max = states('sensor.airflow_dew_point_max') | float %}
          {# Indoor-moisture Schmitt (was an RH gate): turn ON when measured indoor dew clears the
             max-derived dew, stay ON until it falls below the target-derived dew. #}
          {% set indoor_gate = indoor_dew >= dew_from_tgt if this.state == 'on'
                               else indoor_dew >= dew_from_max %}
          {# Outdoor Schmitt: turn ON above max-derived dew, stay ON until below target-derived dew. #}
          {% set dew_threshold = dew_from_tgt if this.state == 'on' else dew_from_max %}
          {# Mutual exclusivity: low (reduce ventilation) and flush/boost (increase air exchange)
             are opposite actions and must never be ON together. Gate low OFF whenever the cool-profile
             flush or the scheduled drying boost is active. flush_needed already subsumes drying_needed
             (drying ⊂ flush); the drying_needed term is kept explicit for clarity. No cycle: neither
             flush_needed nor drying_needed reads low_needed (the latter's old low_active gate removed). #}
          {{ indoor_gate and (
               outdoor_dew >= dew_threshold or
               outdoor_dew >= indoor_dew
             )
             and not is_state('binary_sensor.airflow_humidity_flush_needed', 'on')
             and not is_state('binary_sensor.airflow_humidity_drying_needed', 'on') }}
        delay_on:
          minutes: 10
        delay_off:
          minutes: 10

      # True when conditions favour flushing indoor moisture toward (and below) the
      # max-humidity-derived dew point by opening the cool profile / bypass — even when
      # target humidity is unreachable. Two OR branches, both requiring a real moisture
      # *difference* (outdoor distinctly drier than indoor):
      #   Branch 1 (REAL moisture problem — indoor above MAX): outdoor_dew < dew_max
      #            AND indoor_dew > dew_max AND (outdoor_dew + min_dew_diff) < indoor_dew.
      #            Flushes REGARDLESS of temperature — mould/condensation safety wins.
      #   Branch 2 (no real problem — above TARGET only): outdoor_dew <= dew_target
      #            AND indoor_dew > dew_target AND (outdoor_dew + min_dew_diff) < indoor_dew.
      #            Flushes ONLY when the ComfoConnect temperature gate holds, so a
      #            non-urgent flush never overcools a cool room.
      # ComfoConnect temperature gate (Branch 2 only) = the temperature half of
      # airflow_free_cooling_available: intake temp (airflow_outdoor_temp_5min) below
      # target by min_temp_diff AND indoor temp at/above target (same 0.5°C Schmitt).
      # The weather-station temp is ignored here (it gates the boost only).
      # Season guard: in active_heating only Branch 1 applies (heating-season flushing
      # only relieves dangerously high moisture). ~0.3°C this.state hysteresis on every
      # dew boundary damps the feedback loop where flushing lowers indoor_dew toward the
      # OFF edge; layered on top of the 10-min delay_on/off.
      - unique_id: airflow_humidity_flush_needed
        name: "Airflow Humidity Flush Needed"
        device_class: running
        availability: >
          {{ has_value('sensor.airflow_outdoor_dew_5min') and
             has_value('sensor.airflow_min_indoor_dew_5min') and
             has_value('sensor.airflow_outdoor_temp_5min') and
             has_value('sensor.airflow_avg_indoor_temp_5min') and
             has_value('sensor.airflow_dew_point_target') and
             has_value('sensor.airflow_dew_point_max') and
             has_value('sensor.heating_cooling_indicator') }}
        state: >
          {# Sensors: availability guard above guarantees live values — no defaults needed. #}
          {# input_numbers: never unavailable — no defaults needed. #}
          {% set outdoor_dew     = states('sensor.airflow_outdoor_dew_5min') | float %}
          {% set indoor_dew      = states('sensor.airflow_min_indoor_dew_5min') | float %}
          {% set outdoor_temp    = states('sensor.airflow_outdoor_temp_5min') | float %}
          {% set avg_indoor_temp = states('sensor.airflow_avg_indoor_temp_5min') | float %}
          {% set dew_target      = states('sensor.airflow_dew_point_target') | float %}
          {% set dew_max         = states('sensor.airflow_dew_point_max') | float %}
          {% set target_temp     = states('input_number.airflow_cooling_target_temperature') | float %}
          {% set min_dew_diff    = states('input_number.airflow_min_dew_diff') | float %}
          {% set min_temp_diff   = states('input_number.airflow_min_temp_diff') | float %}
          {% set season          = states('sensor.heating_cooling_indicator') %}
          {# Hysteresis: while ON, relax every dew boundary by 0.3°C to damp the feedback loop. #}
          {% set h = 0.3 if this.state == 'on' else 0.0 %}
          {% set temp_threshold = (target_temp - 0.5) if this.state == 'on' else target_temp %}
          {% set margin_ok = (outdoor_dew + min_dew_diff - h) < indoor_dew %}
          {% set branch1 = outdoor_dew < (dew_max + h) and indoor_dew > (dew_max - h) and margin_ok %}
          {% set branch2 = outdoor_dew <= (dew_target + h) and indoor_dew > (dew_target - h) and margin_ok %}
          {# ComfoConnect temperature gate (intake temp + indoor Schmitt); weather station ignored. #}
          {% set temp_gate = outdoor_temp < (target_temp - min_temp_diff) and avg_indoor_temp >= temp_threshold %}
          {# Branch 1 = moisture problem → flush regardless of temp.
             Branch 2 = no real problem → flush only when the temp guards hold. #}
          {% set branch2_ok = branch2 and temp_gate %}
          {# Season guard: active_heating allows Branch 1 only. #}
          {{ branch1 if season == 'active_heating' else (branch1 or branch2_ok) }}
        delay_on:
          minutes: 10
        delay_off:
          minutes: 10

      # True when the noisy ventilation boost should run to flush moisture. This is the
      # BOOST half of humidity flushing: the cool-profile flush condition
      # (binary_sensor.airflow_humidity_flush_needed) PLUS two boost-only gates:
      #   * weather-station outdoor temp below target (real outdoor, NOT the ComfoConnect intake);
      #   * within the user-configured boost schedule (workday / non-workday).
      # (The former moisture-low guard is gone — low_needed is now mutually exclusive with flush.)
      # The cool-profile flush deliberately ignores the schedule and the weather station —
      # only the boost is schedule- and weather-gated. Schedule selects workday or non-workday
      # window via binary_sensor.workday; non-workday covers weekends and public holidays.
      - unique_id: airflow_humidity_drying_needed
        name: "Airflow Humidity Drying Needed"
        device_class: running
        state: >
          {# flush sensor carries all dew/temp/season logic + its own hysteresis.
             Defaults fail safe: a missing flush sensor / outdoor temp must not start a boost.
             NOTE: no longer self-gates on moisture_ventilation_low_needed — low_needed is now gated
             OFF whenever flush_needed (and thus drying_needed) is ON, so the old `not low_active`
             guard was redundant AND would have formed a low_needed → drying_needed → low_needed cycle. #}
          {% set flush_needed = is_state('binary_sensor.airflow_humidity_flush_needed', 'on') %}
          {# Use smoothed weatherstation temp to prevent noise spikes from falsely gating the boost. #}
          {% set outdoor_t    = states('sensor.airflow_wheatherstation_outdoor_temp_5min') | float(99) %}
          {% set target_t     = states('input_number.airflow_cooling_target_temperature') | float(21.5) %}
          {% set in_schedule  = (is_state('binary_sensor.workday', 'on')
                                 and is_state('schedule.airflow_boost_workday', 'on'))
                                or
                                (is_state('binary_sensor.workday', 'off')
                                 and is_state('schedule.airflow_boost_non_workday', 'on')) %}
          {% set h = 0.3 if this.state == 'on' else 0.0 %}
          {{
            flush_needed and
            outdoor_t < (target_t + h) and
            in_schedule
          }}


# Intermediate computed binary sensors excluded — not worth archiving
recorder:
  exclude:
    entities:
      - binary_sensor.airflow_free_cooling_available
      - binary_sensor.airflow_humidity_flush_needed
      - binary_sensor.airflow_moisture_ventilation_low_needed
      - binary_sensor.airflow_humidity_drying_needed
      # Dew-point thresholds: deterministic functions of the humidity helpers — not worth archiving
      - sensor.airflow_dew_point_min
      - sensor.airflow_dew_point_target
      - sensor.airflow_dew_point_max

# --- HELPERS ---
# Enable/disable automatic ventilation profile switching from the UI or other automations
input_boolean:
  airflow_cooling_automatic_enabled:
    name: "Airflow Cooling: Automatic Enabled"
    icon: mdi:fan-auto

# Target temperature is a standard climate property backed by this helper so it persists across restarts
input_number:
  airflow_cooling_target_temperature:
    name: "Airflow Cooling Target Temperature"
    min: 18
    max: 26
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-auto
#    initial: 21.5

  # Minimum dew point margin: outdoor dew must be this many °C below indoor dew for free cooling to activate
  airflow_min_dew_diff:
    name: "Airflow Min Dew Diff"
    min: 0
    max: 5
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:water-thermometer
    mode: box

  # Minimum temperature margin: outdoor temp must be this many °C below target for free cooling to activate
  airflow_min_temp_diff:
    name: "Airflow Min Temp Diff"
    min: 0
    max: 5
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-up
    mode: box

  # Target indoor humidity — shown as set-point on the climate entity. RH set-points (this and
  # the min/max helpers below) stay the user-tunable source of truth; humidity decisions compare
  # against the dew point each implies at the target temperature (sensor.airflow_dew_point_*),
  # giving fixed thresholds that do not drift with indoor temperature.
  airflow_target_humidity:
    name: "Airflow Target Humidity"
    min: 40
    max: 60
    step: 1
    unit_of_measurement: "%"
    icon: mdi:water-percent

  # Minimum acceptable humidity. Below this (outside cooling season) → warm profile to retain moisture.
  # Free cooling (cool profile) only activates once humidity recovers to target.
  airflow_min_humidity:
    name: "Airflow Min Humidity"
    min: 30
    max: 50
    step: 1
    unit_of_measurement: "%"
    icon: mdi:water-minus

  # Maximum acceptable humidity. Above this (with free cooling) → cool profile to flush moisture.
  # Also used as ON-threshold for moisture ventilation low preset (Schmitt trigger: OFF at target).
  airflow_max_humidity:
    name: "Airflow Max Humidity"
    min: 50
    max: 70
    step: 1
    unit_of_measurement: "%"
    icon: mdi:water-plus

  # Calibration: expected enthalpy efficiency when bypass is fully closed (maximum heat recovery)
  airflow_bypass_efficiency_max:
    name: "Airflow Bypass Efficiency Max"
    min: 0.50
    max: 1.00
    step: 0.01
    icon: mdi:valve-closed
    mode: box

  # Calibration: residual enthalpy efficiency when bypass is fully open (leakage only)
  airflow_bypass_efficiency_min:
    name: "Airflow Bypass Efficiency Min"
    min: 0.00
    max: 0.30
    step: 0.01
    icon: mdi:valve-open
    mode: box

# --- SCHEDULES ---
# Gate windows for the humidity drying boost automation.
# Workday schedule selected by binary_sensor.workday; non-workday covers weekends and public holidays.
schedule:
  airflow_boost_workday:
    name: "Airflow Boost Workday"
    monday:
