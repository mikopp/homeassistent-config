# Pergola Dach — full automation package (Phase 1: Foundation)
# See plans/pergola-roof-automation.md for the complete design and implementation plan.
#
# All helpers, template sensors, automations, and scripts for the two Somfy bioclimatic
# pergola covers (cover.dach_links, cover.dach_rechts) live in this file.
# Both covers always move together as one unit.
#
# Tilt scale:  0 = horizontal/flat (rain protection, max shade)
#             ~74 = vertical / 90° (default open position, derived from formula)
#            100 = max_tilt_angle open (hardware maximum, default 122°)
#
# All entities under this feature are grouped via group.pergola_dach (built-in group integration).
# No post-deploy UI steps required — the group is fully defined in YAML.
# See plans/pergola-roof-automation.md § "Pergola Device" for the group design rationale.

# ─────────────────────────────────────────────────────────────────────────────────────
# INPUT BOOLEANS — on/off toggles
# ─────────────────────────────────────────────────────────────────────────────────────
input_boolean:

  # Master switch: when off, all cover movement is suppressed.
  # The state machine and template sensors keep running so re-enabling acts immediately.
  pergola_automatic_enabled:
    name: Pergola Automatic Enabled
    icon: mdi:sun-clock


  # Heating indicator: on = heating season (let sun through), off = cooling season (block sun).
  # Can be toggled by the user in the HA UI or written via the HA REST API by an external
  # system (e.g. Loxone). Does NOT affect state machine transitions — only the cover formula.
  pergola_heating:
    name: Pergola Heating
    icon: mdi:radiator


  # Cooling formula selector (Step 7).
  # off = perfect-perpendicular (default, standard A_eff ± 90 formula)
  # on  = safe-zone max-open (optimised — see plan Step 7 for formula details)
  pergola_cooling_optimized:
    name: Pergola Cooling Optimized
    icon: mdi:sine-wave


# ─────────────────────────────────────────────────────────────────────────────────────
# INPUT SELECT — state machine
# ─────────────────────────────────────────────────────────────────────────────────────
input_select:

  # The single source of truth for the automation state machine.
  # Only pergola_state_manager and script.pergola_evaluate_state may write this selector
  # (except manual overrides to break a deadlock).
  # States in priority order (highest first):
  #   frost              — temp below frost threshold; no movement
  #   rain               — rain active (weather station or cover lock); no movement
  #   rain_stopped       — rain just ended; recovery script running
  #   user_override      — cover(s) locked by user; no movement
  #   no_sun_behind_house — sun below horizon, low elevation, or outside azimuth window
  #   not_enough_sun     — pergola_sun_shining off (sensor has built-in 5 min delay_off)
  #   sun_automatik_heating — sun active, heating indicator on
  #   sun_automatik_cooling — sun active, heating indicator off (default)
  pergola_automation_state:
    name: Pergola Automation State
    icon: mdi:state-machine

    options:
      - no_sun_behind_house
      - frost
      - rain
      - rain_stopped
      - user_override
      - not_enough_sun
      - sun_automatik_heating
      - sun_automatik_cooling

# ─────────────────────────────────────────────────────────────────────────────────────
# INPUT NUMBERS — user-configurable parameters
# ─────────────────────────────────────────────────────────────────────────────────────
input_number:

  # ── PV / sun detection ────────────────────────────────────────────────────────────

  pergola_pv_conversion_factor:
    name: Pergola PV Conversion Factor
    # Divisor to convert raw PV watt output (sensor.solar_yield_watts)
    # to equivalent W/m² irradiance.
    # Default 3.2 is empirically calibrated for 6× Axitec 440W bifacial panels at ~5–10°
    # tilt, 228° azimuth (bifacial back-gain + near-flat tilt + afternoon-facing geometry).
    # STC baseline: 2640W / 1000 W/m² = 2.64; adjusted to 3.2 for real-world geometry.
    # Calibrate in Step 6 field testing on a clear morning.
    min: 2
    max: 6
    step: 0.1
    mode: box


    icon: mdi:solar-panel

  pergola_shading_sensitivity:
    name: Pergola Shading Sensitivity
    # Sensitivity knob for the sun_shining shading threshold.
    # Formula: shading_threshold = 512 × sin(elevation) × shading_sensitivity
    # Default 0.9: lower values → shading activates earlier (hazy days); higher
    # values → requires brighter sun to trigger shading. Primary calibration knob
    # — see plan Step 6 (Phase 5).
    min: 0.5
    max: 1.2
    step: 0.05
    mode: box
    icon: mdi:weather-sunny


  pergola_min_sun_elevation:
    name: Pergola Min Sun Elevation
    # Elevation at or below which the state machine enters no_sun_behind_house.
    # At very low elevation the sun shines *under* the roof regardless of azimuth —
    # the slat geometry formulas are irrelevant and the covers open to 90°.
    # Must be > 0° (the sin(elevation) in the sun_shining threshold also uses this guard).
    min: 1
    max: 30
    step: 0.5
    unit_of_measurement: "°"
    mode: box
    icon: mdi:weather-sunset

  pergola_deadband_angle:
    name: Pergola Deadband Angle
    # Minimum slat-angle change (°) required to trigger a motor move.
    # Used in two places:
    #   1. pergola_cover_response — suppresses sun-tracking moves smaller than this.
    #   2. sensor.pergola_slat_angle optimised-cooling morning branch — the safety
    #      buffer (moe + DB) equals this value so shade is guaranteed for one full
    #      deadband cycle of sun advancement without a corrective move.
    # Constraint: set no lower than the motor's positional accuracy (the morning
    # formula relies on the buffer being ≥ actual motor error).
    # Default 5°. Lower → more frequent motor movement; higher → less churn.
    min: 1
    max: 20
    step: 0.5
    unit_of_measurement: "°"
    mode: box
    icon: mdi:arrow-expand-horizontal

  # ── Last commanded slat angle tracker ───────────────────────────────────────────

  pergola_last_set_slat_angle:
    name: Pergola Last Set Slat Angle
    # Internal backing store for sensor.pergola_effective_slat_angle.
    # Written by script.pergola_set_slat_angle after the pergola_automatic_enabled
    # gate passes. Never written by automations or the user.
    min: 0
    max: 150
    step: 0.5
    unit_of_measurement: "°"
    icon: mdi:angle-obtuse


  # ── Rain recovery step tracker ───────────────────────────────────────────────────

  pergola_rain_recovery_step:
    name: Pergola Rain Recovery Step
    # Internal step counter for script.pergola_post_rain_recovery.
    # Written by the recovery script before each phase; read by
    # sensor.pergola_rain_recovery_step (which returns 0 when state ≠ rain_stopped).
    # Steps:
    #   1 — settling (30 s wait before first move)
    #   2 — draining at 8° (5 min hold)
    #   3 — draining at 15° (5 min hold)
    #   4 — drying (optional 30 min wait when hourly_rain > 0)
    # After the script calls script.pergola_evaluate_state the state exits rain_stopped
    # and the template sensor returns 0 automatically — no explicit reset needed.
    min: 0
    max: 4
    step: 1
    icon: mdi:water-sync


  # ── Tilt / hardware geometry ──────────────────────────────────────────────────────

  pergola_max_tilt_angle:
    name: Pergola Max Tilt Angle
    # Maximum physical slat rotation in degrees (Somfy hardware limit).
    # Drives the tilt_position conversion formula: tilt_position = INT(slat_angle / max_tilt × 100 + correction)
    # and all derived constants (R, PHI, DEADBAND_TILT, COOLING_LOWER_BOUND).
    # Adjust if the physical stop changes (e.g. after motor recalibration).
    min: 100
    max: 150
    step: 1
    unit_of_measurement: "°"
    mode: box
    icon: mdi:rotate-right


  # ── Location / orientation ────────────────────────────────────────────────────────

  pergola_wall_azimuth:
    name: Pergola Wall Azimuth
    # Compass bearing (0°–360°) of the terrasse wall — the direction the pergola faces.
    # Default 204° = SSW (measured on-site).
    # Drives two derived constants used throughout the automation:
    #   AZIMUTH_MIN = wall_azimuth − 90  (default 114°) — eastern edge of sun window
    #   AZIMUTH_MAX = wall_azimuth + 90  (default 294°) — western edge of sun window
    # Outside AZIMUTH_MIN–AZIMUTH_MAX the sun cannot hit the terrasse geometrically,
    # regardless of what any sensor reads.
    # Also defines the reference direction for the effective sun angle (A_eff) formula.
    min: 0
    max: 359
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:compass


  # ── Slat geometry (used to derive R, PHI, and min_heating_slat_angle) ───────────────
  # These three inputs feed the shade-overlap geometry (see plan "Derived Internal Constants"):
  #   R        = sqrt(d² + t²) / w              — overlap ratio
  #   PHI      = degrees(atan(t / d))            — thickness angle offset (default ≈ 8.53°)
  #   θ_min    = degrees(acos(p/√(w²+t²))) + degrees(atan(t/w))  — heating seal-break angle (≈ 33.5°)
  # R and PHI are used to compute MaxOpenEast, MaxOpenWest, and COOLING_LOWER_BOUND.
  # sensor.pergola_cooling_lower_bound and sensor.pergola_min_heating_slat_angle
  # are re-derived automatically when any of these change.

  pergola_slat_width:
    name: Pergola Slat Width
    # Slat face width (w) in cm — the dimension perpendicular to the pivot axis.
    # Default 22 cm (Somfy bioclimatic standard).
    min: 10
    max: 30
    step: 0.5
    mode: box
    unit_of_measurement: "cm"
    icon: mdi:ruler


  pergola_slat_pivot_spacing:
    name: Pergola Slat Pivot Spacing
    # Pivot-to-pivot spacing (d) in cm — distance between adjacent slat pivot axes.
    # Default 20 cm (Somfy bioclimatic standard).
    min: 8
    max: 30
    step: 0.5
    mode: box
    unit_of_measurement: "cm"
    icon: mdi:ruler-square


  pergola_slat_thickness:
    name: Pergola Slat Thickness
    # Slat thickness (t) in cm — the fin depth dimension.
    # Default 3 cm (Somfy bioclimatic standard).
    min: 0.5
    max: 5
    mode: box
    step: 0.5
    unit_of_measurement: "cm"
    icon: mdi:layers


# ─────────────────────────────────────────────────────────────────────────────────────
# TEMPLATE SENSORS AND BINARY SENSORS
# ─────────────────────────────────────────────────────────────────────────────────────
template:

  # ── Pergola Dach computed sensors ────────────────────────────────────────────────
  # These template sensors compute real values (sun angle, slat position, etc.).
  # They are NOT wrappers for input_* helpers — those are used directly.
  # All entities are grouped via group.pergola_dach (defined at the bottom of this
  # file) — no post-deploy UI steps required.
  #
  # sensor.pergola_cooling_lower_bound is kept in a separate block below —
  # it is an internal derived constant, not a user-facing value.
  - sensor:

      # ── PV Power ──────────────────────────────────────────────────────────────────
      # Thin wrapper around the raw Victron solar charger output. Exposes a clean
      # "pergola" entity for all formulas to reference — if the underlying sensor ID
      # ever changes, only this sensor needs updating.
      - name: "Pergola PV Power"
        unique_id: pergola_pv_power
        state: "{{ states('sensor.solar_yield_watts') | float(0) }}"
        availability: >
          {{ states('sensor.solar_yield_watts') not in ['unavailable', 'unknown'] }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-panel

      # ── Effective Sun Angle (A_eff) ───────────────────────────────────────────────
      # A_eff maps the sun's position onto a unified 0°–180° east-to-west scale:
      #   0° = East Horizon → 90° = Zenith/Noon → 180° = West Horizon
      # Primary input for both cooling and heating slat formulas.
      # Always computes regardless of pergola_automatic_enabled — useful for monitoring.
      #
      # sun_height = projected elevation in the slat-perpendicular plane
      #   = atan( tan(elevation) / |sin(delta_phi)| )
      #   where delta_phi = azimuth − wall_azimuth
      # Singularity at delta_phi ≈ 0 (sun along slat axis): limit is sun_height = 90°.
      # A_eff: east-of-wall (az < wall_az) → A_eff = sun_height
      #         west-of-wall (az ≥ wall_az) → A_eff = 180 − sun_height
      # Derivation: plans/pergola-slat-formula-analysis.md
      #
      # The template also guards elev ≤ 0 directly — evaluation-order edge cases can
      # deliver a stale elevation to the template before the availability filter clears.
      - name: "Pergola Effective Sun Angle"
        unique_id: pergola_effective_sun_angle
        availability: >
          {{ state_attr('sun.sun', 'elevation') is not none
             and state_attr('sun.sun', 'azimuth') is not none
             and states('input_number.pergola_wall_azimuth') not in ['unavailable', 'unknown']
             and (state_attr('sun.sun', 'elevation') | float(0)) > 0 }}
        state: >
          {% set elev    = state_attr('sun.sun', 'elevation') | float(0) %}
          {% set az      = state_attr('sun.sun', 'azimuth') | float(0) %}
          {% set wall_az = states('input_number.pergola_wall_azimuth') | float(204) %}
          {% if elev <= 0 %}
            0
          {% else %}
            {% set delta_phi = az - wall_az %}
            {% if (sin(delta_phi * pi / 180)) | abs < 0.001 %}
              {% set sun_height = 90 %}
            {% else %}
              {% set sun_height = (atan(tan(elev * pi / 180) / ((sin(delta_phi * pi / 180)) | abs))) * (180 / pi) %}
            {% endif %}
            {% if az < wall_az %}
              {{ sun_height | round(1) }}
            {% else %}
              {{ (180 - sun_height) | round(1) }}
            {% endif %}
          {% endif %}
        unit_of_measurement: "°"
        icon: mdi:angle-acute

      # ── Target Slat Angle ─────────────────────────────────────────────────────────
      # Shows the calculated target slat angle (0°–max_tilt_angle°) the automation
      # would send to the covers at this moment — raw angular output before hardware
      # correction. Always computes regardless of pergola_automatic_enabled.
      #
      # State dispatch:
      #   sun_automatik_cooling  → cooling formula; sub-mode from pergola_cooling_optimized:
      #
      #     Standard (off): perfect-perpendicular blocking
      #       morning (A < 90, moe ≤ max_tilt − 5): slat = A_eff + 90, clamped to max_tilt
      #       afternoon / past safe limit:            slat = max(A_eff − 90, LB)
      #       result clamped to [LB, max_tilt]
      #
      #     Optimised (on): safe-zone max-open — furthest-open angle still guaranteeing
      #       100% shade, maximising airflow via slat overlap / thickness geometry.
      #       Flip guard (shared): morning branch applies while moe ≤ max_tilt − DB,
      #         keeping room to place the DB safety buffer above MaxOpenEast.
      #       Morning (A < 90, flip guard passes):
      #         slat = max(90°, MaxOpenEast + DB), clamped to max_tilt.
      #         DB doubles as safety buffer — sun can advance a full DB° before the next
      #         move fires and shade is still guaranteed. Floor at 90°: sub-vertical
      #         back-face provides no blocking benefit.
      #       Flip range (A ≤ 90, flip guard failed): slat = MaxOpenWest − 5°.
      #         Fixed 5° motor-accuracy buffer stays below the shade boundary regardless
      #         of deadband (mow increases with A, so slat is always below future mow).
      #       Afternoon (A > 90): slat = min(MaxOpenWest − 5°, 90°).
      #         Fixed 5° buffer; cap at 90° fires naturally when mow reaches 95°.
      #
      #   sun_automatik_heating  → slat = A_eff directly;
      #                            floor at min_heating_slat_angle (prevents near-horizontal
      #                            slats at dawn when A_eff approaches 0°);
      #                            dead zone (A_eff > max_tilt) → max_tilt → tilt_position=100
      #   no_sun_behind_house,   → 90° (vertical, maximum ventilation)
      #   not_enough_sun         → 90°
      #   frost / rain / ...     → 90° (no movement; neutral display value)
      - name: "Pergola Slat Angle"
        unique_id: pergola_slat_angle
        availability: >
          {{ states('input_select.pergola_automation_state') not in ['unavailable', 'unknown']
             and states('sensor.pergola_max_open_east_morning_cooling_angle') not in ['unavailable', 'unknown'] }}
        state: >
          {% set s  = states('input_select.pergola_automation_state') %}
          {% set mt = states('input_number.pergola_max_tilt_angle') | float(122) %}
          {% if s == 'sun_automatik_cooling' %}
            {% set LB  = states('sensor.pergola_cooling_lower_bound') | float(15.3) %}
            {% set A   = states('sensor.pergola_effective_sun_angle') | float(90) %}
            {% set moe = states('sensor.pergola_max_open_east_morning_cooling_angle') | float(90) %}
            {% set optimized = states('input_boolean.pergola_cooling_optimized') == 'on' %}
            {% if optimized %}
              {% set mow = states('sensor.pergola_max_open_west_cooling_angle') | float(15.3) %}
              {% set DB  = states('input_number.pergola_deadband_angle') | float(5) %}
              {% if A < 90 and moe <= mt - DB %}
                {% set slat = [[90, moe + DB] | max, mt] | min %}
              {% elif A <= 90 %}
                {% set slat = mow - 5 %}
              {% else %}
                {% set slat = [mow - 5, 90] | min %}
              {% endif %}
              {{ [[slat, 0] | max, mt] | min | round(1) }}
            {% else %}
              {% if A < 90 and moe <= mt - 5 %}
                {% set slat = (A + 90) if (A + 90) <= mt else mt %}
              {% else %}
                {% set slat = [A - 90, LB] | max %}
              {% endif %}
              {{ [[slat, LB] | max, mt] | min | round(1) }}
            {% endif %}
          {% elif s == 'sun_automatik_heating' %}
            {% set min_heat = states('sensor.pergola_min_heating_slat_angle') | float(33.5) %}
            {% set A        = states('sensor.pergola_effective_sun_angle') | float(90) %}
            {% if A > mt %}
              {{ mt | round(1) }}
            {% else %}
              {{ [[A, min_heat] | max, mt] | min | round(1) }}
            {% endif %}
          {% else %}
            90
          {% endif %}
        unit_of_measurement: "°"
        icon: mdi:angle-obtuse

      # ── Effective (Last-Commanded) Slat Angle ─────────────────────────────────────
      # Records the last slat_angle value actually sent to the covers via
      # script.pergola_set_slat_angle — updated only when the pergola_automatic_enabled
      # gate passes. Contrast with sensor.pergola_slat_angle (calculated target, always
      # computed) and sensor.pergola_tilt_position (hardware-corrected target, 0–100).
      - name: "Pergola Effective Slat Angle"
        unique_id: pergola_effective_slat_angle
        availability: >
          {{ states('input_number.pergola_last_set_slat_angle') not in ['unavailable', 'unknown'] }}
        state: >
          {{ states('input_number.pergola_last_set_slat_angle') | float(0) | round(1) }}
        unit_of_measurement: "°"
        icon: mdi:angle-obtuse

      # ── MaxOpenEast Morning Cooling Angle ─────────────────────────────────────────
      # Geometric minimum back-face slat angle for 100% shade from eastern sun.
      # Formula: A_eff + PHI + asin(R × sin(A_eff))  (raw value, no SAFETY_BUFFER).
      # The slat-angle formula adds SAFETY_BUFFER (+5°) when computing the actual target
      # so this sensor remains a clean diagnostic value independent of the buffer.
      # Always computed regardless of pergola_cooling_optimized — useful for monitoring.
      - name: "Pergola Max Open East Morning Cooling Angle"
        unique_id: pergola_max_open_east_morning_cooling_angle
        availability: >
          {{ states('sensor.pergola_effective_sun_angle') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_width') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_pivot_spacing') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_thickness') not in ['unavailable', 'unknown'] }}
        state: >
          {% set A   = states('sensor.pergola_effective_sun_angle') | float(90) %}
          {% set w   = states('input_number.pergola_slat_width') | float(22) %}
          {% set d   = states('input_number.pergola_slat_pivot_spacing') | float(20) %}
          {% set t   = states('input_number.pergola_slat_thickness') | float(3) %}
          {% set R   = ((d**2 + t**2) ** 0.5) / w %}
          {% set PHI = atan(t / d) * (180 / pi) %}
          {{ (A + PHI + asin(R * sin(A * pi / 180)) * (180 / pi)) | round(1) }}
        unit_of_measurement: "°"
        icon: mdi:angle-obtuse

      # ── MaxOpenWest Cooling Angle ─────────────────────────────────────────────────
      # Geometric maximum front-face slat angle for 100% shade — raw value, no cap.
      # Formula: A_eff + PHI − asin(R × sin(A_eff))
      # Used two ways in the slat-angle formula (depending on A_eff):
      #   A ≤ 90 (morning/flip range): used directly as the front-face target (raw ≤ 31.7°)
      #   A > 90 (afternoon): min(90°, raw) applied inline — cap only fires when A > ~128°
      # Continuous at A_eff = 90° (≈ 31.7°). Always computed regardless of mode.
      - name: "Pergola Max Open West Cooling Angle"
        unique_id: pergola_max_open_west_cooling_angle
        availability: >
          {{ states('sensor.pergola_effective_sun_angle') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_width') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_pivot_spacing') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_thickness') not in ['unavailable', 'unknown'] }}
        state: >
          {% set A   = states('sensor.pergola_effective_sun_angle') | float(90) %}
          {% set w   = states('input_number.pergola_slat_width') | float(22) %}
          {% set d   = states('input_number.pergola_slat_pivot_spacing') | float(20) %}
          {% set t   = states('input_number.pergola_slat_thickness') | float(3) %}
          {% set R   = ((d**2 + t**2) ** 0.5) / w %}
          {% set PHI = atan(t / d) * (180 / pi) %}
          {{ (A + PHI - asin(R * sin(A * pi / 180)) * (180 / pi)) | round(1) }}
        unit_of_measurement: "°"
        icon: mdi:angle-acute

      # ── Min Heating Slat Angle ────────────────────────────────────────────────────
      # Geometric minimum tilt where a gap first opens between adjacent slats so that
      # direct sunlight can reach the interior (the "break-the-seal" angle).
      #
      # Derived from the gap condition  w cosθ + t sinθ = p:
      #   θ_min = acos(p / √(w² + t²)) + atan(t / w)
      #
      # At defaults (w=22, p=20, t=3): ≈ 33.5°
      # Used as the floor in sensor.pergola_slat_angle (Heating Mode).
      - name: "Pergola Min Heating Slat Angle"
        unique_id: pergola_min_heating_slat_angle
        availability: >
          {{ states('input_number.pergola_slat_width') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_pivot_spacing') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_thickness') not in ['unavailable', 'unknown'] }}
        state: >
          {% set w = states('input_number.pergola_slat_width') | float(22) %}
          {% set p = states('input_number.pergola_slat_pivot_spacing') | float(20) %}
          {% set t = states('input_number.pergola_slat_thickness') | float(3) %}
          {{ (acos(p / (w**2 + t**2)**0.5) * (180 / pi) + atan(t / w) * (180 / pi)) | round(1) }}
        unit_of_measurement: "°"
        icon: mdi:angle-acute

      # ── Target Tilt Position ──────────────────────────────────────────────────────
      # Hardware-corrected tilt_position (0–100) derived from sensor.pergola_slat_angle.
      # Shows what will be sent to the covers when the automation fires.
      # READ-ONLY: never used to drive cover commands — display/debug only.
      # Always computes regardless of pergola_automatic_enabled.
      #
      # Formula: tilt_position = INT(slat_angle / max_tilt × 100 + correction)
      # Correction: +7 below 20°, +5.5 below 69°, +0.5 otherwise.
      # The identical formula lives in script.pergola_set_slat_angle (single authoritative
      # implementation). This sensor mirrors it for observability only.
      - name: "Pergola Tilt Position"
        unique_id: pergola_tilt_position
        availability: >
          {{ states('sensor.pergola_slat_angle') not in ['unavailable', 'unknown']
             and states('input_number.pergola_max_tilt_angle') not in ['unavailable', 'unknown'] }}
        state: >
          {% set slat = states('sensor.pergola_slat_angle') | float(90) %}
          {% set mt   = states('input_number.pergola_max_tilt_angle') | float(122) %}
          {% set corr = 6 if slat < 20 else (5.5 if slat < 69 else 0.5) %}
          {% set raw  = (slat / mt * 100 + corr) | int %}
          {{ [[raw, 0] | max, 100] | min }}
        unit_of_measurement: "%"
        icon: mdi:format-align-middle

      # ── Rain Recovery Step ────────────────────────────────────────────────────────
      # Shows which step of the post-rain drain sequence is currently active.
      # Returns 0 when the state machine is not in rain_stopped — no cleanup needed
      # if the script is aborted (frost/rain entry), the state check handles it.
      #
      # Steps (only meaningful while state = rain_stopped):
      #   1 — settling      (30 s wait for states to stabilise)
      #   2 — draining 8°   (covers open to 8°; 5 min hold for initial drainage)
      #   3 — draining 15°  (covers open to 15°; 5 min hold for continued drainage)
      #   4 — drying        (optional 30 min extra wait when hourly_rain > 0)
      #   0 — not in recovery (state ≠ rain_stopped)
      - name: "Pergola Rain Recovery Step"
        unique_id: pergola_rain_recovery_step
        availability: >
          {{ states('input_select.pergola_automation_state') not in ['unavailable', 'unknown']
             and states('input_number.pergola_rain_recovery_step') not in ['unavailable', 'unknown'] }}
        state: >
          {% if states('input_select.pergola_automation_state') == 'rain_stopped' %}
            {{ states('input_number.pergola_rain_recovery_step') | int(0) }}
          {% else %}
            0
          {% endif %}
        icon: mdi:water-sync


    binary_sensor:

      # ── Sun Shining ────────────────────────────────────────────────────────────────
      # True when the sun is shining strongly enough that the terrasse needs shading.
      # This answers: "is it sunny enough to shade?"
      #
      # Adapted from Loxone Wetter/Sonnenschein logic:
      #   effective_radiation = max(
      #       sensor.wheatherstation_solar_radiation,          # W/m²; goes into shadow in afternoon
      #       sensor.pergola_pv_power / pv_conversion_factor   # W→W/m² proxy; stays in sun longer
      #   )
      #   shading_threshold = 512 × sin(elevation_rad) × shading_sensitivity
      #   sun_is_shining = (effective_radiation > shading_threshold)
      #                    OR (uv_index ≥ 3)           ← UV catches hazy high-UV days
      #                    AND (elevation > min_sun_elevation)
      #
      # Taking max() of both sources solves the afternoon shadow problem: whichever
      # sensor is still in direct sun drives the reading.
      #
      # Why 512 W/m² × sin(elevation)?
      #   The theoretical clear-sky horizontal irradiance is ~1000 × sin(elevation).
      #   In Central Austria (≈47°N), real-world peak irradiance is significantly lower
      #   than the 1000 W/m² STC reference. 512 W/m² is the Loxone-calibrated baseline
      #   that represents "enough sun to shade" at solar noon — roughly half the
      #   theoretical maximum. shading_sensitivity (default 0.9) provides fine-tuning.
      #
      # Hysteresis (prevents rapid toggling when sun is near the threshold):
      #   delay_on:  1 min  — must be true for 1 min before shading activates
      #   delay_off: 5 min  — must be false for 5 min before shading deactivates
      #   The state machine no_sun_behind_house threshold is separate — it only depends
      #   on sun position and is not delayed.
      # The elevation guard matches the state machine no_sun_behind_house threshold.
      - name: "Pergola Sun Shining"
        unique_id: pergola_sun_shining
        device_class: light
        availability: >
          {{ (states('sensor.wheatherstation_solar_radiation') not in ['unavailable', 'unknown']
              or states('sensor.pergola_pv_power') not in ['unavailable', 'unknown'])
             and state_attr('sun.sun', 'elevation') is not none }}
        delay_on: "00:01:00"
        delay_off: "00:05:00"
        state: >
          {% set solar       = states('sensor.wheatherstation_solar_radiation') | float(0) %}
          {% set factor      = states('input_number.pergola_pv_conversion_factor') | float(3.2) %}
          {% set pv          = states('sensor.pergola_pv_power') | float(0) / factor %}
          {% set elev        = state_attr('sun.sun', 'elevation') | float(0) %}
          {% set min_elev    = states('input_number.pergola_min_sun_elevation') | float(10) %}
          {% set sensitivity = states('input_number.pergola_shading_sensitivity') | float(0.9) %}
          {% set uv          = states('sensor.wheatherstation_uv_index') | float(0) %}
          {% if elev <= min_elev %}
            false
          {% else %}
            {% set effective  = [solar, pv] | max %}
            {% set threshold  = 512 * sin(elev * pi / 180) * sensitivity %}
            {{ effective > threshold or uv >= 3 }}
          {% endif %}


  # ── Internal sensor: Cooling Lower Bound ─────────────────────────────────────────
  # Read-only derived constant. Included in group.pergola_dach.
  # Has no user-settable counterpart — re-derives automatically whenever slat
  # geometry or max_tilt_angle changes.
  #
  # COOLING_LOWER_BOUND is the ventilation floor for the cooling formula.
  # It equals MaxOpenWest evaluated at the "flip point" A_eff — the largest A_eff (1°→90°)
  # where the morning back-face formula (MaxOpenEast = A_eff + PHI + asin(R×sin(A_eff)))
  # is still ≤ max_tilt − SAFETY_BUFFER (5°), meaning the back-face strategy can safely
  # provide 100% shade.
  #
  # At the flip point, MaxOpenWest (= A_eff_flip + PHI − asin(R×sin(A_eff_flip))) gives
  # the minimum slat angle that still fully shades overhead/high-east sun via the front face.
  # This becomes the floor for the afternoon/closing formula, ensuring shade is never lost.
  #
  # Derived constants used here (never hardcoded elsewhere):
  #   w  = input_number.pergola_slat_width          (default 22 cm)
  #   d  = input_number.pergola_slat_pivot_spacing   (default 20 cm)
  #   t  = input_number.pergola_slat_thickness       (default 3 cm)
  #   R  = sqrt(d² + t²) / w                        (default ≈ 0.9193)
  #   PHI = degrees(atan(t / d))                     (default ≈ 8.53°)
  #   SAFETY_BUFFER = 5° (fixed, non-configurable)
  #
  # Default (w=22, d=20, t=3, max_tilt=122): A_eff_flip ≈ 58°, COOLING_LOWER_BOUND ≈ 15.3°
  # Re-derives automatically when any geometry input or max_tilt_angle changes.
  - sensor:
      - name: "Pergola Cooling Lower Bound"
        unique_id: pergola_cooling_lower_bound
        availability: >
          {{ states('input_number.pergola_max_tilt_angle') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_width') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_pivot_spacing') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_thickness') not in ['unavailable', 'unknown'] }}
        state: >
          {% set max_tilt = states('input_number.pergola_max_tilt_angle') | float(122) %}
          {% set w        = states('input_number.pergola_slat_width') | float(22) %}
          {% set d        = states('input_number.pergola_slat_pivot_spacing') | float(20) %}
          {% set t        = states('input_number.pergola_slat_thickness') | float(3) %}
          {% set R   = ((d**2 + t**2) ** 0.5) / w %}
          {% set PHI = atan(t / d) * (180 / pi) %}
          {% set SAFETY = 5 %}
          {% set ns = namespace(flip=1) %}
          {% for a in range(1, 91) %}
            {% set max_open_east = a + PHI + asin(R * sin(a * pi / 180)) * (180 / pi) %}
            {% if max_open_east <= max_tilt - SAFETY %}
              {% set ns.flip = a %}
            {% endif %}
          {% endfor %}
          {% set a_flip = ns.flip %}
          {{ (a_flip + PHI - asin(R * sin(a_flip * pi / 180)) * (180 / pi)) | round(0) }}
        unit_of_measurement: "°"
        icon: mdi:angle-acute

# ─────────────────────────────────────────────────────────────────────────────────────
# AUTOMATIONS
# ─────────────────────────────────────────────────────────────────────────────────────
automation:

  # ── Inactivity Watchdog: Dach Links ───────────────────────────────────────────────
  # Sends stop_cover_tilt to cover.dach_links every 5 minutes when no cover or lock
  # entity has been updated in the last 5 minutes.
  #
  # Why this is critical: the Somfy device does not push state changes proactively.
  # After rain stops, the lock timer counts down from 900 s to 0 internally, but HA
  # only learns the current value when we force a state report via stop_cover_tilt.
  # Without this watchdog, the lock originator would appear stuck (= rain) indefinitely
  # and the state machine would never see the lock clearing.
  #
  # State-based suppression: the watchdog is skipped when the state machine is in an
  # actively-moving state (sun_automatik_cooling, sun_automatik_heating, rain_stopped).
  # Both watchdog and cover_response automations share the same /5 time_pattern trigger;
  # suppressing the watchdog during active movement prevents stop_cover_tilt from
  # aborting a movement command mid-travel (race condition — see plan Step 2 notes).
  - id: '1771360145720'
    alias: 'Inactivity Watchdog: Dach Links'

    description: >
      Forces an update of slat position and lock originator every 5 minutes when
      no cover movement or lock change has occurred. Prevents stale lock state.
    triggers:
      - trigger: time_pattern
        minutes: /5
      - trigger: homeassistant
        event: start
    conditions:
      # Act only when none of the monitored entities has been updated in the last 5 min.
      - condition: template
        value_template: >
          {% set entities = [
            states.sensor.dach_links_priority_lock_originator,
            states.sensor.dach_links_priority_lock_timer,
            states.cover.dach_links
          ] %}
          {{ entities | selectattr('last_updated', 'gt', now() - timedelta(minutes=5))
             | list | count == 0 }}
      # Skip when the state machine is in an actively-moving state. The cover
      # response automation (sun states) and the post-rain recovery script
      # (rain_stopped) both use the same /5 time pattern. Because HA evaluates
      # both triggers concurrently, the cover's last_updated is still stale at
      # evaluation time — the watchdog condition would pass and send stop_cover_tilt
      # while the movement command is already in flight, aborting mid-travel.
      # State-based suppression eliminates the race at the root.
      # Safe before Step 2: states() returns 'unknown' when the entity does not
      # exist yet, which is not in the exclusion list, so the watchdog fires normally.
      - condition: template
        value_template: >
          {% set s = states('input_select.pergola_automation_state') %}
          {{ s not in ['sun_automatik_cooling', 'sun_automatik_heating', 'rain_stopped'] }}
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_links

  # ── Inactivity Watchdog: Dach Rechts ──────────────────────────────────────────────
  # Identical logic as the Dach Links watchdog — see comment above.
  - id: '1771361016291'
    alias: 'Inactivity Watchdog: Dach Rechts'

    description: >
      Forces an update of slat position and lock originator every 5 minutes when
      no cover movement or lock change has occurred. Prevents stale lock state.
    triggers:
      - trigger: time_pattern
        minutes: /5
      - trigger: homeassistant
        event: start
    conditions:
      # Act only when none of the monitored entities has been updated in the last 5 min.
      - condition: template
        value_template: >
          {% set entities = [
            states.sensor.dach_rechts_priority_lock_originator,
            states.sensor.dach_rechts_priority_lock_timer,
            states.cover.dach_rechts
          ] %}
          {{ entities | selectattr('last_updated', 'gt', now() - timedelta(minutes=5))
             | list | count == 0 }}
      # Same race-condition guard as Dach Links watchdog — see comment there.
      - condition: template
        value_template: >
          {% set s = states('input_select.pergola_automation_state') %}
          {{ s not in ['sun_automatik_cooling', 'sun_automatik_heating', 'rain_stopped'] }}
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_rechts

  # ── Lock Originator Responder: Dach Links ─────────────────────────────────────────
  # Fires immediately when sensor.dach_links_priority_lock_originator changes state.
  # Sending stop_cover_tilt causes the Somfy to emit a fresh state report, so HA
  # learns the current tilt position and lock state *before* the state manager evaluates
  # the lock transition.
  # This complements the state manager (Step 2): it ensures the most current tilt data
  # is available the moment the lock changes, without waiting for the next watchdog cycle.
  - id: '1771748333394'
    alias: 'Dach Links: Update state when lock originator changes'

    description: >
      Sends stop_cover_tilt immediately when the lock originator changes so HA
      receives a fresh state report before the state manager evaluates the transition.
    triggers:
      - trigger: state
        entity_id:
          - sensor.dach_links_priority_lock_originator
    conditions: []
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_links
    mode: single

  # ── Lock Originator Responder: Dach Rechts ────────────────────────────────────────
  # Same as Dach Links responder — see comment above.
  - id: '1771748414999'
    alias: 'Dach Rechts: Update state when lock originator changes'

    description: >
      Sends stop_cover_tilt immediately when the lock originator changes so HA
      receives a fresh state report before the state manager evaluates the transition.
    triggers:
      - trigger: state
        entity_id:
          - sensor.dach_rechts_priority_lock_originator
    conditions: []
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_rechts
    mode: single

  # ── Pergola State Manager ──────────────────────────────────────────────────────────
  # Single automation that evaluates rules 1–4 inline and delegates rules 5–8 to
  # script.pergola_evaluate_state. The only other writers of
  # input_select.pergola_automation_state are that script and the two not_enough_sun
  # entry/exit automations below.
  #
  # Rule priority (highest first): frost (1) → rain (2) → rain_stopped (3) →
  # user_override (4). Rules 5–8 (no_sun_behind_house, not_enough_sun, heating,
  # cooling) are handled by script.pergola_evaluate_state.
  #
  # The choose block evaluates conditions in priority order; the first match wins.
  # A protected-state guard prevents the default from calling evaluate_state while
  # frost / rain / rain_stopped are active and no transition condition has fired.
  - id: 'pergola_state_manager'
    alias: 'Pergola State Manager'

    description: >
      Evaluates rules 1–4 (frost, rain, rain_stopped, user_override) directly and
      delegates rules 5–8 to script.pergola_evaluate_state. Triggers on all inputs
      that can cause a state transition; the choose block determines what (if anything)
      to do on each trigger.
    triggers:
      # Frost entry: fires on the threshold crossing (2.5 °C) so we react immediately;
      # the id is informational only — the branch condition below is value-based so
      # any trigger (incl. time_pattern) will enter frost if this one gets queue-dropped.
      - trigger: numeric_state
        id: "frost_entry"
        entity_id: sensor.wheatherstation_outdoor_temperature
        below: 2.5
      # Frost exit: fires on the threshold crossing (3.0 °C) so we react immediately;
      # the id is informational only — the branch condition below is value-based so
      # any trigger (incl. time_pattern) will exit frost if this one gets queue-dropped.
      - trigger: numeric_state
        id: "frost_exit"
        entity_id: sensor.wheatherstation_outdoor_temperature
        above: 3.0
      # Rain rule: re-evaluate when weather station rain rate changes
      - trigger: state
        entity_id: sensor.wheatherstation_rain_rate
      # Rain + user_override rules: re-evaluate when lock originator changes
      # (watchdog-driven — see plan Step 2 notes)
      - trigger: state
        entity_id: sensor.dach_links_priority_lock_originator
      - trigger: state
        entity_id: sensor.dach_rechts_priority_lock_originator
      # not_enough_sun boundary: re-evaluate when sun shining binary changes
      - trigger: state
        entity_id: binary_sensor.pergola_sun_shining
      # Heating/cooling toggle: re-evaluate immediately when mode changes
      - trigger: state
        entity_id: input_boolean.pergola_heating
      # HA start: evaluate from persisted state; resume rain_stopped drain if interrupted
      - trigger: homeassistant
        event: start
      # Time pattern: catch slow sun azimuth / elevation threshold crossings every 5 min
      - trigger: time_pattern
        minutes: /5
    actions:
      - choose:
          # ── HA START + rain_stopped: resume interrupted drain sequence ─────────────
          # If HA restarted while rain_stopped was active (drain script mid-run), restart
          # the recovery script from the beginning. The script is idempotent enough for
          # this — it re-drains from 8° which is safe. Do NOT re-evaluate other rules.
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.platform == 'homeassistant'
                     and states('input_select.pergola_automation_state') == 'rain_stopped' }}
            sequence:
              - action: script.turn_on
                target:
                  entity_id: script.pergola_post_rain_recovery

          # ── RULE 1 ENTRY: FROST ────────────────────────────────────────────────────
          # Highest-priority safety rule — preempts any in-progress script including
          # the rain recovery drain sequence. Activates when temperature is below
          # 2.5 °C (hardcoded frost threshold).
          # Value-based (not trigger.id-based): any trigger can enter frost, so we
          # recover correctly even if the numeric_state frost_entry trigger was dropped
          # from the queue — the next tick (time_pattern, sensor update, …) re-checks.
          # float(99) fail-safe: unknown/unavailable sensor → assume warm, don't trip frost.
          # Guard: skip if already in frost to avoid redundant state writes.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.wheatherstation_outdoor_temperature') | float(99) < 2.5
                     and states('input_select.pergola_automation_state') != 'frost' }}
            sequence:
              # Stop any in-progress recovery — frost takes absolute priority
              - action: script.turn_off
                target:
                  entity_id: script.pergola_post_rain_recovery
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: frost

          # ── RULE 1 EXIT: FROST CLEAR ───────────────────────────────────────────────
          # Temperature is above 3.0 °C (hardcoded frost-clear threshold).
          # Value-based (not trigger.id-based): any trigger can exit frost, so we
          # recover correctly even if the numeric_state frost_exit trigger was dropped
          # from the queue — the next tick (time_pattern, sensor update, …) re-checks.
          # float(0) fail-safe: unknown/unavailable sensor → stay in frost until temp known.
          # On exit: script.pergola_exit_to_normal checks hourly rain and either enters
          # rain_stopped (drain sequence) or re-evaluates rules 5–8 directly.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.wheatherstation_outdoor_temperature') | float(0) > 3.0
                     and states('input_select.pergola_automation_state') == 'frost' }}
            sequence:
              - action: script.turn_on
                target:
                  entity_id: script.pergola_exit_to_normal

          # ── RULE 2 ENTRY: RAIN ─────────────────────────────────────────────────────
          # Rain is active when: weather station rain_rate > 0 (slower, delayed) OR
          # either cover-mounted lock originator = 'rain' (faster, no delay).
          # Can override rain_stopped (rain restarted mid-drain — stop drain, stay closed).
          # Cannot override frost — frost remains highest priority.
          # Guard: skip if already in rain to avoid redundant state writes.
          # Guard: also skip if either lock originator is 'user' — the transition rule
          # below handles that, and allowing rain entry from user_override when rain_rate
          # > 0 would create a loop (user_override → rain → new rule → user_override → …).
          - conditions:
              - condition: template
                value_template: >
                  {{ (states('sensor.wheatherstation_rain_rate') | float(0) > 0
                      or states('sensor.dach_links_priority_lock_originator') == 'rain'
                      or states('sensor.dach_rechts_priority_lock_originator') == 'rain')
                     and states('sensor.dach_links_priority_lock_originator') != 'user'
                     and states('sensor.dach_rechts_priority_lock_originator') != 'user'
                     and states('input_select.pergola_automation_state') not in ['frost', 'rain'] }}
            sequence:
              # Stop any in-progress recovery — rain has (re)started
              - action: script.turn_off
                target:
                  entity_id: script.pergola_post_rain_recovery
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: rain

          # ── RULE 2 EXIT / RULE 3 ENTRY: RAIN STOPPED ──────────────────────────────
          # All rain indicators are now off: rain_rate = 0 AND both lock originators =
          # 'unknown' (Somfy countdown has completed). Covers may have pooled water —
          # enter rain_stopped and start the step-drain sequence.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') == 'rain'
                     and states('sensor.wheatherstation_rain_rate') | float(0) == 0
                     and states('sensor.dach_links_priority_lock_originator') == 'unknown'
                     and states('sensor.dach_rechts_priority_lock_originator') == 'unknown' }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: rain_stopped
              - action: script.turn_on
                target:
                  entity_id: script.pergola_post_rain_recovery

          # ── RULE 2 → USER OVERRIDE: User overrides while in rain state ──────────────
          # User manually operated one or both covers while the state machine was in rain
          # (e.g. rain stopped at the weather station but the Somfy countdown was still
          # running, or actively raining). Respect the user's intent — the Somfy hardware
          # already recorded the originator as 'user'. Transition to user_override so the
          # lock is honoured without being fought by rain state.
          # When the user lock expires (originator → unknown), the existing USER OVERRIDE
          # EXIT rule fires → script.pergola_exit_to_normal → if rain_rate > 0, RAIN ENTRY
          # will re-engage on the next state manager trigger (originator is 'unknown' by
          # then, so the != 'user' guard no longer blocks it).
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') == 'rain'
                     and (states('sensor.dach_links_priority_lock_originator') == 'user'
                          or states('sensor.dach_rechts_priority_lock_originator') == 'user') }}
            sequence:
              - action: script.turn_off
                target:
                  entity_id: script.pergola_post_rain_recovery
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: user_override

          # ── RULE 4 ENTRY: USER OVERRIDE ───────────────────────────────────────────
          # A user has manually operated one or both covers (lock originator = 'user').
          # Cannot override frost, rain, or rain_stopped — those safety states stay.
          # Guard: skip if already in user_override.
          - conditions:
              - condition: template
                value_template: >
                  {{ (states('sensor.dach_links_priority_lock_originator') == 'user'
                      or states('sensor.dach_rechts_priority_lock_originator') == 'user')
                     and states('input_select.pergola_automation_state') not in
                     ['frost', 'rain', 'rain_stopped', 'user_override'] }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: user_override

          # ── RULE 4 EXIT: USER OVERRIDE CLEAR ─────────────────────────────────────
          # Both lock originators have returned to 'unknown' — manual override is over.
          # On exit: script.pergola_exit_to_normal checks hourly rain and either enters
          # rain_stopped (drain sequence) or re-evaluates rules 5–8 directly.
          # Identical exit logic to frost clear — both delegate to the same script.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') == 'user_override'
                     and states('sensor.dach_links_priority_lock_originator') == 'unknown'
                     and states('sensor.dach_rechts_priority_lock_originator') == 'unknown' }}
            sequence:
              - action: script.turn_on
                target:
                  entity_id: script.pergola_exit_to_normal

          # ── PROTECTED STATE GUARD ─────────────────────────────────────────────────
          # Current state is a protected safety state and none of the transition
          # conditions above matched (e.g. a time_pattern fired while indicators
          # are still active). Do nothing — these states are only exited by their
          # explicit exit conditions above.
          # user_override is included here: without it, a periodic time_pattern or
          # lock-originator state update would fall through to the default branch,
          # call evaluate_state, and silently replace user_override with a sun state.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') in
                     ['frost', 'rain', 'rain_stopped', 'user_override'] }}
            sequence: []

        # ── DEFAULT: delegate to evaluate_state (rules 5–8) ───────────────────────
        # No high-priority rule matched — evaluate the sun-based rules.
        # evaluate_state checks no_sun_behind_house → not_enough_sun → heating → cooling.
        default:
          - action: script.turn_on
            target:
              entity_id: script.pergola_evaluate_state
    mode: queued
    max: 3

  # ── Not Enough Sun Entry ──────────────────────────────────────────────────────────
  # Dedicated automation for not_enough_sun state entry. Kept separate from the main
  # state manager because it has a very specific trigger (sun_shining off) and condition
  # (state not in higher-priority states).
  #
  # No 'for:' guard needed on the trigger — binary_sensor.pergola_sun_shining already
  # has delay_off: 5 min, so it only turns off after 5 continuous minutes without sun.
  - id: 'pergola_not_enough_sun_entry'
    alias: 'Pergola: Not Enough Sun — Entry'

    description: >
      Enters not_enough_sun when pergola_sun_shining turns off. The sensor's 5 min
      delay_off means this fires only after 5 continuous minutes of no sun — no extra
      guard needed here. Condition: no higher-priority state is currently active.
    triggers:
      - trigger: state
        entity_id: binary_sensor.pergola_sun_shining
        to: "off"
    conditions:
      # Only enter not_enough_sun when no higher-priority state is holding
      - condition: template
        value_template: >
          {{ states('input_select.pergola_automation_state') not in
             ['frost', 'rain', 'rain_stopped', 'user_override', 'no_sun_behind_house'] }}
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.pergola_automation_state
        data:
          option: not_enough_sun
    mode: single

  # ── Not Enough Sun Exit ───────────────────────────────────────────────────────────
  # Dedicated automation for not_enough_sun state exit. Fires when sun_shining turns
  # on (sensor has 1 min delay_on built in) and current state is not_enough_sun.
  # Re-evaluates the heating/cooling indicator directly and sets the correct sun state.
  # No need to call evaluate_state — at this point, rules 1–5 are already known to
  # not apply (we were in not_enough_sun, meaning no frost/rain/no-sun conditions).
  - id: 'pergola_not_enough_sun_exit'
    alias: 'Pergola: Not Enough Sun — Exit'

    description: >
      Exits not_enough_sun when pergola_sun_shining turns on. The sensor's 1 min
      delay_on means this fires only after 1 continuous minute of sun — no extra guard
      needed here. Sets sun_automatik_heating or sun_automatik_cooling based on the
      current heating indicator.
    triggers:
      - trigger: state
        entity_id: binary_sensor.pergola_sun_shining
        to: "on"
    conditions:
      - condition: state
        entity_id: input_select.pergola_automation_state
        state: not_enough_sun
    actions:
      # Inline heating/cooling check — no need to call evaluate_state here since
      # rules 1–5 are already known to not apply when exiting not_enough_sun.
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.pergola_heating
                state: "on"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: sun_automatik_heating
        default:
          - action: input_select.select_option
            target:
              entity_id: input_select.pergola_automation_state
            data:
              option: sun_automatik_cooling
    mode: single

  # ── Pergola Cover Response ─────────────────────────────────────────────────────────
  # Moves covers in response to state machine transitions and every 5 minutes for
  # continuous sun tracking. The choose block dispatches to the right slat-angle target
  # per state; a deadband check prevents unnecessary micro-movements.
  #
  # No conditions here: the pergola_automatic_enabled gate lives inside
  # script.pergola_set_slat_angle. The automation always evaluates; the script
  # decides whether to actually move covers. This keeps template sensors computing
  # freely for monitoring even when automatic is disabled.
  - id: 'pergola_cover_response'
    alias: 'Pergola Cover Response'

    description: >
      Reacts to state machine transitions and tracks the sun every 5 min. Dispatches
      to the correct slat-angle formula per state and applies the movement deadband
      before calling script.pergola_set_slat_angle.
    triggers:
      # Immediate reaction to any state machine transition
      - trigger: state
        entity_id: input_select.pergola_automation_state
      # Periodic sun tracking: sun moves ~1–2°/min in azimuth so a 5 min tick
      # produces ~5–10° of slat change — right at the deadband threshold. Without
      # this trigger, covers would not track the sun while the state stays constant.
      - trigger: time_pattern
        minutes: /5
    conditions: []
    actions:
      - choose:
          # ── Safety / protected states: frost, rain, rain_stopped, user_override ────
          # Covers must not move during these states. An explicit no-op branch prevents
          # falling through to the default branch.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') in
                     ['frost', 'rain', 'rain_stopped', 'user_override'] }}
            sequence: []

          # ── No sun behind house ───────────────────────────────────────────────────
          # Sun is geometrically behind the house — always open to 90° immediately
          # so ventilation is restored without any deadband check.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') == 'no_sun_behind_house' }}
            sequence:
              - action: script.pergola_set_slat_angle
                data:
                  slat_angle: 90

          # ── Not enough sun ─────────────────────────────────────────────────────────
          # Sun is up but not bright enough for shading.
          # Only move if the current slat angle (back-calculated from current_tilt_position)
          # is more than 30° away from the 90° target — avoids unnecessary motor travel
          # when the slats are already roughly vertical from a prior state transition.
          #
          # Reverse conversion: slat_angle ≈ (tilt_position − correction) × max_tilt / 100
          # Correction is estimated from a rough first-pass (same breakpoints as the forward
          # formula): < 20° → 6, < 69° → 5.5, else → 0.5.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') == 'not_enough_sun' }}
            sequence:
              # 30° deadband: skip movement when slats are already near-vertical.
              # Comparison is done in tilt_position space (0–100) — sensor.pergola_tilt_position
              # already holds the hardware-corrected tilt_position for the current target angle
              # (90° → 74 when in not_enough_sun), so no reverse conversion needed here.
              # DB = 30° expressed as tilt_position units via the same linear factor.
              - condition: template
                value_template: >
                  {% set mt      = states('input_number.pergola_max_tilt_angle') | float(122) %}
                  {% set DB      = (30 / mt * 100) | round(0) | int %}
                  {% set current = state_attr('cover.dach_links', 'current_tilt_position') | int(74) %}
                  {% set target  = states('sensor.pergola_tilt_position') | int(74) %}
                  {{ (current - target) | abs > DB }}
              - action: script.pergola_set_slat_angle
                data:
                  slat_angle: 90

          # ── Sun tracking: sun_automatik_cooling and sun_automatik_heating ────────────
          # Both states use the same motion logic: sensor.pergola_slat_angle holds the
          # formula result for the active state (cooling or heating), a 5° deadband
          # prevents micro-movements as the sun creeps across the sky, and the same
          # script drives the covers. The two branches are merged here because their
          # sequences are byte-for-byte identical — only the condition differs.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') in
                     ['sun_automatik_cooling', 'sun_automatik_heating'] }}
            sequence:
              # Allow the 4-hop template-sensor cascade to settle after a state
              # transition (state → effective_sun_angle → max_open_east → slat_angle
              # → tilt_position). Without this delay, cover_response fires on the
              # state-change event before the sensors have propagated, so stale values
              # (90°/74 from the previous state) either cause a false deadband pass
              # that moves covers to 90°, or a false deadband match (74 = 74) that
              # silently suppresses the move to the correct cooling/heating angle.
              - delay:
                  milliseconds: 500
              # Configurable deadband guard in tilt_position units — compare
              # sensor.pergola_tilt_position (target) against current cover position.
              # Prevents motor churn as the sun creeps; identical for cooling and heating.
              # DB is read from input_number.pergola_deadband_angle (degrees), converted
              # to tilt_position units so it matches the morning slat formula safety buffer.
              - condition: template
                value_template: >
                  {% set mt      = states('input_number.pergola_max_tilt_angle') | float(122) %}
                  {% set DB      = (states('input_number.pergola_deadband_angle') | float(5) / mt * 100) | round(0) | int %}
                  {% set current = state_attr('cover.dach_links', 'current_tilt_position') | int(0) %}
                  {% set target  = states('sensor.pergola_tilt_position') | int(0) %}
                  {{ ((target - current) | abs >= DB) or (target >= 100) }}
              # Pass formula result from sensor to the authoritative movement script.
              # sensor.pergola_slat_angle dispatches to the correct cooling or heating
              # formula based on the current automation state.
              - action: script.pergola_set_slat_angle
                data:
                  slat_angle: "{{ states('sensor.pergola_slat_angle') | float(90) }}"
    mode: queued
    max: 3

# ─────────────────────────────────────────────────────────────────────────────────────
# SCRIPTS
# ─────────────────────────────────────────────────────────────────────────────────────
script:

  # ── Pergola Exit to Normal ───────────────────────────────────────────────────────
  # Shared exit handler called by both frost-clear and user_override-clear branches.
  # If hourly rain > 0 (rain accumulated while covers were inactive), enters rain_stopped
  # and starts the drain sequence; otherwise re-evaluates rules 5–8 directly.
  # Extracted to eliminate the identical choose/default block that appeared in both
  # frost exit and user_override exit inside pergola_state_manager.
  pergola_exit_to_normal:
    alias: "Pergola: Exit to Normal (post-frost / post-override)"

    description: >
      Shared handler for frost-clear and user_override-clear transitions. Checks
      hourly rain and either enters rain_stopped + starts drain, or calls
      script.pergola_evaluate_state to return to normal sun-based operation.
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.wheatherstation_hourly_rain') | float(0) > 0 }}
            sequence:
              # Rain accumulated while covers were inactive — drain before reopening
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: rain_stopped
              - action: script.turn_on
                target:
                  entity_id: script.pergola_post_rain_recovery
        default:
          # No rain accumulated — re-evaluate sun/heating rules normally
          - action: script.turn_on
            target:
              entity_id: script.pergola_evaluate_state
    mode: single
    max_exceeded: silent

  # ── Pergola Evaluate State (Rules 5–8) ───────────────────────────────────────────
  # Evaluates the lower-priority sun-based rules and writes the result to
  # input_select.pergola_automation_state. Called from two places:
  #   1. pergola_state_manager default branch (when rules 1–4 do not apply)
  #   2. script.pergola_post_rain_recovery final step (when exiting rain_stopped)
  #
  # Rules evaluated in priority order:
  #   5. no_sun_behind_house — sun below horizon, too low, or outside azimuth window
  #   6. not_enough_sun      — binary_sensor.pergola_sun_shining = off
  #   7. sun_automatik_heating — heating indicator on
  #   8. sun_automatik_cooling — default
  #
  # This script never checks rules 1–4; callers guarantee those are not active.
  pergola_evaluate_state:
    alias: "Pergola: Evaluate State (Rules 5–8)"

    description: >
      Evaluates rules 5–8 (no_sun_behind_house → not_enough_sun → heating → cooling)
      and writes the result to input_select.pergola_automation_state. Called from
      the state manager default branch and from the post-rain recovery script.
    sequence:
      - choose:
          # ── Rule 5: no_sun_behind_house ──────────────────────────────────────────
          # Sun is geometrically incapable of hitting the terrasse — slat formulas
          # are irrelevant. Three sub-conditions (any one is sufficient):
          #   a) sun.sun below horizon
          #   b) elevation ≤ min_sun_elevation (sun shines UNDER the pergola roof)
          #   c) azimuth outside terrasse-facing window (wall_azimuth ± 90°)
          - conditions:
              - condition: template
                value_template: >
                  {% set elev    = state_attr('sun.sun', 'elevation') | float(0) %}
                  {% set az      = state_attr('sun.sun', 'azimuth')   | float(0) %}
                  {% set min_el  = states('input_number.pergola_min_sun_elevation') | float(10) %}
                  {% set wall_az = states('input_number.pergola_wall_azimuth') | float(204) %}
                  {% set az_min  = wall_az - 90 %}
                  {% set az_max  = wall_az + 90 %}
                  {{ states('sun.sun') == 'below_horizon'
                     or elev <= min_el
                     or az < az_min
                     or az > az_max }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: no_sun_behind_house

          # ── Rule 6: not_enough_sun ───────────────────────────────────────────────
          # Sun is above the horizon and in the azimuth window but not bright enough
          # for shading. The sensor's 5 min delay_off means it has already been off
          # for 5 continuous minutes when this script is called from that path.
          - conditions:
              - condition: state
                entity_id: binary_sensor.pergola_sun_shining
                state: "off"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: not_enough_sun

          # ── Rule 7: sun_automatik_heating ────────────────────────────────────────
          # Sun is shining and the heating indicator is on — let sun through.
          # Safe default when pergola_heating is unavailable: treat as cooling season.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_boolean.pergola_heating') | default('off') == 'on' }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: sun_automatik_heating

        # ── Rule 8: sun_automatik_cooling (default) ──────────────────────────────
        # Sun is active and cooling season — block sun via the cover formula.
        default:
          - action: input_select.select_option
            target:
              entity_id: input_select.pergola_automation_state
            data:
              option: sun_automatik_cooling
    mode: restart

  # ── Pergola Set Slat Angle ────────────────────────────────────────────────────────
  # Single authoritative slat_angle→tilt_position converter and cover movement script.
  # ALL cover movement commands (cover response automation and post-rain recovery)
  # call this script. The formula is never inlined in automations or other scripts.
  #
  # Accepts: slat_angle (float, degrees).
  # Gate: exits immediately if input_boolean.pergola_automatic_enabled is off.
  # Does NOT check the movement deadband — callers check before invoking here.
  # This allows the post-rain recovery script to bypass the deadband intentionally.
  pergola_set_slat_angle:
    alias: "Pergola: Set Slat Angle"

    description: >
      Converts slat_angle (degrees) to hardware-corrected tilt_position and sends
      cover.set_cover_tilt_position to both covers. Exits without moving if the
      master switch (pergola_automatic_enabled) is off.
    fields:
      slat_angle:
        description: "Target slat angle in degrees (0–max_tilt_angle)"
        example: 90
        required: true
        selector:
          number:
            min: 0
            max: 122
    sequence:
      # ── Master switch gate ──────────────────────────────────────────────────────────
      # All cover movement is suppressed when automatic is disabled.
      # State machine and template sensors keep running so re-enabling takes effect
      # immediately without waiting for the next trigger.
      - condition: state
        entity_id: input_boolean.pergola_automatic_enabled
        state: "on"
      # ── Record the angle that was actually commanded ─────────────────────────────────
      # Backing store for sensor.pergola_effective_slat_angle. Written here (after the
      # gate) so the sensor only reflects angles that were actually sent to the covers.
      - action: input_number.set_value
        target:
          entity_id: input_number.pergola_last_set_slat_angle
        data:
          value: "{{ slat_angle | float(90) | round(1) }}"
      # ── Hardware-corrected tilt_position ────────────────────────────────────────────
      # correction offsets compensate for observed non-linear motor behaviour:
      #   below 20°: motor barely moves at small angles → +6 to actually reach target
      #   20°–69°:   linear range → +5.5 rounds to nearest integer correctly
      #   above 69°: slight jerk above vertical → +0.5 to avoid small overshoot
      # Result is clamped to [0, 100] — values > 100 are dead zone on the Somfy.
      - variables:
          _tilt: >
            {% set s    = slat_angle | float(90) %}
            {% set mt   = states('input_number.pergola_max_tilt_angle') | float(122) %}
            {% set corr = 6 if s < 20 else (5.5 if s < 69 else 0.5) %}
            {{ [[(s / mt * 100 + corr) | int, 0] | max, 100] | min }}
      # ── Send movement command to both covers ─────────────────────────────────────────
      # Both covers always move together as one unit.
      - action: cover.set_cover_tilt_position
        target:
          entity_id:
            - cover.dach_links
            - cover.dach_rechts
        data:
          tilt_position: "{{ _tilt }}"
    mode: queued
    max: 2

  # ── Pergola Post-Rain Recovery ───────────────────────────────────────────────────
  # Stepped drain sequence executed when the state machine enters rain_stopped.
  # Moves covers to two progressively more open angles (8° → 15°) to drain water that
  # pooled on the slats while they were flat during rain. After draining, re-evaluates
  # sun/heating rules and exits rain_stopped by setting the correct operating state.
  #
  # Called from:
  #   1. pergola_state_manager — Rule 2 exit / Rule 3 entry (rain just stopped)
  #   2. pergola_state_manager — frost exit when hourly_rain > 0 (covers closed while frozen)
  #   3. pergola_state_manager — user_override exit when hourly_rain > 0
  #   4. pergola_state_manager — HA start with persisted rain_stopped state (drain resumes)
  #
  # No deadband check: the script always moves to its target angles regardless of the
  # current cover position. Draining must always complete. script.pergola_set_slat_angle
  # still enforces the pergola_automatic_enabled gate — if the master switch is off,
  # movement commands are suppressed (water stays on slats until re-enabled).
  #
  # mode: restart — if turn_on is called while a drain is already in progress (e.g.
  # after HA restart with rain_stopped persisted), the previous instance is terminated
  # and the drain restarts from the beginning. Re-draining from 8° is safe.
  # Frost / rain entry: the state manager calls turn_off explicitly, which also aborts
  # any running instance.
  pergola_post_rain_recovery:
    alias: "Pergola: Post-Rain Recovery"

    description: >
      Stepped drain sequence after rain stops. Moves covers 8° → 15° to drain pooled
      water, optionally waits 30 min if hourly rain > 0, then calls
      script.pergola_evaluate_state to re-enter the correct operating state.
    sequence:
      # ── Step 1: Settling — set counter, wait for states to stabilise ──────────────
      # 30 s delay after the rain indicator clears, giving the lock originator sensors
      # and weather station time to report their final post-rain values before we move.
      - action: input_number.set_value
        target:
          entity_id: input_number.pergola_rain_recovery_step
        data:
          value: 1
      - delay: "00:00:30"
      # Abort if the state was manually changed away from rain_stopped during this delay.
      - condition: state
        entity_id: input_select.pergola_automation_state
        state: rain_stopped

      # ── Step 2: First drain position — 8° ──────────────────────────────────────────
      # Slight opening to start water drainage. At 8° the slat is nearly flat so gravity
      # pulls water toward the front edge.
      # Counter set to 2 before the 5 min hold so the sensor shows the active phase.
      - action: script.pergola_set_slat_angle
        data:
          slat_angle: 8
      - action: input_number.set_value
        target:
          entity_id: input_number.pergola_rain_recovery_step
        data:
          value: 2

      # ── Step 3: Wait 5 minutes — initial drainage ──────────────────────────────────
      - delay: "00:05:00"
      # Abort if the state was manually changed away from rain_stopped during this delay.
      - condition: state
        entity_id: input_select.pergola_automation_state
        state: rain_stopped

      # ── Step 4: Second drain position — 15° ────────────────────────────────────────
      # Open further so remaining water continues to run off.
      # Counter set to 3 before the 5 min hold so the sensor shows the active phase.
      - action: script.pergola_set_slat_angle
        data:
          slat_angle: 15
      - action: input_number.set_value
        target:
          entity_id: input_number.pergola_rain_recovery_step
        data:
          value: 3

      # ── Step 5: Wait 5 minutes — continued drainage ────────────────────────────────
      - delay: "00:05:00"
      # Abort if the state was manually changed away from rain_stopped during this delay.
      - condition: state
        entity_id: input_select.pergola_automation_state
        state: rain_stopped

      # ── Step 6: Check whether rain accumulated in the last hour ────────────────────
      # Counter set to 4 before the choose so the sensor shows "drying" during any wait.
      # If hourly_rain > 0, rain fell recently — covers and slats may still be wet.
      # Wait an additional 30 minutes before returning to normal operation so the slats
      # can dry at 15° and motor stress from rapid re-opening is avoided.
      # If hourly_rain = 0 (dry period since rain stopped), proceed immediately.
      - action: input_number.set_value
        target:
          entity_id: input_number.pergola_rain_recovery_step
        data:
          value: 4
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.wheatherstation_hourly_rain') | float(0) > 0 }}
            sequence:
              # Rain still shows in the 60-min accumulation window — wait for slats to dry
              - delay: "00:30:00"
              # Abort if the state was manually changed away from rain_stopped during this wait.
              - condition: state
                entity_id: input_select.pergola_automation_state
                state: rain_stopped

      # ── Step 7: Re-evaluate state and exit rain_stopped ────────────────────────────
      # Rules 1–4 (frost, rain, user_override) are guaranteed to not apply here:
      #   - frost was ruled out before rain_stopped was entered (frost takes priority)
      #   - both rain indicators are off (that is the precondition for rain_stopped)
      #   - user_override cannot coexist with rain_stopped (state machine priority)
      # script.pergola_evaluate_state is the single implementation of rules 5–8:
      #   no_sun_behind_house → not_enough_sun → sun_automatik_heating → sun_automatik_cooling
      # The state manager will not fire on its own here — no sensor values changed since
      # rain_rate and lock originators were already clear before entering rain_stopped.
      - action: script.turn_on
        target:
          entity_id: script.pergola_evaluate_state
    mode: restart

# ─────────────────────────────────────────────────────────────────────────────────────
# GROUP — logical grouping of all pergola entities
# ─────────────────────────────────────────────────────────────────────────────────────
group:

  # Groups all pergola helpers, template sensors, and binary sensors into a single
  # logical entity (group.pergola_dach). Shown as a combined card on the dashboard
  # and usable as a target in automations. No post-deploy UI steps required.
  #
  # When new entities are added to this feature, add them here as well.
  pergola_dach:
    name: Pergola Dach
    entities:
      # ── On/off toggles ────────────────────────────────────────────────────────────
      - input_boolean.pergola_automatic_enabled
      - input_boolean.pergola_heating
      - input_boolean.pergola_cooling_optimized
      # ── State machine ─────────────────────────────────────────────────────────────
      - input_select.pergola_automation_state
      # ── User-configurable parameters ──────────────────────────────────────────────
      - input_number.pergola_pv_conversion_factor
      - input_number.pergola_shading_sensitivity
      - input_number.pergola_min_sun_elevation
      - input_number.pergola_deadband_angle
      - input_number.pergola_max_tilt_angle
      - input_number.pergola_wall_azimuth
      - input_number.pergola_slat_width
      - input_number.pergola_slat_pivot_spacing
      - input_number.pergola_slat_thickness
      # ── Computed / read-only sensors ──────────────────────────────────────────────
      - sensor.pergola_rain_recovery_step
      - sensor.pergola_pv_power
      - sensor.pergola_effective_sun_angle
      - sensor.pergola_slat_angle
      - sensor.pergola_effective_slat_angle
      - sensor.pergola_tilt_position
      - binary_sensor.pergola_sun_shining
      - sensor.pergola_cooling_lower_bound
      - sensor.pergola_max_open_east_morning_cooling_angle
      - sensor.pergola_max_open_west_cooling_angle
      - sensor.pergola_min_heating_slat_angle


# ─────────────────────────────────────────────────────────────────────────────────────
# RECORDER EXCLUDES — derived constants that don't need history
# ─────────────────────────────────────────────────────────────────────────────────────
recorder:
  exclude:
    entities:
      # Derived from max_tilt_angle alone — no value in storing history of a constant.
      - sensor.pergola_cooling_lower_bound
      - sensor.pergola_pv_power
      - sensor.pergola_rain_recovery_step
      # Derived from slat geometry (w, p, t) — pure constant, no history needed.
      - sensor.pergola_min_heating_slat_angle
