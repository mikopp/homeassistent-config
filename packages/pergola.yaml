# Pergola Dach — full automation package (Phase 1: Foundation)
# See plans/pergola-roof-automation.md for the complete design and implementation plan.
#
# All helpers, template sensors, automations, and scripts for the two Somfy bioclimatic
# pergola covers (cover.dach_links, cover.dach_rechts) live in this file.
# Both covers always move together as one unit.
#
# Tilt scale:  0 = horizontal/flat (rain protection, max shade)
#             ~74 = vertical / 90° (default open position, derived from formula)
#            100 = max_tilt_angle open (hardware maximum, default 122°)
#
# All entities under this feature are grouped via group.pergola_dach (built-in group integration).
# No post-deploy UI steps required — the group is fully defined in YAML.
# See plans/pergola-roof-automation.md § "Pergola Device" for the group design rationale.

# ─────────────────────────────────────────────────────────────────────────────────────
# INPUT BOOLEANS — on/off toggles
# ─────────────────────────────────────────────────────────────────────────────────────
input_boolean:

  # Master switch: when off, all cover movement is suppressed.
  # The state machine and template sensors keep running so re-enabling acts immediately.
  pergola_automatic_enabled:
    name: Pergola Automatic Enabled
    icon: mdi:sun-clock

  # Heating indicator: on = heating season (let sun through), off = cooling season (block sun).
  # Can be toggled by the user in the HA UI or written via the HA REST API by an external
  # system (e.g. Loxone). Does NOT affect state machine transitions — only the cover formula.
  pergola_heating:
    name: Pergola Heating
    icon: mdi:radiator

  # Cooling formula selector (Step 7).
  # off = perfect-perpendicular (default, standard A_eff ± 90 formula)
  # on  = safe-zone max-open (optimised — see plan Step 7 for formula details)
  pergola_cooling_optimized:
    name: Pergola Cooling Optimized
    icon: mdi:sine-wave

# ─────────────────────────────────────────────────────────────────────────────────────
# INPUT SELECT — state machine
# ─────────────────────────────────────────────────────────────────────────────────────
input_select:

  # The single source of truth for the automation state machine.
  # Only pergola_state_manager and script.pergola_evaluate_state may write this selector
  # (except manual overrides to break a deadlock).
  # States in priority order (highest first):
  #   frost              — temp below frost threshold; no movement
  #   rain               — rain active (weather station or cover lock); no movement
  #   rain_stopped       — rain just ended; recovery script running
  #   user_override      — cover(s) locked by user; no movement
  #   no_sun_behind_house — sun below horizon, low elevation, or outside azimuth window
  #   not_enough_sun     — pergola_sun_shining off (sensor has built-in 5 min delay_off)
  #   sun_automatik_heating — sun active, heating indicator on
  #   sun_automatik_cooling — sun active, heating indicator off (default)
  pergola_automation_state:
    name: Pergola Automation State
    icon: mdi:state-machine
    options:
      - no_sun_behind_house
      - frost
      - rain
      - rain_stopped
      - user_override
      - not_enough_sun
      - sun_automatik_heating
      - sun_automatik_cooling

# ─────────────────────────────────────────────────────────────────────────────────────
# INPUT NUMBERS — user-configurable parameters
# ─────────────────────────────────────────────────────────────────────────────────────
input_number:

  # ── PV / sun detection ────────────────────────────────────────────────────────────

  pergola_pv_conversion_factor:
    name: Pergola PV Conversion Factor
    # Divisor to convert raw PV watt output (sensor.victronsolarcharger_yield_power226)
    # to equivalent W/m² irradiance.
    # Default 3.2 is empirically calibrated for 6× Axitec 440W bifacial panels at ~5–10°
    # tilt, 228° azimuth (bifacial back-gain + near-flat tilt + afternoon-facing geometry).
    # STC baseline: 2640W / 1000 W/m² = 2.64; adjusted to 3.2 for real-world geometry.
    # Calibrate in Step 6 field testing on a clear morning.
    min: 1
    max: 6
    step: 0.1
    icon: mdi:solar-panel

  pergola_shading_sensitivity:
    name: Pergola Shading Sensitivity
    # Sensitivity knob for the sun_shining shading threshold.
    # Formula: shading_threshold = 512 × sin(elevation) × shading_sensitivity
    # Default 0.9: lower values → shading activates earlier (hazy days); higher
    # values → requires brighter sun to trigger shading. Primary calibration knob
    # — see plan Step 6 (Phase 5).
    min: 0.5
    max: 1.2
    step: 0.05
    icon: mdi:weather-sunny

  pergola_min_sun_elevation:
    name: Pergola Min Sun Elevation
    # Elevation at or below which the state machine enters no_sun_behind_house.
    # At very low elevation the sun shines *under* the roof regardless of azimuth —
    # the slat geometry formulas are irrelevant and the covers open to 90°.
    # Must be > 0° (the sin(elevation) in the sun_shining threshold also uses this guard).
    min: 1
    max: 30
    step: 0.5
    unit_of_measurement: "°"
    icon: mdi:weather-sunset

  # ── Tilt / hardware geometry ──────────────────────────────────────────────────────

  pergola_max_tilt_angle:
    name: Pergola Max Tilt Angle
    # Maximum physical slat rotation in degrees (Somfy hardware limit).
    # Drives the tilt_position conversion formula: tilt_position = INT(slat_angle / max_tilt × 100 + correction)
    # and all derived constants (R, PHI, DEADBAND_TILT, COOLING_LOWER_BOUND).
    # Adjust if the physical stop changes (e.g. after motor recalibration).
    min: 100
    max: 150
    step: 1
    unit_of_measurement: "°"
    icon: mdi:rotate-right

  pergola_min_heating_slat_angle:
    name: Pergola Min Heating Slat Angle
    # Floor slat angle in heating mode — prevents near-parallel slats at dawn where
    # A_eff approaches 0° and the angle gap between sun and slat is too small to matter.
    # Default 16° is back-calculated from tilt-position 20:
    #   (20 − 7) × max_tilt_angle / 100 = 15.86° ≈ 16° at default max_tilt_angle=122°
    min: 0
    max: 40
    step: 1
    unit_of_measurement: "°"
    icon: mdi:angle-acute

  # ── Location / orientation ────────────────────────────────────────────────────────

  pergola_wall_azimuth:
    name: Pergola Wall Azimuth
    # Compass bearing (0°–360°) of the terrasse wall — the direction the pergola faces.
    # Default 204° = SSW (measured on-site).
    # Drives two derived constants used throughout the automation:
    #   AZIMUTH_MIN = wall_azimuth − 90  (default 114°) — eastern edge of sun window
    #   AZIMUTH_MAX = wall_azimuth + 90  (default 294°) — western edge of sun window
    # Outside AZIMUTH_MIN–AZIMUTH_MAX the sun cannot hit the terrasse geometrically,
    # regardless of what any sensor reads.
    # Also defines the reference direction for the effective sun angle (A_eff) formula.
    min: 0
    max: 359
    step: 1
    unit_of_measurement: "°"
    icon: mdi:compass

  # ── Slat geometry (used to derive R and PHI) ──────────────────────────────────────
  # These three inputs feed the shade-overlap geometry (see plan "Derived Internal Constants"):
  #   R   = sqrt(d² + t²) / w              — overlap ratio
  #   PHI = degrees(atan(t / d))            — thickness angle offset (default ≈ 8.53°)
  # R and PHI are used to compute MaxOpenEast, MaxOpenWest, and COOLING_LOWER_BOUND.
  # sensor.pergola_cooling_lower_bound is re-derived automatically when any of these change.

  pergola_slat_width:
    name: Pergola Slat Width
    # Slat face width (w) in cm — the dimension perpendicular to the pivot axis.
    # Default 22 cm (Somfy bioclimatic standard).
    min: 5
    max: 50
    step: 0.5
    unit_of_measurement: "cm"
    icon: mdi:ruler

  pergola_slat_pivot_spacing:
    name: Pergola Slat Pivot Spacing
    # Pivot-to-pivot spacing (d) in cm — distance between adjacent slat pivot axes.
    # Default 20 cm (Somfy bioclimatic standard).
    min: 5
    max: 40
    step: 0.5
    unit_of_measurement: "cm"
    icon: mdi:ruler-square

  pergola_slat_thickness:
    name: Pergola Slat Thickness
    # Slat thickness (t) in cm — the fin depth dimension.
    # Default 3 cm (Somfy bioclimatic standard).
    min: 0.5
    max: 10
    step: 0.5
    unit_of_measurement: "cm"
    icon: mdi:layers

# ─────────────────────────────────────────────────────────────────────────────────────
# TEMPLATE SENSORS AND BINARY SENSORS
# ─────────────────────────────────────────────────────────────────────────────────────
template:

  # ── Pergola Dach computed sensors ────────────────────────────────────────────────
  # These template sensors compute real values (sun angle, slat position, etc.).
  # They are NOT wrappers for input_* helpers — those are used directly.
  # All entities are grouped via group.pergola_dach (defined at the bottom of this
  # file) — no post-deploy UI steps required.
  #
  # sensor.pergola_cooling_lower_bound is kept in a separate block below —
  # it is an internal derived constant, not a user-facing value.
  - sensor:

      # ── PV Power ──────────────────────────────────────────────────────────────────
      # Thin wrapper around the raw Victron solar charger output. Exposes a clean
      # "pergola" entity for all formulas to reference — if the underlying sensor ID
      # ever changes, only this sensor needs updating.
      - name: "Pergola PV Power"
        unique_id: pergola_pv_power
        state: "{{ states('sensor.victronsolarcharger_yield_power226') | float(0) }}"
        availability: >
          {{ states('sensor.victronsolarcharger_yield_power226') not in ['unavailable', 'unknown'] }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-panel

      # ── Effective Sun Angle (A_eff) ───────────────────────────────────────────────
      # STUB — formula will be added in Step 3 (Phase 2).
      # When implemented, A_eff maps the sun's position onto a unified 0°–180° scale:
      #   0° = East Horizon → 90° = Zenith/Noon → 180° = West Horizon
      # Used as the primary input for both the cooling and heating slat formulas.
      # Always computes regardless of pergola_automatic_enabled — useful for monitoring.
      - name: "Pergola Effective Sun Angle"
        unique_id: pergola_effective_sun_angle
        # STUB: formula added in Step 3 (Phase 2). Reports unavailable until then.
        state: "0"
        availability: "false"
        unit_of_measurement: "°"
        icon: mdi:angle-acute

      # ── Target Slat Angle ─────────────────────────────────────────────────────────
      # STUB — formula will be added in Step 3 (Phase 2).
      # When implemented, shows the calculated slat angle (0°–122°) that the automation
      # would target at this moment — the raw angular output before hardware correction.
      # Useful for commissioning without having to inspect cover state.
      # Always computes regardless of pergola_automatic_enabled.
      - name: "Pergola Slat Angle"
        unique_id: pergola_slat_angle
        # STUB: formula added in Step 3 (Phase 2). Reports unavailable until then.
        state: "0"
        availability: "false"
        unit_of_measurement: "°"
        icon: mdi:angle-obtuse

      # ── Target Tilt Position ──────────────────────────────────────────────────────
      # STUB — formula will be added in Step 3 (Phase 2).
      # When implemented, shows the hardware-corrected tilt_position (0–100) that will
      # be sent to cover.dach_links / cover.dach_rechts. Useful for debugging the
      # formula without triggering actual cover movement.
      # Always computes regardless of pergola_automatic_enabled.
      - name: "Pergola Tilt Position"
        unique_id: pergola_tilt_position
        # STUB: formula added in Step 3 (Phase 2). Reports unavailable until then.
        state: "0"
        availability: "false"
        icon: mdi:format-align-middle


    binary_sensor:

      # ── Sun Shining ────────────────────────────────────────────────────────────────
      # True when the sun is shining strongly enough that the terrasse needs shading.
      # This answers: "is it sunny enough to shade?"
      #
      # Adapted from Loxone Wetter/Sonnenschein logic:
      #   effective_radiation = max(
      #       sensor.wheatherstation_solar_radiation,          # W/m²; goes into shadow in afternoon
      #       sensor.pergola_pv_power / pv_conversion_factor   # W→W/m² proxy; stays in sun longer
      #   )
      #   shading_threshold = 512 × sin(elevation_rad) × shading_sensitivity
      #   sun_is_shining = (effective_radiation > shading_threshold)
      #                    OR (uv_index ≥ 3)           ← UV catches hazy high-UV days
      #                    AND (elevation > min_sun_elevation)
      #
      # Taking max() of both sources solves the afternoon shadow problem: whichever
      # sensor is still in direct sun drives the reading.
      #
      # Why 512 W/m² × sin(elevation)?
      #   The theoretical clear-sky horizontal irradiance is ~1000 × sin(elevation).
      #   In Central Austria (≈47°N), real-world peak irradiance is significantly lower
      #   than the 1000 W/m² STC reference. 512 W/m² is the Loxone-calibrated baseline
      #   that represents "enough sun to shade" at solar noon — roughly half the
      #   theoretical maximum. shading_sensitivity (default 0.9) provides fine-tuning.
      #
      # Hysteresis (prevents rapid toggling when sun is near the threshold):
      #   delay_on:  1 min  — must be true for 1 min before shading activates
      #   delay_off: 5 min  — must be false for 5 min before shading deactivates
      #   The state machine no_sun_behind_house threshold is separate — it only depends
      #   on sun position and is not delayed.
      # The elevation guard matches the state machine no_sun_behind_house threshold.
      - name: "Pergola Sun Shining"
        unique_id: pergola_sun_shining
        device_class: light
        availability: >
          {{ (states('sensor.wheatherstation_solar_radiation') not in ['unavailable', 'unknown']
              or states('sensor.pergola_pv_power') not in ['unavailable', 'unknown'])
             and state_attr('sun.sun', 'elevation') is not none }}
        delay_on: "00:01:00"
        delay_off: "00:05:00"
        state: >
          {% set solar       = states('sensor.wheatherstation_solar_radiation') | float(0) %}
          {% set factor      = states('input_number.pergola_pv_conversion_factor') | float(3.2) %}
          {% set pv          = states('sensor.pergola_pv_power') | float(0) / factor %}
          {% set elev        = state_attr('sun.sun', 'elevation') | float(0) %}
          {% set min_elev    = states('input_number.pergola_min_sun_elevation') | float(10) %}
          {% set sensitivity = states('input_number.pergola_shading_sensitivity') | float(0.9) %}
          {% set uv          = states('sensor.wheatherstation_uv_index') | float(0) %}
          {# Elevation guard: at or below min_sun_elevation the state machine enters     #}
          {# no_sun_behind_house; shading is irrelevant at those angles.                 #}
          {% if elev <= min_elev %}
            false
          {% else %}
            {# Both sources are compared; max() ensures that afternoon PV              #}
            {# compensates when the weather station falls into building shadow.         #}
            {% set effective  = [solar, pv] | max %}
            {# Shading threshold: 512 W/m² × sin(elevation) × sensitivity.            #}
            {# 512 is the Loxone-derived "shade needed" baseline for Central Austria   #}
            {# (≈47°N); sin(elevation) scales it correctly with sun angle.             #}
            {% set threshold  = 512 * sin(elev * pi / 180) * sensitivity %}
            {# UV fallback: UV index ≥ 3 (WHO moderate) means shading is needed even  #}
            {# on hazy days where irradiance is low but UV is still significant.       #}
            {{ effective > threshold or uv >= 3 }}
          {% endif %}


  # ── Internal sensor: Cooling Lower Bound ─────────────────────────────────────────
  # Read-only derived constant. Included in group.pergola_dach.
  # Has no user-settable counterpart — re-derives automatically whenever slat
  # geometry or max_tilt_angle changes.
  #
  # COOLING_LOWER_BOUND is the ventilation floor for the cooling formula.
  # It equals MaxOpenWest evaluated at the "flip point" A_eff — the largest A_eff (1°→90°)
  # where the morning back-face formula (MaxOpenEast = A_eff + PHI + asin(R×sin(A_eff)))
  # is still ≤ max_tilt − SAFETY_BUFFER (5°), meaning the back-face strategy can safely
  # provide 100% shade.
  #
  # At the flip point, MaxOpenWest (= A_eff_flip + PHI − asin(R×sin(A_eff_flip))) gives
  # the minimum slat angle that still fully shades overhead/high-east sun via the front face.
  # This becomes the floor for the afternoon/closing formula, ensuring shade is never lost.
  #
  # Derived constants used here (never hardcoded elsewhere):
  #   w  = input_number.pergola_slat_width          (default 22 cm)
  #   d  = input_number.pergola_slat_pivot_spacing   (default 20 cm)
  #   t  = input_number.pergola_slat_thickness       (default 3 cm)
  #   R  = sqrt(d² + t²) / w                        (default ≈ 0.9193)
  #   PHI = degrees(atan(t / d))                     (default ≈ 8.53°)
  #   SAFETY_BUFFER = 5° (fixed, non-configurable)
  #
  # Default (w=22, d=20, t=3, max_tilt=122): A_eff_flip ≈ 58°, COOLING_LOWER_BOUND ≈ 15.3°
  # Re-derives automatically when any geometry input or max_tilt_angle changes.
  - sensor:
      - name: "Pergola Cooling Lower Bound"
        unique_id: pergola_cooling_lower_bound
        availability: >
          {{ states('input_number.pergola_max_tilt_angle') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_width') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_pivot_spacing') not in ['unavailable', 'unknown']
             and states('input_number.pergola_slat_thickness') not in ['unavailable', 'unknown'] }}
        state: >
          {# ── Derived geometry constants ──────────────────────────────────────── #}
          {% set max_tilt = states('input_number.pergola_max_tilt_angle') | float(122) %}
          {% set w        = states('input_number.pergola_slat_width') | float(22) %}
          {% set d        = states('input_number.pergola_slat_pivot_spacing') | float(20) %}
          {% set t        = states('input_number.pergola_slat_thickness') | float(3) %}
          {# R: overlap ratio — how much a slat overlaps its neighbour at 90°         #}
          {% set R   = ((d**2 + t**2) ** 0.5) / w %}
          {# PHI: angle correction for slat thickness; shifts the MaxOpenEast/West    #}
          {# formulas to account for the finite fin depth (default ≈ 8.53°).          #}
          {% set PHI = atan(t / d) * (180 / pi) %}
          {# SAFETY_BUFFER: margin below max_tilt at which the back-face strategy     #}
          {# is declared unsafe; flip occurs ~2 update cycles before shade loss.      #}
          {% set SAFETY = 5 %}
          {# ── Find the flip point (A_eff_flip) ──────────────────────────────────── #}
          {# Iterate A_eff from 1° to 90° in 1° steps.                               #}
          {# MaxOpenEast = minimum back-face slat angle for 100% shade from eastern sun #}
          {# = A_eff + PHI + asin(R × sin(A_eff))                                   #}
          {# We record the LAST (= largest) A_eff for which MaxOpenEast ≤ max_tilt − 5 #}
          {% set ns = namespace(flip=1) %}
          {% for a in range(1, 91) %}
            {% set max_open_east = a + PHI + asin(R * sin(a * pi / 180)) * (180 / pi) %}
            {% if max_open_east <= max_tilt - SAFETY %}
              {% set ns.flip = a %}
            {% endif %}
          {% endfor %}
          {# ── Compute COOLING_LOWER_BOUND from the flip point ──────────────────── #}
          {# MaxOpenWest at A_eff_flip = A_eff_flip + PHI − asin(R × sin(A_eff_flip)) #}
          {# This is the highest front-face angle that still blocks high-east/noon sun #}
          {# when the back-face strategy becomes unusable.                             #}
          {% set a_flip = ns.flip %}
          {{ (a_flip + PHI - asin(R * sin(a_flip * pi / 180)) * (180 / pi)) | round(2) }}
        unit_of_measurement: "°"
        icon: mdi:angle-acute

# ─────────────────────────────────────────────────────────────────────────────────────
# AUTOMATIONS
# ─────────────────────────────────────────────────────────────────────────────────────
automation:

  # ── Inactivity Watchdog: Dach Links ───────────────────────────────────────────────
  # Sends stop_cover_tilt to cover.dach_links every 5 minutes when no cover or lock
  # entity has been updated in the last 5 minutes.
  #
  # Why this is critical: the Somfy device does not push state changes proactively.
  # After rain stops, the lock timer counts down from 900 s to 0 internally, but HA
  # only learns the current value when we force a state report via stop_cover_tilt.
  # Without this watchdog, the lock originator would appear stuck (= rain) indefinitely
  # and the state machine would never see the lock clearing.
  #
  # State-based suppression: the watchdog is skipped when the state machine is in an
  # actively-moving state (sun_automatik_cooling, sun_automatik_heating, rain_stopped).
  # Both watchdog and cover_response automations share the same /5 time_pattern trigger;
  # suppressing the watchdog during active movement prevents stop_cover_tilt from
  # aborting a movement command mid-travel (race condition — see plan Step 2 notes).
  - id: '1771360145720'
    alias: 'Inactivity Watchdog: Dach Links'
    description: >
      Forces an update of slat position and lock originator every 5 minutes when
      no cover movement or lock change has occurred. Prevents stale lock state.
    triggers:
      - trigger: time_pattern
        minutes: /5
      - trigger: homeassistant
        event: start
    conditions:
      - condition: template
        value_template: >
          {% set entities = [
            states.sensor.dach_links_priority_lock_originator,
            states.sensor.dach_links_priority_lock_timer,
            states.cover.dach_links
          ] %}
          {# Act only when no entity has been updated in the last 5 minutes #}
          {{ entities | selectattr('last_updated', 'gt', now() - timedelta(minutes=5))
             | list | count == 0 }}
      # Skip when the state machine is in an actively-moving state. The cover
      # response automation (sun states) and the post-rain recovery script
      # (rain_stopped) both use the same /5 time pattern. Because HA evaluates
      # both triggers concurrently, the cover's last_updated is still stale at
      # evaluation time — the watchdog condition would pass and send stop_cover_tilt
      # while the movement command is already in flight, aborting mid-travel.
      # State-based suppression eliminates the race at the root.
      # Safe before Step 2: states() returns 'unknown' when the entity does not
      # exist yet, which is not in the exclusion list, so the watchdog fires normally.
      - condition: template
        value_template: >
          {% set s = states('input_select.pergola_automation_state') %}
          {{ s not in ['sun_automatik_cooling', 'sun_automatik_heating', 'rain_stopped'] }}
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_links

  # ── Inactivity Watchdog: Dach Rechts ──────────────────────────────────────────────
  # Identical logic as the Dach Links watchdog — see comment above.
  - id: '1771361016291'
    alias: 'Inactivity Watchdog: Dach Rechts'
    description: >
      Forces an update of slat position and lock originator every 5 minutes when
      no cover movement or lock change has occurred. Prevents stale lock state.
    triggers:
      - trigger: time_pattern
        minutes: /5
      - trigger: homeassistant
        event: start
    conditions:
      - condition: template
        value_template: >
          {% set entities = [
            states.sensor.dach_rechts_priority_lock_originator,
            states.sensor.dach_rechts_priority_lock_timer,
            states.cover.dach_rechts
          ] %}
          {# Act only when no entity has been updated in the last 5 minutes #}
          {{ entities | selectattr('last_updated', 'gt', now() - timedelta(minutes=5))
             | list | count == 0 }}
      # Same race-condition guard as Dach Links watchdog — see comment there.
      - condition: template
        value_template: >
          {% set s = states('input_select.pergola_automation_state') %}
          {{ s not in ['sun_automatik_cooling', 'sun_automatik_heating', 'rain_stopped'] }}
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_rechts

  # ── Lock Originator Responder: Dach Links ─────────────────────────────────────────
  # Fires immediately when sensor.dach_links_priority_lock_originator changes state.
  # Sending stop_cover_tilt causes the Somfy to emit a fresh state report, so HA
  # learns the current tilt position and lock state *before* the state manager evaluates
  # the lock transition.
  # This complements the state manager (Step 2): it ensures the most current tilt data
  # is available the moment the lock changes, without waiting for the next watchdog cycle.
  - id: '1771748333394'
    alias: 'Dach Links: Update state when lock originator changes'
    description: >
      Sends stop_cover_tilt immediately when the lock originator changes so HA
      receives a fresh state report before the state manager evaluates the transition.
    triggers:
      - trigger: state
        entity_id:
          - sensor.dach_links_priority_lock_originator
    conditions: []
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_links
    mode: single

  # ── Lock Originator Responder: Dach Rechts ────────────────────────────────────────
  # Same as Dach Links responder — see comment above.
  - id: '1771748414999'
    alias: 'Dach Rechts: Update state when lock originator changes'
    description: >
      Sends stop_cover_tilt immediately when the lock originator changes so HA
      receives a fresh state report before the state manager evaluates the transition.
    triggers:
      - trigger: state
        entity_id:
          - sensor.dach_rechts_priority_lock_originator
    conditions: []
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_rechts
    mode: single

  # ── Pergola State Manager ──────────────────────────────────────────────────────────
  # Single automation that evaluates rules 1–4 inline and delegates rules 5–8 to
  # script.pergola_evaluate_state. The only other writers of
  # input_select.pergola_automation_state are that script and the two not_enough_sun
  # entry/exit automations below.
  #
  # Rule priority (highest first): frost (1) → rain (2) → rain_stopped (3) →
  # user_override (4). Rules 5–8 (no_sun_behind_house, not_enough_sun, heating,
  # cooling) are handled by script.pergola_evaluate_state.
  #
  # The choose block evaluates conditions in priority order; the first match wins.
  # A protected-state guard prevents the default from calling evaluate_state while
  # frost / rain / rain_stopped are active and no transition condition has fired.
  - id: 'pergola_state_manager'
    alias: 'Pergola State Manager'
    description: >
      Evaluates rules 1–4 (frost, rain, rain_stopped, user_override) directly and
      delegates rules 5–8 to script.pergola_evaluate_state. Triggers on all inputs
      that can cause a state transition; the choose block determines what (if anything)
      to do on each trigger.
    triggers:
      # Frost entry: fires on the threshold crossing (2.5 °C) so we react immediately;
      # the id is informational only — the branch condition below is value-based so
      # any trigger (incl. time_pattern) will enter frost if this one gets queue-dropped.
      - trigger: numeric_state
        id: "frost_entry"
        entity_id: sensor.wheatherstation_outdoor_temperature
        below: 2.5
      # Frost exit: fires on the threshold crossing (3.0 °C) so we react immediately;
      # the id is informational only — the branch condition below is value-based so
      # any trigger (incl. time_pattern) will exit frost if this one gets queue-dropped.
      - trigger: numeric_state
        id: "frost_exit"
        entity_id: sensor.wheatherstation_outdoor_temperature
        above: 3.0
      # Rain rule: re-evaluate when weather station rain rate changes
      - trigger: state
        entity_id: sensor.wheatherstation_rain_rate
      # Rain + user_override rules: re-evaluate when lock originator changes
      # (watchdog-driven — see plan Step 2 notes)
      - trigger: state
        entity_id: sensor.dach_links_priority_lock_originator
      - trigger: state
        entity_id: sensor.dach_rechts_priority_lock_originator
      # not_enough_sun boundary: re-evaluate when sun shining binary changes
      - trigger: state
        entity_id: binary_sensor.pergola_sun_shining
      # Heating/cooling toggle: re-evaluate immediately when mode changes
      - trigger: state
        entity_id: input_boolean.pergola_heating
      # HA start: evaluate from persisted state; resume rain_stopped drain if interrupted
      - trigger: homeassistant
        event: start
      # Time pattern: catch slow sun azimuth / elevation threshold crossings every 5 min
      - trigger: time_pattern
        minutes: /5
    actions:
      - choose:
          # ── HA START + rain_stopped: resume interrupted drain sequence ─────────────
          # If HA restarted while rain_stopped was active (drain script mid-run), restart
          # the recovery script from the beginning. The script is idempotent enough for
          # this — it re-drains from 8° which is safe. Do NOT re-evaluate other rules.
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.platform == 'homeassistant'
                     and states('input_select.pergola_automation_state') == 'rain_stopped' }}
            sequence:
              - action: script.turn_on
                target:
                  entity_id: script.pergola_post_rain_recovery

          # ── RULE 1 ENTRY: FROST ────────────────────────────────────────────────────
          # Highest-priority safety rule — preempts any in-progress script including
          # the rain recovery drain sequence. Activates when temperature is below
          # 2.5 °C (hardcoded frost threshold).
          # Value-based (not trigger.id-based): any trigger can enter frost, so we
          # recover correctly even if the numeric_state frost_entry trigger was dropped
          # from the queue — the next tick (time_pattern, sensor update, …) re-checks.
          # float(99) fail-safe: unknown/unavailable sensor → assume warm, don't trip frost.
          # Guard: skip if already in frost to avoid redundant state writes.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.wheatherstation_outdoor_temperature') | float(99) < 2.5
                     and states('input_select.pergola_automation_state') != 'frost' }}
            sequence:
              # Stop any in-progress recovery — frost takes absolute priority
              - action: script.turn_off
                target:
                  entity_id: script.pergola_post_rain_recovery
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: frost

          # ── RULE 1 EXIT: FROST CLEAR ───────────────────────────────────────────────
          # Temperature is above 3.0 °C (hardcoded frost-clear threshold).
          # Value-based (not trigger.id-based): any trigger can exit frost, so we
          # recover correctly even if the numeric_state frost_exit trigger was dropped
          # from the queue — the next tick (time_pattern, sensor update, …) re-checks.
          # float(0) fail-safe: unknown/unavailable sensor → stay in frost until temp known.
          # On exit: if hourly rain > 0 (rain fell while covers were frozen closed),
          # enter rain_stopped and start drain sequence; otherwise re-evaluate rules 5–8.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.wheatherstation_outdoor_temperature') | float(0) > 3.0
                     and states('input_select.pergola_automation_state') == 'frost' }}
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: >
                          {{ states('sensor.wheatherstation_hourly_rain') | float(0) > 0 }}
                    sequence:
                      # Rain accumulated while frozen — drain before reopening
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.pergola_automation_state
                        data:
                          option: rain_stopped
                      - action: script.turn_on
                        target:
                          entity_id: script.pergola_post_rain_recovery
                default:
                  # No rain while frozen — re-evaluate sun/heating rules normally
                  - action: script.turn_on
                    target:
                      entity_id: script.pergola_evaluate_state

          # ── RULE 2 ENTRY: RAIN ─────────────────────────────────────────────────────
          # Rain is active when: weather station rain_rate > 0 (slower, delayed) OR
          # either cover-mounted lock originator = 'rain' (faster, no delay).
          # Can override rain_stopped (rain restarted mid-drain — stop drain, stay closed).
          # Cannot override frost — frost remains highest priority.
          # Guard: skip if already in rain to avoid redundant state writes.
          - conditions:
              - condition: template
                value_template: >
                  {{ (states('sensor.wheatherstation_rain_rate') | float(0) > 0
                      or states('sensor.dach_links_priority_lock_originator') == 'rain'
                      or states('sensor.dach_rechts_priority_lock_originator') == 'rain')
                     and states('input_select.pergola_automation_state') not in ['frost', 'rain'] }}
            sequence:
              # Stop any in-progress recovery — rain has (re)started
              - action: script.turn_off
                target:
                  entity_id: script.pergola_post_rain_recovery
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: rain

          # ── RULE 2 EXIT / RULE 3 ENTRY: RAIN STOPPED ──────────────────────────────
          # All rain indicators are now off: rain_rate = 0 AND both lock originators =
          # 'unknown' (Somfy countdown has completed). Covers may have pooled water —
          # enter rain_stopped and start the step-drain sequence.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') == 'rain'
                     and states('sensor.wheatherstation_rain_rate') | float(0) == 0
                     and states('sensor.dach_links_priority_lock_originator') == 'unknown'
                     and states('sensor.dach_rechts_priority_lock_originator') == 'unknown' }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: rain_stopped
              - action: script.turn_on
                target:
                  entity_id: script.pergola_post_rain_recovery

          # ── RULE 4 ENTRY: USER OVERRIDE ───────────────────────────────────────────
          # A user has manually operated one or both covers (lock originator = 'user').
          # Cannot override frost, rain, or rain_stopped — those safety states stay.
          # Guard: skip if already in user_override.
          - conditions:
              - condition: template
                value_template: >
                  {{ (states('sensor.dach_links_priority_lock_originator') == 'user'
                      or states('sensor.dach_rechts_priority_lock_originator') == 'user')
                     and states('input_select.pergola_automation_state') not in
                     ['frost', 'rain', 'rain_stopped', 'user_override'] }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: user_override

          # ── RULE 4 EXIT: USER OVERRIDE CLEAR ─────────────────────────────────────
          # Both lock originators have returned to 'unknown' — manual override is over.
          # On exit: same logic as frost exit — if rain accumulated during the override,
          # start drain sequence; otherwise re-evaluate rules 5–8 normally.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') == 'user_override'
                     and states('sensor.dach_links_priority_lock_originator') == 'unknown'
                     and states('sensor.dach_rechts_priority_lock_originator') == 'unknown' }}
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: >
                          {{ states('sensor.wheatherstation_hourly_rain') | float(0) > 0 }}
                    sequence:
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.pergola_automation_state
                        data:
                          option: rain_stopped
                      - action: script.turn_on
                        target:
                          entity_id: script.pergola_post_rain_recovery
                default:
                  - action: script.turn_on
                    target:
                      entity_id: script.pergola_evaluate_state

          # ── PROTECTED STATE GUARD ─────────────────────────────────────────────────
          # Current state is a protected safety state (frost, rain, or rain_stopped)
          # and none of the transition conditions above matched (e.g. a time_pattern
          # fired while indicators are still active). Do nothing — these states are
          # only exited by their explicit exit conditions above.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_select.pergola_automation_state') in
                     ['frost', 'rain', 'rain_stopped'] }}
            sequence: []

        # ── DEFAULT: delegate to evaluate_state (rules 5–8) ───────────────────────
        # No high-priority rule matched — evaluate the sun-based rules.
        # evaluate_state checks no_sun_behind_house → not_enough_sun → heating → cooling.
        default:
          - action: script.turn_on
            target:
              entity_id: script.pergola_evaluate_state
    mode: queued
    max: 3

  # ── Not Enough Sun Entry ──────────────────────────────────────────────────────────
  # Dedicated automation for not_enough_sun state entry. Kept separate from the main
  # state manager because it has a very specific trigger (sun_shining off) and condition
  # (state not in higher-priority states).
  #
  # No 'for:' guard needed on the trigger — binary_sensor.pergola_sun_shining already
  # has delay_off: 5 min, so it only turns off after 5 continuous minutes without sun.
  - id: 'pergola_not_enough_sun_entry'
    alias: 'Pergola: Not Enough Sun — Entry'
    description: >
      Enters not_enough_sun when pergola_sun_shining turns off. The sensor's 5 min
      delay_off means this fires only after 5 continuous minutes of no sun — no extra
      guard needed here. Condition: no higher-priority state is currently active.
    triggers:
      - trigger: state
        entity_id: binary_sensor.pergola_sun_shining
        to: "off"
    conditions:
      # Only enter not_enough_sun when no higher-priority state is holding
      - condition: template
        value_template: >
          {{ states('input_select.pergola_automation_state') not in
             ['frost', 'rain', 'rain_stopped', 'user_override', 'no_sun_behind_house'] }}
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.pergola_automation_state
        data:
          option: not_enough_sun
    mode: single

  # ── Not Enough Sun Exit ───────────────────────────────────────────────────────────
  # Dedicated automation for not_enough_sun state exit. Fires when sun_shining turns
  # on (sensor has 1 min delay_on built in) and current state is not_enough_sun.
  # Re-evaluates the heating/cooling indicator directly and sets the correct sun state.
  # No need to call evaluate_state — at this point, rules 1–5 are already known to
  # not apply (we were in not_enough_sun, meaning no frost/rain/no-sun conditions).
  - id: 'pergola_not_enough_sun_exit'
    alias: 'Pergola: Not Enough Sun — Exit'
    description: >
      Exits not_enough_sun when pergola_sun_shining turns on. The sensor's 1 min
      delay_on means this fires only after 1 continuous minute of sun — no extra guard
      needed here. Sets sun_automatik_heating or sun_automatik_cooling based on the
      current heating indicator.
    triggers:
      - trigger: state
        entity_id: binary_sensor.pergola_sun_shining
        to: "on"
    conditions:
      - condition: state
        entity_id: input_select.pergola_automation_state
        state: not_enough_sun
    actions:
      # Inline heating/cooling check — no need to call evaluate_state here since
      # rules 1–5 are already known to not apply when exiting not_enough_sun.
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.pergola_heating
                state: "on"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: sun_automatik_heating
        default:
          - action: input_select.select_option
            target:
              entity_id: input_select.pergola_automation_state
            data:
              option: sun_automatik_cooling
    mode: single

# ─────────────────────────────────────────────────────────────────────────────────────
# SCRIPTS
# ─────────────────────────────────────────────────────────────────────────────────────
script:

  # ── Pergola Evaluate State (Rules 5–8) ───────────────────────────────────────────
  # Evaluates the lower-priority sun-based rules and writes the result to
  # input_select.pergola_automation_state. Called from two places:
  #   1. pergola_state_manager default branch (when rules 1–4 do not apply)
  #   2. script.pergola_post_rain_recovery final step (when exiting rain_stopped)
  #
  # Rules evaluated in priority order:
  #   5. no_sun_behind_house — sun below horizon, too low, or outside azimuth window
  #   6. not_enough_sun      — binary_sensor.pergola_sun_shining = off
  #   7. sun_automatik_heating — heating indicator on
  #   8. sun_automatik_cooling — default
  #
  # This script never checks rules 1–4; callers guarantee those are not active.
  pergola_evaluate_state:
    alias: "Pergola: Evaluate State (Rules 5–8)"
    description: >
      Evaluates rules 5–8 (no_sun_behind_house → not_enough_sun → heating → cooling)
      and writes the result to input_select.pergola_automation_state. Called from
      the state manager default branch and from the post-rain recovery script.
    sequence:
      - choose:
          # ── Rule 5: no_sun_behind_house ──────────────────────────────────────────
          # Sun is geometrically incapable of hitting the terrasse — slat formulas
          # are irrelevant. Three sub-conditions (any one is sufficient):
          #   a) sun.sun below horizon
          #   b) elevation ≤ min_sun_elevation (sun shines UNDER the pergola roof)
          #   c) azimuth outside terrasse-facing window (wall_azimuth ± 90°)
          - conditions:
              - condition: template
                value_template: >
                  {% set elev    = state_attr('sun.sun', 'elevation') | float(0) %}
                  {% set az      = state_attr('sun.sun', 'azimuth')   | float(0) %}
                  {% set min_el  = states('input_number.pergola_min_sun_elevation') | float(10) %}
                  {% set wall_az = states('input_number.pergola_wall_azimuth') | float(204) %}
                  {% set az_min  = wall_az - 90 %}
                  {% set az_max  = wall_az + 90 %}
                  {{ states('sun.sun') == 'below_horizon'
                     or elev <= min_el
                     or az < az_min
                     or az > az_max }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: no_sun_behind_house

          # ── Rule 6: not_enough_sun ───────────────────────────────────────────────
          # Sun is above the horizon and in the azimuth window but not bright enough
          # for shading. The sensor's 5 min delay_off means it has already been off
          # for 5 continuous minutes when this script is called from that path.
          - conditions:
              - condition: state
                entity_id: binary_sensor.pergola_sun_shining
                state: "off"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: not_enough_sun

          # ── Rule 7: sun_automatik_heating ────────────────────────────────────────
          # Sun is shining and the heating indicator is on — let sun through.
          # Safe default when pergola_heating is unavailable: treat as cooling season.
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_boolean.pergola_heating') | default('off') == 'on' }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.pergola_automation_state
                data:
                  option: sun_automatik_heating

        # ── Rule 8: sun_automatik_cooling (default) ──────────────────────────────
        # Sun is active and cooling season — block sun via the cover formula.
        default:
          - action: input_select.select_option
            target:
              entity_id: input_select.pergola_automation_state
            data:
              option: sun_automatik_cooling
    mode: single
    max_exceeded: silent

  # script.pergola_set_slat_angle will be added in Step 3 (Phase 2).
  # script.pergola_post_rain_recovery will be added in Step 4.

# ─────────────────────────────────────────────────────────────────────────────────────
# GROUP — logical grouping of all pergola entities
# ─────────────────────────────────────────────────────────────────────────────────────
group:

  # Groups all pergola helpers, template sensors, and binary sensors into a single
  # logical entity (group.pergola_dach). Shown as a combined card on the dashboard
  # and usable as a target in automations. No post-deploy UI steps required.
  #
  # When new entities are added to this feature, add them here as well.
  pergola_dach:
    name: Pergola Dach
    entities:
      # ── On/off toggles ────────────────────────────────────────────────────────────
      - input_boolean.pergola_automatic_enabled
      - input_boolean.pergola_heating
      - input_boolean.pergola_cooling_optimized
      # ── State machine ─────────────────────────────────────────────────────────────
      - input_select.pergola_automation_state
      # ── User-configurable parameters ──────────────────────────────────────────────
      - input_number.pergola_pv_conversion_factor
      - input_number.pergola_shading_sensitivity
      - input_number.pergola_min_sun_elevation
      - input_number.pergola_max_tilt_angle
      - input_number.pergola_min_heating_slat_angle
      - input_number.pergola_wall_azimuth
      - input_number.pergola_slat_width
      - input_number.pergola_slat_pivot_spacing
      - input_number.pergola_slat_thickness
      # ── Computed / read-only sensors ──────────────────────────────────────────────
      - sensor.pergola_pv_power
      - sensor.pergola_effective_sun_angle
      - sensor.pergola_slat_angle
      - sensor.pergola_tilt_position
      - binary_sensor.pergola_sun_shining
      - sensor.pergola_cooling_lower_bound
