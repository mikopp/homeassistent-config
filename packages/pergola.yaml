# Pergola roof automation — all helpers, templates, automations, and scripts live here.
# See pergola-roof-automation.md for the full design and implementation plan.

input_boolean:
  pergola_automatic_enabled:
    name: Pergola Automatic Enabled
    icon: mdi:sun-clock
  pergola_frost_hold:
    name: Pergola Frost Hold
    icon: mdi:snowflake-alert
  pergola_post_rain_active:
    name: Pergola Post-Rain Sequence Active
    icon: mdi:weather-rainy

input_number:
  pergola_frost_off_threshold:
    name: Pergola Frost OFF threshold
    min: -10
    max: 5
    step: 0.5
    initial: 2.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low
  pergola_frost_on_threshold:
    name: Pergola Frost ON threshold
    min: -10
    max: 5
    step: 0.5
    initial: 3.0
    unit_of_measurement: "°C"
    icon: mdi:thermometer
  pergola_pv_conversion_factor:
    name: Pergola PV Conversion Factor
    min: 1
    max: 6
    step: 0.1
    initial: 3.2
    icon: mdi:solar-panel

template:
  - sensor:
      - name: "Pergola PV Power"
        unique_id: pergola_pv_power
        state: "{{ states('sensor.victronsolarcharger_yield_power226') | float(0) }}"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-panel

  - binary_sensor:
      - name: "Pergola Sun Shining"
        unique_id: pergola_sun_shining
        device_class: light
        state: >
          {% set solar  = states('sensor.wheatherstation_solar_radiation') | float(0) %}
          {% set factor = states('input_number.pergola_pv_conversion_factor') | float(3.2) %}
          {% set pv     = states('sensor.pergola_pv_power') | float(0) / factor %}
          {% set elev   = state_attr('sun.sun', 'elevation') | float(0) %}
          {% if elev <= 10 %}
            false
          {% else %}
            {% set effective = [solar, pv] | max %}
            {% set threshold = 1000 * (elev * pi / 180) | sin * 0.9 %}
            {{ effective > threshold }}
          {% endif %}

automation:
  # Inactivity watchdog — fires every 5 minutes and evaluates whether any cover or
  # lock entity has been updated in the last 5 minutes. If nothing has changed,
  # sends stop_cover_tilt to force the Somfy firmware to emit a fresh state report.
  # This is critical for the rain-lock lifecycle: after rain stops, the Somfy lock
  # originator timer counts down from 900 s to 0 only on motion events. Without this
  # watchdog, the lock originator would appear stuck indefinitely and the state
  # machine would never see rain clearing.
  - id: '1771360145720'
    alias: 'Inactivity Watchdog: Dach Links'
    description: >
      Forces an update of slat position and lock originator every 5 minutes when
      no cover movement or lock change has occurred. Prevents stale lock state.
    triggers:
      - trigger: time_pattern
        minutes: /5
      - trigger: homeassistant
        event: start
    conditions:
      - condition: template
        value_template: >
          {% set entities = [
            states.sensor.dach_links_priority_lock_originator,
            states.sensor.dach_links_priority_lock_timer,
            states.cover.dach_links
          ] %}
          {# Act only when no entity has been updated in the last 5 minutes #}
          {{ entities | selectattr('last_updated', 'gt', now() - timedelta(minutes=5))
             | list | count == 0 }}
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_links

  - id: '1771361016291'
    alias: 'Inactivity Watchdog: Dach Rechts'
    description: >
      Forces an update of slat position and lock originator every 5 minutes when
      no cover movement or lock change has occurred. Prevents stale lock state.
    triggers:
      - trigger: time_pattern
        minutes: /5
      - trigger: homeassistant
        event: start
    conditions:
      - condition: template
        value_template: >
          {% set entities = [
            states.sensor.dach_rechts_priority_lock_originator,
            states.sensor.dach_rechts_priority_lock_timer,
            states.cover.dach_rechts
          ] %}
          {# Act only when no entity has been updated in the last 5 minutes #}
          {{ entities | selectattr('last_updated', 'gt', now() - timedelta(minutes=5))
             | list | count == 0 }}
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_rechts

  # Immediate lock originator reaction — fires the moment the lock originator changes.
  # Sending stop_cover_tilt forces a fresh state report from the Somfy firmware so HA
  # sees the updated lock and tilt values without waiting for the next watchdog cycle.
  - id: '1771748333394'
    alias: 'Dach Links: Update state when lock originator changes'
    triggers:
      - trigger: state
        entity_id:
          - sensor.dach_links_priority_lock_originator
    conditions: []
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_links
    mode: single

  - id: '1771748414999'
    alias: 'Dach Rechts: Update state when lock originator changes'
    triggers:
      - trigger: state
        entity_id:
          - sensor.dach_rechts_priority_lock_originator
    conditions: []
    actions:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.dach_rechts
    mode: single

