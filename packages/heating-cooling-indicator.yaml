
# --- HEATING/COOLING INDICATOR ---
# Classifies outdoor temperature into 4 operational modes used by ventilation automations.
template:
  - sensor:
      - name: "Heating Cooling Indicator"
        unique_id: heating_cooling_indicator
        state: >
          {% set temp = states('sensor.wheatherstation_outdoor_temperature') | float(0) %}
          {% if temp <= 5 %}
            active_heating
          {% elif temp < 10 %}
            neutral
          {% elif temp < 15 %}
            passive_cooling
          {% else %}
            active_cooling
          {% endif %}
