# --- HEATING/COOLING INDICATOR ---
# Classifies outdoor temperature into 4 operational modes used by ventilation automations.
sensor:
  # 15-min smoothed weatherstation temp — recorded by HA so the statistics sensor's
  # max_age can load historical samples on HA restart.
  - platform: filter
    unique_id: wheatherstation_outdoor_temperature_15min
    name: "Weatherstation Outdoor Temperature 15min"
    entity_id: sensor.wheatherstation_outdoor_temperature
    filters:
      - filter: time_simple_moving_average
        window_size: "00:15"
        precision: 2
      - filter: time_throttle
        window_size: "00:15"

  # 48h mean of 15min-throttled source.
  # max_age causes HA to pre-populate the sample window from the recorder on restart
  # (sampling_size alone does NOT load history — max_age is required for that).
  # sampling_size: 192 = 4 samples/hour × 48h, kept as an upper-bound memory cap.
  - platform: statistics
    unique_id: wheatherstation_outdoor_temperature_48h_mean
    name: "Weatherstation Outdoor Temperature 48h Mean"
    entity_id: sensor.wheatherstation_outdoor_temperature_15min
    state_characteristic: mean
    sampling_size: 192
    max_age: "48:00:00"
template:
  - sensor:
      - name: "Heating Cooling Indicator"
        unique_id: heating_cooling_indicator
        # Prevents cascade jumps during config reload: when the 48h mean is
        # unavailable, the indicator becomes unavailable too instead of computing
        # from float(0) and cycling through spurious states.
        availability: >
          {{ states('sensor.wheatherstation_outdoor_temperature_48h_mean')
             not in ['unavailable', 'unknown'] }}
        state: >
          {% set temp = states('sensor.wheatherstation_outdoor_temperature_48h_mean') | float(0) %}
          {% set current = states('sensor.heating_cooling_indicator') %}
          {% if current == 'active_heating' %}
            {% if temp >= 6 %}neutral{% else %}active_heating{% endif %}
          {% elif current == 'neutral' %}
            {% if temp <= 5 %}active_heating
            {% elif temp >= 11 %}passive_cooling
            {% else %}neutral{% endif %}
          {% elif current == 'passive_cooling' %}
            {% if temp <= 10 %}neutral
            {% elif temp >= 16 %}active_cooling
            {% else %}passive_cooling{% endif %}
          {% elif current == 'active_cooling' %}
            {% if temp <= 15 %}passive_cooling{% else %}active_cooling{% endif %}
          {% else %}
            {% if temp <= 5 %}active_heating
            {% elif temp < 10 %}neutral
            {% elif temp < 15 %}passive_cooling
            {% else %}active_cooling{% endif %}
          {% endif %}

# --- GROUP ---
# All entities belonging to the heating_cooling_indicator feature
group:
  heating_cooling_indicator:
    name: "Heating Cooling Indicator"
    entities:
      # Filter sensor (15min smoothed source)
      - sensor.wheatherstation_outdoor_temperature_15min
      # Statistics sensor (48h mean)
      - sensor.wheatherstation_outdoor_temperature_48h_mean
      # Template sensor (heating/cooling state)
      - sensor.heating_cooling_indicator
