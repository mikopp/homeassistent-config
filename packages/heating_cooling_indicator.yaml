# --- HEATING/COOLING INDICATOR ---
# Classifies outdoor temperature into 4 operational modes used by ventilation automations.
sensor:
  # 15-min smoothed weatherstation temp — persisted (not excluded from recorder) so
  # statistics sensor below can seed its sample window from history on HA restart.
  - platform: filter
    unique_id: wheatherstation_outdoor_temperature_15min
    name: "Weatherstation Outdoor Temperature 15min"
    entity_id: sensor.wheatherstation_outdoor_temperature
    filters:
      - filter: time_simple_moving_average
        window_size: "00:15"
        precision: 2
      - filter: time_throttle
        window_size: "00:15"

  # 48h mean of 15min-throttled source; fixed sampling_size avoids unbounded history scan
  # 192 = 4 samples/hour × 48h
  - platform: statistics
    unique_id: wheatherstation_outdoor_temperature_48h_mean
    name: "Weatherstation Outdoor Temperature 48h Mean"
    entity_id: sensor.wheatherstation_outdoor_temperature_15min
    state_characteristic: mean
    sampling_size: 192
template:
  - sensor:
      - name: "Heating Cooling Indicator"
        unique_id: heating_cooling_indicator
        state: >
          {% set temp = states('sensor.wheatherstation_outdoor_temperature_48h_mean') | float(0) %}
          {% set current = states('sensor.heating_cooling_indicator') %}
          {% if current == 'active_heating' %}
            {% if temp >= 6 %}neutral{% else %}active_heating{% endif %}
          {% elif current == 'neutral' %}
            {% if temp <= 5 %}active_heating
            {% elif temp >= 11 %}passive_cooling
            {% else %}neutral{% endif %}
          {% elif current == 'passive_cooling' %}
            {% if temp <= 10 %}neutral
            {% elif temp >= 16 %}active_cooling
            {% else %}passive_cooling{% endif %}
          {% elif current == 'active_cooling' %}
            {% if temp <= 15 %}passive_cooling{% else %}active_cooling{% endif %}
          {% else %}
            {% if temp <= 5 %}active_heating
            {% elif temp < 10 %}neutral
            {% elif temp < 15 %}passive_cooling
            {% else %}active_cooling{% endif %}
          {% endif %}
